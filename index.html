<style>
  /* ─────────────────────────── Tokens ─────────────────────────── */
  :root {
    --paper: #F7F6F5;
    --ink: #111111;
    --accent: #003DFF;
    --ink-70: color-mix(in oklab, var(--ink) 70%, var(--paper));
    --ink-50: color-mix(in oklab, var(--ink) 50%, var(--paper));
    --ink-30: color-mix(in oklab, var(--ink) 30%, var(--paper));
    --ink-12: color-mix(in oklab, var(--ink) 12%, var(--paper));
    --ink-06: color-mix(in oklab, var(--ink) 6%, var(--paper));

    --font-serif: 'Newsreader', 'Source Han Serif TC', 'Noto Serif TC', serif;
    --font-sans:  'Helvetica Neue', Helvetica, 'Archivo', Arial, 'PingFang TC', 'Source Han Sans TC', 'Noto Sans TC', system-ui, sans-serif;
    --font-grotesk: 'Helvetica Neue', Helvetica, 'Archivo', Arial, 'PingFang TC', 'Source Han Sans TC', 'Noto Sans TC', system-ui, sans-serif;
    --font-mono:  'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

    /* Default display/body — neo-grotesk museum face for all, switched by [data-type] below */
    --font-display: var(--font-grotesk);
    --font-body:    var(--font-sans);
  }
  html[data-type="serif"] {
    --font-display: var(--font-serif);
    --font-body:    var(--font-serif);
  }
  html[data-type="sans"] {
    --font-display: var(--font-grotesk);
    --font-body:    var(--font-sans);
  }
  html[data-type="mix"] {
    --font-display: 'Newsreader', -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Serif TC', serif;
    --font-body:    var(--font-sans);
  }

  /* ─────────────────────────── Base ────────────────────────────── */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.55;
    cursor: none;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  html[data-motion="static"] body { cursor: auto; }
  a, button { color: inherit; text-decoration: none; cursor: none; }
  html[data-motion="static"] a, html[data-motion="static"] button { cursor: pointer; }
  ::selection { background: var(--ink); color: var(--paper); }

  main { display: block; }

  /* ─────────────────────────── Cursor ─────────────────────────── */
  .cursor-dot, .cursor-ring {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 2147483645;
    transition: opacity .25s ease;
    will-change: transform;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff;
  }
  .cursor-ring {
    width: 38px; height: 38px;
    border: 1px solid #fff;
    border-radius: 50%;
    display: grid; place-items: center;
    transition: width .25s ease, height .25s ease, border-radius .25s ease, opacity .25s ease, background .25s ease;
  }
  .cursor-ring[data-state="hover"] {
    width: 92px; height: 92px;
    background: var(--accent);
    border-color: var(--accent);
    mix-blend-mode: normal;
  }
  .cursor-label {
    color: #fff;
    font: 500 11px/1 var(--font-mono);
    letter-spacing: .04em;
    opacity: 0;
    text-transform: lowercase;
    white-space: nowrap;
    max-width: 80px; text-align: center;
  }
  .cursor-ring[data-state="hover"] .cursor-label { opacity: 1; }

  /* ─────────────── Scroll progress + grid overlay ────────────── */
  .rp-progress {
    position: fixed; left: 0; top: 0; right: 0;
    height: 2px; background: var(--ink);
    transform-origin: left; transform: scaleX(0);
    z-index: 100; transition: transform .12s linear;
  }
  .rp-grid-overlay {
    position: fixed; inset: 0; z-index: 90; pointer-events: none;
    display: grid; grid-template-columns: repeat(12, 1fr);
    gap: 24px;
    padding: 0 48px;
  }
  .rp-grid-overlay span {
    background: color-mix(in oklab, var(--accent) 8%, transparent);
    border-left: 1px solid color-mix(in oklab, var(--accent) 22%, transparent);
    border-right: 1px solid color-mix(in oklab, var(--accent) 22%, transparent);
  }

  /* ─────────────────────────── Header ─────────────────────────── */
  .rp-header {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 22px 48px;
    z-index: 50;
    background: linear-gradient(to bottom, var(--paper) 60%, transparent);
  }
  .rp-header-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
  }
  .rp-header-mark {
    display: inline-flex; align-items: center; gap: 12px;
    font: 500 14px/1 var(--font-mono);
    letter-spacing: .08em;
  }
  .mark-stack { display: flex; flex-direction: column; gap: 4px; }
  .mark-sub {
    font: 400 9.5px/1.2 var(--font-mono);
    letter-spacing: .08em;
    color: var(--ink-50);
    text-transform: none;
  }
  .mark-square {
    width: 14px; height: 14px;
    background: var(--ink);
    transform: rotate(45deg);
    transition: transform .4s cubic-bezier(.7,.1,.2,1);
  }
  .rp-header-mark:hover .mark-square { transform: rotate(135deg); }
  .mark-text { letter-spacing: .14em; }
  .mark-plus { color: var(--accent); }

  .rp-nav {
    display: flex; gap: 28px;
    justify-self: center;
    font: 500 13px/1 var(--font-mono);
    letter-spacing: .04em;
  }
  .rp-nav a {
    display: inline-flex; align-items: baseline; gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    transition: background .2s;
  }
  .rp-nav a:hover { background: var(--ink-06); }
  .nav-num {
    font-size: 9px;
    color: var(--ink-50);
    letter-spacing: .1em;
  }

  .rp-lang-toggle {
    justify-self: end;
    appearance: none; border: 1px solid var(--ink-30);
    background: transparent; padding: 8px 14px;
    border-radius: 999px;
    font: 500 12px/1 var(--font-mono); letter-spacing: .12em;
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-50);
    transition: border-color .2s;
  }
  .rp-lang-toggle:hover { border-color: var(--ink); }
  .rp-lang-toggle .on { color: var(--ink); }
  .rp-lang-toggle .slash { color: var(--ink-30); }

  /* ─────────────────────────── Hero ───────────────────────────── */
  .rp-hero {
    position: relative;
    min-height: 100vh;
    padding: 132px 48px 64px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .rp-hero-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 96px;
    align-items: start;
  }
  .rp-hero-left {
    display: flex; flex-direction: column; gap: 36px;
    padding-top: 12px;
  }
  .rp-logo {
    width: 260px;
    transition: transform .12s linear;
  }
  html[data-motion="bold"] .rp-logo { transition: transform .25s cubic-bezier(.2,.7,.2,1); }
  .rp-logo img {
    width: 100%;
    height: auto;
    display: block;
    /* The logo is dark navy; tint to current --ink */
    filter: brightness(0) saturate(100%);
    /* Use an SVG mask trick: overlay paper, blend ink */
  }
  /* Re-tint logo to current ink color using mix-blend; achieved via CSS mask filter */
  html:not([data-type="ignore"]) .rp-logo img {
    /* convert dark png to current ink using mask + bg */
    filter: none;
  }

  .rp-logo img { visibility: hidden; }

  .rp-coord-block {
    border-top: 1px solid var(--ink-30);
    padding-top: 14px;
    display: flex; flex-direction: column; gap: 4px;
    font: 400 12px/1.4 var(--font-mono);
    color: var(--ink-70);
    max-width: 220px;
  }
  .rp-coord-row {
    display: grid; grid-template-columns: 56px 1fr;
    border-bottom: 1px dashed var(--ink-12);
    padding: 4px 0;
  }
  .rp-coord-row .k { color: var(--ink-50); letter-spacing: .08em; }
  .rp-coord-row .v { color: var(--ink); font-variant-numeric: tabular-nums; }

  .rp-hero-right {
    display: flex; flex-direction: column; gap: 30px;
    padding-top: 4px;
  }
  .rp-hero-meta {
    display: flex; justify-content: space-between;
    font: 500 11px/1 var(--font-mono);
    letter-spacing: .08em;
    color: var(--ink-70);
    text-transform: uppercase;
  }
  .rp-hero-meta .meta-l { display: inline-flex; align-items: center; gap: 8px; }
  .rp-hero-meta .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: rp-pulse 1.6s ease-in-out infinite;
  }
  html[data-motion="static"] .rp-hero-meta .dot { animation: none; }
  @keyframes rp-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(.6); opacity: .4; }
  }

  .rp-tagline {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(56px, 7.2vw, 116px);
    line-height: 1.02;
    letter-spacing: -0.045em;
    text-wrap: balance;
  }
  html[data-type="serif"] .rp-tagline { font-weight: 300; letter-spacing: -0.025em; }
  html[data-type="mix"] .rp-tagline { font-weight: 400; letter-spacing: -0.03em; }
  .tagline-line {
    display: block;
    transition: transform .15s cubic-bezier(.2,.7,.2,1);
  }
  .tagline-line.indent { padding-left: 1.2em; }
  html[data-type="serif"] .tagline-line.indent,
  html[data-type="mix"] .tagline-line.indent { font-style: italic; }
  /* Disable synthetic italic on CJK — only italicize when font supports it */
  .tagline-line.indent:lang(zh) { font-style: normal !important; }
  .tagline-aster {
    font-style: normal;
    color: var(--accent);
    margin-left: .05em;
    font-size: .5em;
    vertical-align: super;
  }

  .rp-sub-tagline {
    display: flex; gap: 8px;
    font: 400 13px/1.4 var(--font-mono);
    color: var(--ink-70);
    letter-spacing: .03em;
    max-width: 480px;
  }
  .rp-sub-tagline .sub-prefix { color: var(--accent); }

  .rp-intro {
    margin: 12px 0 0;
    font-family: var(--font-display);
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-70);
    max-width: 620px;
    font-weight: 400;
    text-wrap: pretty;
    letter-spacing: -0.005em;
  }
  html[data-type="serif"] .rp-intro,
  html[data-type="mix"] .rp-intro { font-style: italic; font-weight: 300; font-size: 19px; font-family: var(--font-serif); }
  html[data-type="serif"] .rp-intro:lang(zh),
  html[data-type="mix"] .rp-intro:lang(zh) { font-style: normal; }

  .rp-hero-cta {
    margin-top: 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    border-top: 1px solid var(--ink-30);
    padding-top: 20px;
  }
  .rp-cta-btn {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 16px 26px 16px 22px;
    background: var(--ink); color: var(--paper);
    border-radius: 999px;
    font: 500 14px/1 var(--font-mono);
    letter-spacing: .08em;
    transition: transform .25s cubic-bezier(.2,.7,.2,1), background .25s;
  }
  .rp-cta-btn:hover { background: var(--accent); transform: translateY(-2px); }
  .cta-arr {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--paper); color: var(--ink);
    display: grid; place-items: center;
    font-size: 14px;
  }
  .rp-cta-btn:hover .cta-arr { transform: rotate(-45deg); transition: transform .35s; }

  .rp-cta-ghost {
    display: inline-flex; align-items: baseline; gap: 10px;
    padding: 14px 20px;
    border: 1px solid var(--ink-30);
    border-radius: 999px;
    transition: border-color .25s, background .25s, transform .25s cubic-bezier(.2,.7,.2,1);
  }
  .rp-cta-ghost:hover { border-color: var(--ink); background: var(--paper); transform: translateY(-2px); }
  .ghost-k {
    font: 500 11px/1 var(--font-mono); letter-spacing: .12em;
    color: var(--ink-50); text-transform: uppercase;
  }
  .ghost-v {
    font-family: var(--font-display); font-size: 18px;
    color: var(--ink); letter-spacing: -.025em;
    font-weight: 500;
  }
  html[data-type="serif"] .ghost-v { font-weight: 400; }
  .ghost-arr { color: var(--accent); font-size: 14px; transition: transform .35s; }
  .rp-cta-ghost:hover .ghost-arr { transform: translate(3px, -3px); }

  .rp-hero-bio {
    display: flex; flex-direction: column; gap: 4px;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-70);
  }
  .rp-hero-bio .bio-name { color: var(--ink); font-weight: 600; letter-spacing: .04em; }

  .rp-scroll-hint {
    margin-top: 80px;
    display: flex; align-items: center; gap: 14px;
    font: 500 11px/1 var(--font-mono);
    letter-spacing: .12em;
    color: var(--ink-50);
    text-transform: uppercase;
  }
  .scroll-bar {
    width: 64px; height: 1px;
    background: var(--ink-30);
    position: relative; overflow: hidden;
  }
  .scroll-bar-inner {
    position: absolute; inset: 0;
    background: var(--ink);
    transform-origin: left;
    animation: rp-scrollbar 2.4s cubic-bezier(.5,0,.5,1) infinite;
  }
  html[data-motion="static"] .scroll-bar-inner { animation: none; transform: scaleX(.4); }
  @keyframes rp-scrollbar {
    0% { transform: translateX(-100%) scaleX(1); }
    50% { transform: translateX(0) scaleX(1); }
    100% { transform: translateX(100%) scaleX(1); }
  }

  /* ─────────────────────────── Marquee ────────────────────────── */
  .rp-marquee {
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    overflow: hidden;
    background: var(--ink);
    color: var(--paper);
    padding: 9px 0;
  }
  .rp-marquee-track {
    display: flex; gap: 0;
    width: max-content;
    animation: rp-marquee linear infinite;
  }
  html[data-motion="static"] .rp-marquee-track { animation: none; }
  .rp-marquee-group {
    display: inline-flex; gap: 0; flex-shrink: 0;
  }
  .rp-marquee-item {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 0 18px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    font-style: normal;
    line-height: 1;
    letter-spacing: .14em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  html[data-type="sans"] .rp-marquee-item { font-weight: 500; }
  .mq-glyph { color: var(--accent); font-size: 9px; font-style: normal; }
  @keyframes rp-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.333%); }
  }

  /* ─────────────────────────── Section head ───────────────────── */
  .rp-section-head {
    display: flex; justify-content: space-between; align-items: end;
    padding: 80px 48px 36px;
    border-bottom: 1px solid var(--ink);
    gap: 32px;
  }
  .rp-section-head.dim { border-bottom-color: var(--ink-30); }
  .rp-section-head.footer { padding-top: 120px; border-bottom-color: var(--paper); color: var(--paper); }

  .rp-section-head .head-l { display: flex; gap: 18px; align-items: baseline; }
  .rp-section-head .head-tag {
    font: 500 12px/1 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .12em;
  }
  .rp-section-head.footer .head-tag { color: color-mix(in oklab, var(--paper) 50%, var(--ink)); }
  .rp-section-head .head-title {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(28px, 3vw, 44px);
    line-height: 1.1; letter-spacing: -0.035em;
  }
  html[data-type="serif"] .rp-section-head .head-title { font-weight: 300; letter-spacing: -0.02em; font-style: italic; }
  html[data-type="serif"] .rp-section-head .head-title:lang(zh) { font-style: normal; }

  .rp-section-head .head-r {
    text-align: right;
    font: 500 12px/1.4 var(--font-mono);
    letter-spacing: .06em;
  }
  .rp-section-head .head-count { color: var(--ink); font-size: 14px; }
  .rp-section-head .head-sub { color: var(--ink-50); margin-top: 4px; }

  /* ─────────────────────────── Works ──────────────────────────── */
  .rp-works { padding-bottom: 60px; }
  .rp-works-list { display: flex; flex-direction: column; }
  .rp-work {
    position: relative;
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    grid-template-rows: auto auto;
    grid-template-areas:
      "meta title preview"
      "meta summary preview";
    align-items: start;
    gap: 36px 56px;
    padding: 56px 48px;
    border-bottom: 1px solid var(--ink-30);
    transition: background .35s, color .35s;
    --accent-row: var(--accent);
  }
  .rp-work::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0; background: var(--accent);
    transition: width .5s cubic-bezier(.2,.7,.2,1);
  }
  .rp-work.is-hover::before { width: 6px; }
  .rp-work.is-hover { background: var(--ink-06); }

  .rp-work-meta {
    grid-area: meta;
    display: flex; flex-direction: column; gap: 18px;
  }
  .rp-work-meta .meta-no {
    font: 500 64px/.9 var(--font-display);
    color: var(--ink);
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    transition: color .35s;
  }
  .rp-work.is-hover .meta-no { color: var(--accent); }
  html[data-type="serif"] .rp-work-meta .meta-no { font-weight: 300; font-style: italic; letter-spacing: -0.025em; }
  .rp-work-meta .meta-cols {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px 24px;
    border-top: 1px solid var(--ink-30);
    padding-top: 14px;
  }
  .rp-work-meta .meta-col { display: flex; flex-direction: column; gap: 4px; }
  .rp-work-meta .meta-col.wide { grid-column: 1 / -1; }
  .rp-work-meta .meta-k {
    font: 500 10px/1 var(--font-mono);
    letter-spacing: .12em;
    color: var(--ink-50);
    text-transform: uppercase;
  }
  .rp-work-meta .meta-v {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink);
  }

  .rp-work-title-block { grid-area: title; min-width: 0; }
  .rp-work-title {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(36px, 4vw, 60px);
    line-height: 1.05;
    letter-spacing: -0.035em;
    color: var(--ink);
    display: flex; align-items: baseline; gap: 14px;
    text-wrap: balance;
  }
  html[data-type="serif"] .rp-work-title { font-weight: 300; letter-spacing: -0.02em; }
  .rp-work-arr {
    font-size: .4em;
    color: var(--accent);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .rp-work.is-hover .rp-work-arr {
    transform: translate(6px, -6px) rotate(0deg);
  }
  .rp-work-alt {
    margin-top: 8px;
    font: 300 17px/1.3 var(--font-display);
    font-style: italic;
    color: var(--ink-50);
    letter-spacing: 0;
  }
  html[data-type="sans"] .rp-work-alt { font-style: normal; font-weight: 400; font-family: var(--font-mono); font-size: 13px; }

  /* Signature / award emphasis */
  .rp-work-meta .meta-signature {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 2px;
    padding: 4px 10px 4px 8px;
    border: 1px solid var(--accent);
    border-radius: 999px;
    align-self: flex-start;
    color: var(--accent);
    background: color-mix(in oklab, var(--accent) 8%, transparent);
  }
  .rp-work-meta .meta-signature .sig-star { font-size: 11px; line-height: 1; }
  .rp-work-meta .meta-signature .sig-text {
    font: 600 11px/1 var(--font-mono);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .rp-work-award {
    display: inline-flex; align-items: center; gap: 9px;
    margin-top: 14px;
    padding: 7px 14px;
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    max-width: 100%;
  }
  .rp-work-award .award-medal { font-size: 11px; opacity: .85; }
  .rp-work-award span:last-child {
    font: 500 12.5px/1.35 var(--font-mono);
    letter-spacing: 0.01em;
  }

  .rp-detail-award {
    grid-column: 2;
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0 0;
    padding: 13px 18px;
    border-left: 3px solid var(--accent, var(--ink));
    background: color-mix(in oklab, var(--accent, var(--ink)) 9%, transparent);
  }
  .rp-detail-award-medal { color: var(--accent, var(--ink)); font-size: 14px; }
  .rp-detail-award-text {
    font: 500 15px/1.45 var(--font-mono);
    color: var(--ink);
    letter-spacing: 0.005em;
  }

  .rp-work-summary {
    grid-area: summary;
    max-width: 520px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-70);
  }

  .rp-work-preview {
    grid-area: preview;
    position: relative;
    width: 380px; height: 260px;
    background: var(--ink-06);
    overflow: hidden;
    border-radius: 4px;
  }
  .rp-work-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0; transition: opacity .25s ease, transform .6s ease;
  }
  .rp-work-img-meta {
    position: absolute; left: 12px; right: 12px; bottom: 10px;
    display: flex; justify-content: space-between;
    color: var(--paper);
    font: 500 11px/1 var(--font-mono);
    letter-spacing: .04em;
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .25s;
  }
  .rp-work.is-hover .rp-work-img-meta { opacity: 1; }
  .rp-work-scrub {
    position: absolute; top: 10px; left: 12px; right: 12px;
    display: flex; gap: 4px; opacity: 0;
    transition: opacity .25s;
  }
  .rp-work.is-hover .rp-work-scrub { opacity: 1; }
  .rp-work-scrub span {
    flex: 1; height: 2px;
    background: rgba(255,255,255,.4);
    transition: background .15s;
  }
  .rp-work-scrub span.on { background: #fff; }

  .rp-work-placeholder {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: var(--ink-50);
    font: 500 11px/1 var(--font-mono);
    letter-spacing: .12em; text-transform: uppercase;
    overflow: hidden;
  }
  .ph-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(4, 1fr);
  }
  .ph-grid span {
    border-right: 1px dashed var(--ink-12);
    border-bottom: 1px dashed var(--ink-12);
  }
  .ph-label { z-index: 2; background: var(--paper); padding: 6px 12px; }
  .rp-work.is-hover .ph-label { background: var(--accent); color: var(--paper); }

  /* ─────────────────────────── Archive ─────────────────────────── */
  .rp-archive { background: var(--paper); padding-bottom: 80px; }
  .rp-archive-list { padding: 0 48px; }
  .rp-archive-group {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 36px;
    padding: 32px 0;
    border-bottom: 1px solid var(--ink-30);
    align-items: start;
  }
  .rp-archive-group:last-child { border-bottom: 0; }
  .rp-archive-year {
    display: flex; align-items: baseline; gap: 6px;
    position: sticky; top: 90px;
  }
  .year-num {
    font: 500 32px/1 var(--font-display);
    color: var(--ink);
    letter-spacing: -0.035em;
  }
  html[data-type="serif"] .year-num,
  html[data-type="serif"] .year-mark { font-style: italic; font-weight: 300; }
  html[data-type="serif"] .year-num:lang(zh) { font-style: normal; }
  .year-mark { color: var(--accent); font: 500 28px/1 var(--font-display); }
  .year-count {
    margin-left: 4px;
    font: 500 10px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .1em;
    align-self: end; padding-bottom: 4px;
  }

  .rp-archive-rows { list-style: none; margin: 0; padding: 0; }
  .rp-archive-row { border-top: 1px solid var(--ink-12); }
  .rp-archive-row:first-child { border-top: 1px solid var(--ink-30); }
  .rp-archive-row .row-inner {
    display: grid;
    grid-template-columns: 44px 80px minmax(0, 1fr) 200px 24px;
    align-items: baseline;
    gap: 20px;
    padding: 14px 12px 14px 0;
    transition: padding .25s, background .25s, color .25s;
  }
  .rp-archive-row a.row-inner:hover,
  .rp-archive-row button.row-inner:hover {
    background: var(--ink);
    color: var(--paper);
    padding-left: 16px;
  }
  .rp-archive-row button.row-inner {
    appearance: none; border: 0;
    background: transparent;
    font: inherit; color: inherit;
    text-align: left;
    width: 100%;
    cursor: pointer;
  }
  html[data-motion="bold"] .rp-archive-row button.row-inner,
  html[data-motion="subtle"] .rp-archive-row button.row-inner { cursor: none; }
  .rp-archive-row.is-pending .row-inner { opacity: .62; }
  .rp-archive-row.is-pending a.row-inner:hover,
  .rp-archive-row.is-pending button.row-inner:hover { opacity: 1; }
  .r-no {
    font: 500 11px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .08em;
  }
  .rp-archive-row a.row-inner:hover .r-no,
  .rp-archive-row button.row-inner:hover .r-no { color: var(--accent); }
  .r-date {
    font: 500 11px/1 var(--font-mono);
    color: var(--ink-70); letter-spacing: .04em;
    font-variant-numeric: tabular-nums;
  }
  .rp-archive-row a.row-inner:hover .r-date,
  .rp-archive-row button.row-inner:hover .r-date { color: var(--paper); }
  .r-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.02em;
    display: inline-flex; align-items: baseline; gap: 10px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  html[data-type="serif"] .r-title { font-style: italic; font-weight: 400; font-size: 18px; letter-spacing: -0.01em; }
  html[data-type="serif"] .r-title:lang(zh) { font-style: normal; }
  html[data-type="sans"] .r-title { font-style: normal; font-weight: 500; }
  .rp-archive-row a.row-inner:hover .r-title,
  .rp-archive-row button.row-inner:hover .r-title { color: var(--paper); }
  .r-title .r-alt {
    font-style: normal;
    font: 400 11px/1 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .03em;
  }
  .rp-archive-row a.row-inner:hover .r-alt,
  .rp-archive-row button.row-inner:hover .r-alt { color: color-mix(in oklab, var(--paper) 60%, var(--ink)); }
  .r-type, .r-site {
    font: 400 12px/1.3 var(--font-mono);
    color: var(--ink-70);
    letter-spacing: .03em;
  }
  .rp-archive-row a.row-inner:hover .r-type,
  .rp-archive-row a.row-inner:hover .r-site,
  .rp-archive-row button.row-inner:hover .r-type,
  .rp-archive-row button.row-inner:hover .r-site { color: color-mix(in oklab, var(--paper) 70%, var(--ink)); }
  .r-arr {
    color: var(--ink-50);
    text-align: right;
    font: 400 13px/1 var(--font-mono);
  }
  .rp-archive-row a.row-inner:hover .r-arr,
  .rp-archive-row button.row-inner:hover .r-arr {
    color: var(--accent); transform: translateX(4px);
  }

  /* ─────────────────────────── About ──────────────────────────── */
  .rp-about { padding-bottom: 80px; }
  .rp-about-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 96px;
    padding: 60px 48px;
    align-items: start;
  }
  .rp-about-lead {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(36px, 4.4vw, 64px);
    line-height: 1.15;
    letter-spacing: -0.035em;
    color: var(--ink);
    position: relative;
    text-wrap: balance;
  }
  html[data-type="serif"] .rp-about-lead { font-weight: 300; font-style: italic; letter-spacing: -0.025em; }
  html[data-type="serif"] .rp-about-lead:lang(zh) { font-style: normal; }
  .rp-about-lead .quote-mark {
    display: inline-block;
    color: var(--accent);
    font-size: 1.4em;
    line-height: 1;
    margin-right: .1em;
    transition: transform .2s linear;
  }

  .rp-about-body { font-size: 15px; line-height: 1.7; color: var(--ink-70); }
  .rp-about-body p { margin: 0 0 24px; }
  .rp-bio-list {
    margin: 24px 0 0; padding: 0;
    border-top: 1px solid var(--ink-30);
    display: grid; grid-template-columns: 1fr; gap: 0;
  }
  .rp-bio-list > div {
    display: grid; grid-template-columns: 120px 1fr;
    gap: 24px;
    padding: 14px 0;
    border-bottom: 1px solid var(--ink-12);
  }
  .rp-bio-list dt {
    font: 500 11px/1.4 var(--font-mono);
    color: var(--ink-50); letter-spacing: .1em;
    text-transform: uppercase;
  }
  .rp-bio-list dd {
    margin: 0;
    font-size: 14px; color: var(--ink);
  }

  /* ─────────────────────────── Writing ────────────────────────── */
  .rp-writing { padding-bottom: 80px; }
  .rp-writing-list {
    list-style: none; margin: 0; padding: 0 48px;
  }
  .rp-writing-row { border-bottom: 1px solid var(--ink-12); }
  .rp-writing-row:first-child { border-top: 1px solid var(--ink-30); }
  .rp-writing-inner {
    appearance: none; border: 0; background: transparent;
    width: 100%; text-align: left; font: inherit;
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr) 32px;
    gap: 40px;
    align-items: baseline;
    padding: 30px 8px 30px 0;
    color: var(--ink);
    cursor: pointer;
    transition: padding .3s, color .25s;
  }
  html[data-motion="bold"] .rp-writing-inner,
  html[data-motion="subtle"] .rp-writing-inner { cursor: none; }
  .rp-writing-inner:hover { padding-left: 14px; color: var(--accent); }
  .rp-writing-inner .w-date {
    font: 500 12px/1.4 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .06em;
    font-variant-numeric: tabular-nums;
  }
  .rp-writing-inner:hover .w-date { color: var(--accent); }
  .rp-writing-inner .w-body { min-width: 0; }
  .rp-writing-inner .w-title {
    margin: 0 0 8px;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(22px, 2.1vw, 30px);
    letter-spacing: -0.025em;
    line-height: 1.15;
    color: var(--ink);
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  html[data-type="serif"] .rp-writing-inner .w-title { font-weight: 300; font-style: italic; letter-spacing: -0.015em; }
  html[data-type="serif"] .rp-writing-inner .w-title:lang(zh) { font-style: normal; }
  .rp-writing-inner:hover .w-title { color: var(--accent); }
  .rp-writing-inner .w-alt {
    font-style: normal;
    font: 400 11px/1 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .04em;
  }
  .rp-writing-inner .w-note {
    margin: 0;
    max-width: 640px;
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink-70);
    text-wrap: pretty;
  }
  html[data-type="serif"] .rp-writing-inner .w-note { font-family: var(--font-serif); font-size: 16px; }
  .rp-writing-inner .w-arr {
    text-align: right;
    font: 400 14px/1 var(--font-mono);
    color: var(--ink-30);
    transition: transform .3s, color .25s;
  }
  .rp-writing-inner:hover .w-arr { color: var(--accent); transform: translateX(4px); }

  /* Writing inner page */
  .rp-writing-detail-body {
    padding: 80px 48px 60px;
    display: flex; justify-content: center;
  }
  .rp-writing-detail-body .rp-detail-essay { max-width: 720px; width: 100%; }
  .rp-writing-detail-body .rp-detail-source { margin-top: 36px; }

  /* ─────────────────────────── Studio ─────────────────────────── */
  .rp-studio { background: var(--ink-06); padding-bottom: 100px; }
  .rp-studio-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 96px;
    padding: 60px 48px;
    align-items: start;
  }
  .rp-studio-body {
    margin: 0;
    font-family: var(--font-display);
    font-size: clamp(20px, 1.8vw, 26px);
    line-height: 1.5;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: -0.015em;
    text-wrap: pretty;
  }
  html[data-type="serif"] .rp-studio-body { font-style: italic; font-weight: 300; font-size: clamp(22px, 2vw, 28px); }
  html[data-type="serif"] .rp-studio-body:lang(zh) { font-style: normal; }
  .rp-studio-pillars {
    list-style: none; margin: 0; padding: 0;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
  }
  .rp-studio-pillars li {
    border-top: 1px solid var(--ink);
    padding-top: 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .pillar-k {
    font: 500 48px/1 var(--font-display);
    color: var(--accent);
    letter-spacing: -0.04em;
  }
  html[data-type="serif"] .pillar-k { font-weight: 300; font-style: italic; letter-spacing: -0.025em; }
  .rp-studio-pillars h4 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.025em;
    display: flex; align-items: baseline; gap: 8px;
  }
  html[data-type="serif"] .rp-studio-pillars h4 { font-weight: 400; letter-spacing: -0.015em; }
  .rp-studio-pillars h4 em {
    font-size: 12px;
    font-style: normal;
    font-family: var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .06em;
  }
  .rp-studio-pillars p {
    margin: 0; font-size: 14px; line-height: 1.55; color: var(--ink-70);
  }

  /* ─────────────────────────── Footer ─────────────────────────── */
  .rp-footer {
    background: var(--ink); color: var(--paper);
    --ink-30: color-mix(in oklab, var(--paper) 30%, var(--ink));
    --ink-50: color-mix(in oklab, var(--paper) 50%, var(--ink));
    --ink-70: color-mix(in oklab, var(--paper) 70%, var(--ink));
    --ink-12: color-mix(in oklab, var(--paper) 12%, var(--ink));
  }
  .rp-footer .head-title { color: var(--paper); }
  .rp-footer-body {
    display: grid; grid-template-columns: 1.6fr 1fr;
    gap: 96px;
    padding: 60px 48px;
  }
  .rp-links {
    list-style: none; margin: 0; padding: 0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border-top: 1px solid var(--ink-30);
  }
  .rp-links li {
    border-bottom: 1px solid var(--ink-30);
    border-right: 1px solid var(--ink-30);
  }
  .rp-links li:nth-child(even) { border-right: 0; }
  .rp-links a {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    padding: 22px 26px;
    color: var(--paper);
    transition: background .25s, padding .35s;
  }
  .rp-links a:hover {
    background: var(--accent);
    padding-left: 32px;
  }
  .rp-links .link-arr {
    font-family: var(--font-mono);
    color: var(--ink-50);
    font-size: 16px;
    transition: transform .35s, color .25s;
  }
  .rp-links a:hover .link-arr { color: var(--paper); transform: rotate(-45deg); }
  .rp-links .link-label {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: -0.025em;
    font-weight: 500;
  }
  html[data-type="serif"] .rp-links .link-label { font-style: italic; font-weight: 400; letter-spacing: -0.015em; }
  html[data-type="serif"] .rp-links .link-label:lang(zh) { font-style: normal; }
  .rp-links .link-sub {
    font: 400 12px/1.3 var(--font-mono);
    color: var(--ink-50);
    text-align: right;
    max-width: 200px;
  }
  .rp-links a:hover .link-sub { color: var(--paper); }

  .rp-footer-mail {
    display: flex; flex-direction: column; gap: 12px;
    padding-top: 8px;
  }
  .mail-k {
    font: 500 11px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .rp-footer-mail a {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.025em;
    border-bottom: 1px solid var(--ink-30);
    padding-bottom: 10px;
    transition: color .25s, border-color .25s;
  }
  html[data-type="serif"] .rp-footer-mail a { font-style: italic; font-weight: 400; letter-spacing: -0.015em; }
  html[data-type="serif"] .rp-footer-mail a:lang(zh) { font-style: normal; }
  .rp-footer-mail a:hover { color: var(--accent); border-color: var(--accent); }

  .rp-footer-bottom {
    border-top: 1px solid var(--ink-30);
    padding: 36px 48px 48px;
    display: grid; grid-template-columns: 1fr auto;
    gap: 36px; align-items: end;
  }
  .motto {
    display: flex; flex-direction: column; gap: 6px;
  }
  .motto-lg {
    font-family: var(--font-display);
    font-size: clamp(28px, 2.8vw, 44px);
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }
  html[data-type="serif"] .motto-lg { font-style: italic; font-weight: 300; letter-spacing: -0.015em; }
  html[data-type="serif"] .motto-lg:lang(zh) { font-style: normal; }
  .motto-sm {
    font: 400 13px/1.4 var(--font-mono);
    color: var(--ink-50); letter-spacing: .04em;
  }
  .colophon {
    display: flex; flex-direction: column; gap: 6px;
    text-align: right;
    font: 400 11px/1.5 var(--font-mono);
    color: var(--ink-50); letter-spacing: .04em;
  }

  /* ─────────────────────────── Detail overlay ─────────────────── */
  .rp-detail {
    position: fixed; inset: 0;
    background: var(--paper);
    color: var(--ink);
    z-index: 200;
    overflow-y: auto;
    overflow-x: hidden;
    animation: rp-detail-in .45s cubic-bezier(.2,.7,.2,1) both;
  }
  html[data-motion="static"] .rp-detail { animation: none; }
  @keyframes rp-detail-in {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .rp-detail-bar {
    position: sticky; top: 0; z-index: 5;
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 48px;
    background: linear-gradient(to bottom, var(--paper) 70%, color-mix(in oklab, var(--paper) 0%, transparent));
    border-bottom: 1px solid var(--ink-12);
  }
  .rp-detail-bar-l, .rp-detail-bar-r {
    display: inline-flex; align-items: center; gap: 14px;
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .06em;
    color: var(--ink-70);
  }
  .rp-detail-no { color: var(--ink); font-weight: 600; letter-spacing: .08em; }
  .rp-detail-sep { color: var(--ink-30); }
  .rp-detail-mono { font-family: var(--font-mono); }
  .rp-detail-counter { color: var(--ink-50); font-variant-numeric: tabular-nums; }

  .rp-detail-close {
    appearance: none; border: 0; background: transparent;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px 8px 8px;
    border-radius: 999px;
    color: var(--ink);
    transition: background .25s;
    position: relative;
  }
  .rp-detail-close:hover { background: var(--ink-06); }
  .rp-detail-close .x-arm {
    position: relative;
    width: 18px; height: 1px;
    background: var(--ink);
    display: inline-block;
  }
  .rp-detail-close .x-arm.a { transform: rotate(45deg); }
  .rp-detail-close .x-arm.b { transform: rotate(-45deg); margin-left: -18px; }
  .rp-detail-close-label {
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .08em;
  }

  .rp-detail-hero {
    padding: 100px 48px 60px;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 36px;
    align-items: start;
  }
  .rp-detail-hero-tag { padding-top: 10px; }
  .rp-detail-title {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(48px, 6vw, 88px);
    line-height: 1.02;
    letter-spacing: -0.04em;
    text-wrap: balance;
  }
  html[data-type="serif"] .rp-detail-title { font-weight: 300; letter-spacing: -0.025em; }
  .rp-detail-title em {
    display: block;
    font-style: normal;
    font: 400 16px/1.4 var(--font-mono);
    letter-spacing: .04em;
    color: var(--ink-50);
    margin-top: 18px;
  }
  .rp-detail-headline {
    grid-column: 2;
    margin: 24px 0 0;
    font-family: var(--font-display);
    font-size: clamp(20px, 1.9vw, 26px);
    line-height: 1.4;
    color: var(--accent);
    letter-spacing: -0.015em;
    max-width: 760px;
    font-weight: 500;
  }
  html[data-type="serif"] .rp-detail-headline { font-style: italic; font-weight: 300; }
  html[data-type="serif"] .rp-detail-headline:lang(zh) { font-style: normal; }

  .rp-detail-fig.hero {
    margin: 0;
    padding: 0 48px;
  }
  .rp-detail-fig.hero img {
    width: 100%;
    height: clamp(420px, 64vh, 720px);
    object-fit: cover;
    display: block;
    background: var(--ink-06);
  }
  .rp-detail-fig figcaption {
    display: flex; justify-content: space-between;
    margin-top: 12px;
    font: 400 12px/1.4 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .04em;
  }

  .rp-detail-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 80px;
    padding: 100px 48px 80px;
    align-items: start;
  }
  .rp-detail-meta {
    position: sticky; top: 88px;
    display: flex; flex-direction: column; gap: 26px;
  }
  .rp-detail-meta dl {
    margin: 0;
    border-top: 1px solid var(--ink-30);
  }
  .rp-detail-meta dl > div {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 18px;
    padding: 12px 0;
    border-bottom: 1px solid var(--ink-12);
  }
  .rp-detail-meta dt {
    font: 500 10px/1.4 var(--font-mono);
    color: var(--ink-50); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .rp-detail-meta dd {
    margin: 0;
    font: 500 13px/1.45 var(--font-mono);
    color: var(--ink);
    letter-spacing: .02em;
  }
  .rp-detail-sites { display: flex; flex-direction: column; gap: 10px; }
  .rp-detail-sites-k {
    font: 500 10px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .rp-detail-sites ol {
    list-style: none; margin: 0; padding: 0;
    display: flex; flex-direction: column; gap: 8px;
    border-top: 1px solid var(--ink-30);
    padding-top: 10px;
  }
  .rp-detail-sites li {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    align-items: baseline;
    font: 400 12px/1.45 var(--font-mono);
    color: var(--ink-70);
  }
  .rp-detail-sites li .rp-detail-mono { color: var(--accent); }

  .rp-detail-swatch {
    margin-top: 8px;
    padding: 18px 16px;
    border-radius: 4px;
    display: flex; justify-content: space-between;
    color: var(--paper);
    font-size: 11px;
    letter-spacing: .12em;
  }
  .rp-detail-source {
    display: flex; flex-direction: column; gap: 8px;
    border-top: 1px solid var(--ink-30);
    padding-top: 16px;
    transition: color .25s;
  }
  .rp-detail-source-k {
    font: 500 10px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .rp-detail-source-v {
    display: inline-flex; align-items: baseline; gap: 8px;
    font-family: var(--font-display);
    font-size: 18px; font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  html[data-type="serif"] .rp-detail-source-v { font-weight: 400; }
  .rp-detail-source-arr { color: var(--accent); font-size: 13px; transition: transform .3s; }
  .rp-detail-source:hover .rp-detail-source-v { color: var(--accent); }
  .rp-detail-source:hover .rp-detail-source-arr { transform: translate(3px, -3px); }

  .rp-detail-essay {
    max-width: 720px;
    font-family: var(--font-display);
    font-size: clamp(17px, 1.4vw, 19px);
    line-height: 1.7;
    color: var(--ink);
    text-wrap: pretty;
  }
  html[data-type="serif"] .rp-detail-essay { font-size: clamp(18px, 1.5vw, 21px); }
  .rp-detail-essay p { margin: 0 0 26px; }
  .rp-detail-essay p.lead {
    font-size: clamp(22px, 1.9vw, 28px);
    letter-spacing: -0.015em;
    color: var(--ink);
    font-weight: 500;
    line-height: 1.4;
  }
  html[data-type="serif"] .rp-detail-essay p.lead { font-weight: 400; font-style: italic; }
  html[data-type="serif"] .rp-detail-essay p.lead:lang(zh) { font-style: normal; }

  .rp-detail-chapters { padding: 0 48px 80px; }
  .rp-detail-chapters-head, .rp-detail-gallery-head, .rp-detail-press-head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-top: 1px solid var(--ink);
    padding-top: 18px; padding-bottom: 36px;
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .12em;
    color: var(--ink);
  }
  .rp-detail-chapters-count,
  .rp-detail-gallery-count { color: var(--ink-50); }

  .rp-detail-chapters ol {
    list-style: none; margin: 0; padding: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px 56px;
  }
  .rp-detail-chapters li {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 18px;
    padding: 24px 0 24px;
    border-top: 1px solid var(--ink-30);
    align-items: start;
  }
  .rp-detail-ch-no {
    font: 500 28px/1 var(--font-display);
    color: var(--accent);
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  html[data-type="serif"] .rp-detail-ch-no { font-style: italic; font-weight: 300; }
  .rp-detail-ch-body h3 {
    margin: 0 0 12px;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  html[data-type="serif"] .rp-detail-ch-body h3 { font-weight: 400; }
  .rp-detail-ch-body h3 em {
    display: block;
    font-style: normal;
    font: 400 11px/1.4 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .06em;
    margin-top: 4px;
  }
  .rp-detail-ch-body p {
    margin: 0;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-70);
  }

  .rp-detail-gallery { padding: 0 48px 80px; }
  .rp-detail-gallery-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: 160px;
    gap: 12px;
    grid-auto-flow: dense;
  }
  .rp-detail-plate {
    margin: 0;
    position: relative;
    grid-column: span 2;
    grid-row: span 2;
    overflow: hidden;
    background: var(--ink-06);
    border-radius: 2px;
  }
  .rp-detail-plate.wide { grid-column: span 3; grid-row: span 2; }
  .rp-detail-plate.tall { grid-column: span 2; grid-row: span 3; }
  .rp-detail-plate:nth-child(7n) { grid-column: span 4; grid-row: span 2; }
  .rp-detail-plate.wide:nth-child(7n) { grid-row: span 3; }
  .rp-detail-plate img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .8s cubic-bezier(.2,.7,.2,1);
  }
  .rp-detail-plate:hover img { transform: scale(1.04); }
  .rp-detail-plate figcaption {
    position: absolute; left: 10px; bottom: 8px;
    color: var(--paper);
    font: 500 10px/1 var(--font-mono);
    letter-spacing: .12em;
    background: rgba(0,0,0,.45);
    padding: 4px 8px; border-radius: 2px;
    opacity: 0; transition: opacity .25s;
  }
  .rp-detail-plate:hover figcaption { opacity: 1; }
  .rp-detail-plate, .rp-detail-fig.hero img { cursor: zoom-in; }
  html[data-motion="static"] .rp-detail-plate,
  html[data-motion="static"] .rp-detail-fig.hero img { cursor: zoom-in; }

  /* ─────────────────────────── Lightbox ───────────────────────── */
  .rp-lightbox {
    position: fixed; inset: 0; z-index: 300;
    background: color-mix(in oklab, var(--ink) 90%, #000);
    display: grid; place-items: center;
    padding: clamp(16px, 5vw, 64px);
    animation: rp-lightbox-in .28s cubic-bezier(.2,.7,.2,1) both;
  }
  html[data-motion="static"] .rp-lightbox { animation: none; }
  @keyframes rp-lightbox-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .rp-lightbox-fig {
    margin: 0;
    display: flex; flex-direction: column; gap: 14px; align-items: center;
    max-width: 94vw; max-height: 90vh;
  }
  .rp-lightbox-fig img {
    max-width: 94vw; max-height: 82vh;
    object-fit: contain;
    display: block;
    border-radius: 3px;
    background: color-mix(in oklab, var(--paper) 8%, transparent);
    box-shadow: 0 40px 100px rgba(0,0,0,.55);
    animation: rp-lightbox-pop .3s cubic-bezier(.2,.7,.2,1) both;
  }
  html[data-motion="static"] .rp-lightbox-fig img { animation: none; }
  @keyframes rp-lightbox-pop {
    from { opacity: 0; transform: scale(.97); }
    to   { opacity: 1; transform: scale(1); }
  }
  .rp-lightbox-cap {
    display: flex; gap: 16px; align-items: baseline;
    color: var(--paper);
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .12em;
  }
  .rp-lightbox-cap .lb-count { opacity: .6; }
  .rp-lightbox-cap .lb-blurb { opacity: .85; letter-spacing: .02em; }
  .rp-lightbox-close {
    position: fixed; top: 22px; right: 24px;
    appearance: none; border: 1px solid color-mix(in oklab, var(--paper) 40%, transparent);
    background: transparent; color: var(--paper);
    width: 44px; height: 44px; border-radius: 999px;
    display: grid; place-items: center;
    font: 400 18px/1 var(--font-mono);
    transition: background .2s, border-color .2s;
  }
  .rp-lightbox-close:hover { background: color-mix(in oklab, var(--paper) 14%, transparent); border-color: var(--paper); }
  .rp-lightbox-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    appearance: none; border: 1px solid color-mix(in oklab, var(--paper) 30%, transparent);
    background: transparent; color: var(--paper);
    width: 54px; height: 54px; border-radius: 999px;
    display: grid; place-items: center;
    font: 300 30px/1 var(--font-display);
    transition: background .2s, border-color .2s;
  }
  .rp-lightbox-nav:hover { background: color-mix(in oklab, var(--paper) 14%, transparent); border-color: var(--paper); }
  .rp-lightbox-nav.prev { left: clamp(12px, 3vw, 36px); }
  .rp-lightbox-nav.next { right: clamp(12px, 3vw, 36px); }

  /* ───────────────────── Detail film (video) ─────────────────── */
  .rp-detail-film { padding: 0 48px 80px; }
  .rp-detail-film-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 24px;
  }
  .rp-detail-film-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--ink-12);
  }
  .rp-detail-film-frame iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0; display: block;
  }
  .rp-detail-film-item { display: flex; flex-direction: column; gap: 12px; }
  .rp-detail-film-link {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 10px 4px;
    color: var(--ink);
    text-decoration: none;
    border-top: 1px solid var(--ink-12);
    transition: color .25s, padding-left .25s;
  }
  .rp-detail-film-link:hover { color: var(--accent, var(--ink)); padding-left: 10px; }
  .rp-detail-film-link .rp-detail-mono { color: var(--ink-30); }
  .rp-detail-film-arrow { font-size: 14px; opacity: .6; }
  @media (max-width: 1100px) {
    .rp-detail-film { padding: 0 24px 60px; }
    .rp-detail-film-grid { grid-template-columns: 1fr; }
  }

  .rp-detail-press { padding: 0 48px 100px; }
  .rp-detail-press ul {
    list-style: none; margin: 0; padding: 0;
    border-top: 1px solid var(--ink-30);
  }
  .rp-detail-press li { border-bottom: 1px solid var(--ink-12); }
  .rp-detail-press a, .rp-detail-press div {
    display: grid;
    grid-template-columns: 120px 200px 1fr 40px;
    gap: 24px;
    align-items: baseline;
    padding: 18px 4px;
    color: var(--ink);
    transition: background .25s, padding .25s;
  }
  .rp-detail-press a:hover { background: var(--ink); color: var(--paper); padding-left: 12px; }
  .rp-press-date {
    font: 500 12px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .04em;
    font-variant-numeric: tabular-nums;
  }
  .rp-detail-press a:hover .rp-press-date { color: color-mix(in oklab, var(--paper) 60%, var(--ink)); }
  .rp-press-source {
    font-family: var(--font-display); font-size: 18px;
    letter-spacing: -0.02em; font-weight: 500;
  }
  html[data-type="serif"] .rp-press-source { font-weight: 400; }
  .rp-press-label {
    font-family: var(--font-display); font-size: 16px;
    color: var(--ink-70); font-weight: 400;
    letter-spacing: -0.01em;
  }
  .rp-detail-press a:hover .rp-press-label { color: color-mix(in oklab, var(--paper) 80%, var(--ink)); }
  .rp-press-arr { color: var(--accent); text-align: right; }
  .rp-detail-press a:hover .rp-press-arr { color: var(--paper); }

  .rp-detail-foot {
    border-top: 1px solid var(--ink);
    padding: 36px 48px 60px;
  }
  .rp-detail-next {
    appearance: none; border: 0;
    width: 100%;
    background: transparent;
    display: grid;
    grid-template-columns: 220px 1fr 60px;
    gap: 36px;
    align-items: center;
    padding: 24px 4px;
    color: var(--ink);
    text-align: left;
    transition: padding .35s, color .25s;
  }
  .rp-detail-next:hover { padding-left: 24px; color: var(--accent); }
  .rp-detail-next-k {
    font: 500 12px/1 var(--font-mono);
    color: var(--ink-50); letter-spacing: .12em;
    text-transform: uppercase;
  }
  .rp-detail-next-v {
    font-family: var(--font-display);
    font-size: clamp(28px, 2.8vw, 44px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1.1;
    display: inline-flex; align-items: baseline; gap: 16px;
  }
  html[data-type="serif"] .rp-detail-next-v { font-weight: 300; }
  .rp-detail-next-v em {
    font-style: normal;
    font: 500 13px/1 var(--font-mono);
    color: var(--ink-50);
    letter-spacing: .04em;
  }
  .rp-detail-next-arr {
    font: 500 32px/1 var(--font-display);
    color: var(--accent);
    text-align: right;
  }

  /* Make work rows feel clickable */
  .rp-work {
    cursor: pointer;
  }
  html[data-motion="static"] .rp-work { cursor: pointer; }

  /* ─────────────────── Archive detail (lightweight) ───────────── */
  .rp-arch-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 80px;
    padding: 80px 48px 40px;
    align-items: start;
  }
  .rp-arch-main { max-width: 760px; }
  .rp-arch-plate {
    position: relative;
    height: clamp(220px, 32vh, 340px);
    background: var(--ink-06);
    border-radius: 3px;
    overflow: hidden;
    display: grid; place-items: center;
    margin-bottom: 36px;
  }
  .rp-arch-plate .ph-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(4, 1fr);
  }
  .rp-arch-plate .ph-grid span {
    border-right: 1px dashed var(--ink-12);
    border-bottom: 1px dashed var(--ink-12);
  }
  .rp-arch-plate-label {
    position: relative; z-index: 2;
    background: var(--paper);
    padding: 8px 16px;
    font: 500 12px/1.3 var(--font-mono);
    letter-spacing: .08em;
    color: var(--ink-70);
    text-align: center;
    max-width: 80%;
  }
  .rp-arch-note {
    margin: 0 0 30px;
    font-family: var(--font-display);
    font-size: clamp(17px, 1.4vw, 20px);
    line-height: 1.65;
    color: var(--ink);
    text-wrap: pretty;
    max-width: 640px;
  }
  html[data-type="serif"] .rp-arch-note { font-style: italic; }
  html[data-type="serif"] .rp-arch-note:lang(zh) { font-style: normal; }
  .rp-arch-cta {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    border-top: 1px solid var(--ink-30);
    padding-top: 28px;
  }
  @media (max-width: 1100px) {
    .rp-arch-body { grid-template-columns: 1fr; gap: 40px; padding: 48px 24px 32px; }
  }

  /* ─────────────── Objects · 天臺上的人類學家 ─────────────── */
  .rp-objects { padding-bottom: 80px; }
  .rp-objects-intro {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-areas: "eyebrow source" "lead source";
    align-items: end;
    gap: 6px 32px;
    padding: 40px 48px 44px;
  }
  .rp-objects-eyebrow {
    grid-area: eyebrow;
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .rp-objects-lead {
    grid-area: lead;
    margin: 0;
    max-width: 720px;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(22px, 2.3vw, 34px);
    line-height: 1.25;
    letter-spacing: -0.025em;
    color: var(--ink);
    text-wrap: balance;
  }
  html[data-type="serif"] .rp-objects-lead { font-weight: 300; font-style: italic; }
  html[data-type="serif"] .rp-objects-lead:lang(zh) { font-style: normal; }
  .rp-objects-src {
    grid-area: source;
    align-self: end;
    display: inline-flex; align-items: baseline; gap: 8px;
    font: 500 12.5px/1 var(--font-mono);
    letter-spacing: .03em;
    color: var(--ink-50);
    border-bottom: 1px solid var(--ink-30);
    padding-bottom: 6px;
    transition: color .25s, border-color .25s;
  }
  .rp-objects-src:hover { color: var(--accent); border-color: var(--accent); }
  .rp-objects-src-arr { color: var(--accent); }

  .rp-objects-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 0 48px;
  }

  .rp-obj-card {
    position: relative;
    display: flex; flex-direction: column;
    background: var(--paper);
    border: 1px solid var(--ink-30);
    border-radius: 3px;
    overflow: hidden;
    transition: transform .4s cubic-bezier(.2,.7,.2,1), box-shadow .4s, border-color .3s;
  }
  .rp-obj-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0; background: var(--accent); z-index: 3;
    transition: width .45s cubic-bezier(.2,.7,.2,1);
  }
  .rp-obj-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 24px 60px -28px color-mix(in oklab, var(--ink) 60%, transparent);
    border-color: var(--ink);
  }
  .rp-obj-card:hover::before { width: 5px; }
  html[data-motion="static"] .rp-obj-card:hover { transform: none; }

  .rp-obj-card.is-featured {
    grid-column: 1 / -1;
    flex-direction: row;
  }
  .rp-obj-card.is-featured .rp-obj-figure {
    width: 46%; flex-shrink: 0; aspect-ratio: auto; height: auto;
    border-bottom: 0; border-right: 1px solid var(--ink-12);
  }
  .rp-obj-card.is-featured .rp-obj-body { flex: 1; }

  .rp-obj-figure {
    position: relative; margin: 0;
    aspect-ratio: 7 / 5;
    background: var(--ink-06);
    overflow: hidden;
    border-bottom: 1px solid var(--ink-12);
  }
  .rp-obj-figure img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform .8s cubic-bezier(.2,.7,.2,1);
  }
  .rp-obj-card:hover .rp-obj-figure img { transform: scale(1.04); }
  .rp-obj-no, .rp-obj-date {
    position: absolute; top: 12px;
    font: 500 11px/1 var(--font-mono);
    letter-spacing: .08em;
    color: var(--paper);
    background: color-mix(in oklab, var(--ink) 78%, transparent);
    padding: 5px 9px; border-radius: 2px;
    backdrop-filter: blur(3px);
  }
  .rp-obj-no { left: 12px; color: var(--paper); }
  .rp-obj-date { right: 12px; }

  .rp-obj-body {
    display: flex; flex-direction: column;
    gap: 18px;
    padding: 24px 26px 22px;
  }
  .rp-obj-head { display: flex; flex-direction: column; gap: 3px; }
  .rp-obj-name {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(22px, 2vw, 30px);
    line-height: 1.1; letter-spacing: -0.025em;
    color: var(--ink);
  }
  html[data-type="serif"] .rp-obj-name { font-weight: 400; letter-spacing: -0.015em; }
  .rp-obj-alt {
    font: 400 12px/1.3 var(--font-mono);
    color: var(--ink-50); letter-spacing: .02em;
  }
  .rp-obj-place {
    margin-top: 6px;
    font: 500 11px/1.4 var(--font-mono);
    letter-spacing: .06em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .rp-obj-tax {
    margin: 0;
    border-top: 1px solid var(--ink-30);
    display: grid; grid-template-columns: 1fr;
  }
  .rp-obj-tax-row {
    display: grid; grid-template-columns: 56px 1fr;
    gap: 14px; align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dashed var(--ink-12);
  }
  .rp-obj-tax-row dt {
    font: 500 10px/1.4 var(--font-mono);
    letter-spacing: .1em;
    color: var(--ink-50);
    text-transform: uppercase;
  }
  .rp-obj-tax-row dd {
    margin: 0;
    font: 400 12.5px/1.45 var(--font-mono);
    color: var(--ink);
    text-wrap: pretty;
  }

  .rp-obj-pull {
    margin: 0;
    font-family: var(--font-display);
    font-size: 15px; line-height: 1.5;
    color: var(--ink-70);
    font-style: italic;
    text-wrap: pretty;
  }
  html[data-type="sans"] .rp-obj-pull { font-style: normal; }
  .rp-obj-pull:lang(zh) { font-style: normal; }

  .rp-obj-foot {
    margin-top: auto;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
    border-top: 1px solid var(--ink-12);
    padding-top: 16px;
  }
  .rp-obj-tags { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 6px; }
  .rp-obj-tags li {
    font: 500 10px/1 var(--font-mono);
    letter-spacing: .06em;
    color: var(--ink-70);
    border: 1px solid var(--ink-30);
    border-radius: 999px;
    padding: 5px 10px;
  }
  .rp-obj-tags.wide li { padding: 6px 12px; font-size: 11px; }
  .rp-obj-cta {
    display: inline-flex; align-items: center; gap: 8px;
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .06em;
    color: var(--ink);
    white-space: nowrap;
  }
  .rp-obj-card:hover .rp-obj-cta { color: var(--accent); }
  .rp-obj-cta-arr { transition: transform .3s; }
  .rp-obj-card:hover .rp-obj-cta-arr { transform: translateX(4px); }

  /* Object detail — taxonomy card in the sidebar */
  .rp-obj-taxcard {
    border-top: 2px solid var(--accent);
    padding-top: 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .rp-obj-taxcard-k {
    font: 500 10px/1 var(--font-mono);
    color: var(--accent); letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .rp-obj-taxcard dl { margin: 0; }
  .rp-obj-taxcard dl > div {
    display: grid; grid-template-columns: 64px 1fr;
    gap: 14px; padding: 10px 0;
    border-bottom: 1px solid var(--ink-12);
  }
  .rp-obj-taxcard dt {
    font: 500 10px/1.4 var(--font-mono);
    color: var(--ink-50); letter-spacing: .1em;
    text-transform: uppercase;
  }
  .rp-obj-taxcard dd {
    margin: 0;
    font: 400 12.5px/1.45 var(--font-mono);
    color: var(--ink);
    text-wrap: pretty;
  }
  .rp-obj-tags-block { display: flex; flex-direction: column; gap: 10px; }
  .rp-obj-gloss {
    margin: 0;
    font: 400 12px/1.6 var(--font-mono);
    color: var(--ink-70);
    letter-spacing: .01em;
    border-left: 2px solid var(--ink-30);
    padding: 4px 0 4px 14px;
    text-wrap: pretty;
  }

  @media (max-width: 1000px) {
    .rp-objects-grid { grid-template-columns: 1fr; }
    .rp-obj-card.is-featured { flex-direction: column; }
    .rp-obj-card.is-featured .rp-obj-figure {
      width: 100%; aspect-ratio: 7 / 5;
      border-right: 0; border-bottom: 1px solid var(--ink-12);
    }
    .rp-objects-intro { grid-template-columns: 1fr; grid-template-areas: "eyebrow" "lead" "source"; gap: 12px; }
    .rp-objects-src { justify-self: start; }
  }

  /* ───────────────── Motion-static overrides ─────────────────── */
  html[data-motion="static"] * {
    transition: none !important;
    animation: none !important;
  }
  html[data-motion="static"] .rp-work:hover { background: var(--ink-06); }

  /* ───────────────────── Layout safety ──────────────────────── */
  @media (max-width: 1100px) {
    .rp-hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .rp-work { grid-template-columns: 1fr 1fr; grid-template-areas:
        "meta preview"
        "title title"
        "summary summary";
    }
    .rp-work-preview { width: 100%; }
    .rp-about-grid, .rp-studio-grid, .rp-footer-body { grid-template-columns: 1fr; gap: 48px; }
    .rp-studio-pillars { grid-template-columns: 1fr; }
    .rp-links { grid-template-columns: 1fr; }
    .rp-links li:nth-child(even) { border-right: 0; }
  }

  /* ════════════════════════════════════════════════════════════════
     MUSEUM LAYER — Neues-Museum-style reskin (white / black / terracotta)
     Big uppercase neo-grotesk · hairline rules · exhibition-list works
     ════════════════════════════════════════════════════════════════ */

  body { font-size: 15px; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--ink); color: var(--paper); }

  /* Square off the soft/pill shapes — museum is sharp & flush */
  .rp-cta-btn, .rp-lang-toggle, .rp-cta-ghost, .rp-nav a,
  .rp-obj-tags li, .rp-work-figure, .rp-obj-card, .rp-obj-figure,
  .rp-detail-fig.hero img, .rp-detail-plate, .rp-work-preview {
    border-radius: 0 !important;
  }

  /* Progress strip + scroll-hint accent */
  .rp-progress { height: 2px; background: var(--ink); }

  /* ── Header ─────────────────────────────────────────────── */
  .rp-header { padding: 22px 48px; background: linear-gradient(to bottom, var(--paper) 70%, transparent); }
  .rp-header-mark .mark-text { letter-spacing: .12em; font-weight: 700; }
  .rp-header-mark .mark-square { border-radius: 0; }
  .rp-nav a { letter-spacing: .1em; text-transform: uppercase; }
  .rp-nav a:hover { background: transparent; color: var(--accent); }
  .rp-nav .nav-num { color: var(--accent); }
  .rp-lang-toggle { letter-spacing: .16em; border-color: var(--ink); gap: 6px; }
  .rp-lang-toggle .lang-opt { color: var(--ink-50); transition: color .2s; }
  .rp-lang-toggle .lang-opt.on { color: var(--ink); }
  .rp-lang-toggle .lang-opt:hover { color: var(--accent); }

  /* ── Hero: museum masthead ─────────────────────────────── */
  .rp-hero { min-height: 100vh; padding: 150px 48px 56px; }
  .rp-tagline {
    font-family: var(--font-grotesk) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    font-size: clamp(56px, 8.4vw, 136px) !important;
    line-height: .9 !important;
    letter-spacing: -0.025em !important;
  }
  .rp-tagline .tagline-line.indent { padding-left: 0; font-style: normal !important; }
  .rp-tagline .tagline-aster { color: var(--accent); font-size: .42em; }
  .rp-intro {
    font-family: var(--font-sans) !important;
    font-style: normal !important;
    font-weight: 400 !important;
    font-size: 18px !important;
    line-height: 1.6 !important;
    max-width: 560px;
    color: var(--ink-70) !important;
  }
  .rp-sub-tagline { letter-spacing: .14em; text-transform: uppercase; }
  .rp-sub-tagline .sub-prefix { color: var(--accent); }
  .rp-hero-meta { letter-spacing: .14em; }
  .rp-hero-meta .dot { background: var(--accent); border-radius: 0; }
  .rp-coord-block { border-top: 1px solid var(--ink); }
  .rp-cta-btn { background: var(--ink); color: var(--paper); letter-spacing: .14em; text-transform: uppercase; padding: 18px 26px; }
  .rp-cta-btn:hover { background: var(--accent); }
  .rp-cta-btn .cta-arr { border-radius: 0; }
  .ghost-v { font-family: var(--font-mono); font-size: 14px; letter-spacing: .02em; }
  .rp-scroll-hint { letter-spacing: .18em; }

  /* ── Marquee: inverted, hairline, spaced caps ──────────── */
  .rp-marquee { background: var(--paper); color: var(--ink); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); padding: 11px 0; }
  .rp-marquee-item { letter-spacing: .22em; font-weight: 500; }
  .mq-glyph { color: var(--accent); }

  /* ── Section heads: eyebrow over giant uppercase title ─── */
  .rp-section-head { padding: clamp(88px, 9vw, 150px) 48px 30px; border-bottom: 1px solid var(--ink); align-items: end; }
  .rp-section-head.dim { border-bottom-color: var(--ink); }
  .rp-section-head .head-l { flex-direction: column; align-items: flex-start; gap: 16px; }
  .rp-section-head .head-tag { font-family: var(--font-mono); letter-spacing: .2em; text-transform: uppercase; color: var(--accent); font-size: 12px; }
  .rp-section-head .head-title {
    font-family: var(--font-grotesk) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    letter-spacing: -0.02em !important;
    font-style: normal !important;
    font-size: clamp(36px, 4.8vw, 78px) !important;
    line-height: .92 !important;
  }
  .rp-section-head .head-r { font-family: var(--font-mono); letter-spacing: .1em; text-transform: uppercase; }

  /* ── WORKS · exhibition list (big figure + giant title) ── */
  .rp-works { padding-bottom: 0; }
  .rp-works-list { display: flex; flex-direction: column; }
  .rp-work {
    display: grid;
    grid-template-columns: minmax(0, 1.12fr) minmax(0, 1fr);
    grid-template-areas: none;
    grid-template-rows: auto;
    gap: clamp(36px, 4.5vw, 84px);
    align-items: center;
    padding: clamp(54px, 6.5vw, 104px) 48px;
    border-bottom: 1px solid var(--ink);
    background: var(--paper);
  }
  .rp-work.is-hover { background: var(--paper); }
  .rp-work::before { display: none; }
  .rp-work:nth-child(even) .rp-work-figure { order: 2; }

  .rp-work-figure {
    grid-area: auto;
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: var(--ink-06);
    overflow: hidden;
  }
  .rp-work-figure .rp-work-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: opacity .35s ease, transform .9s cubic-bezier(.2,.7,.2,1);
  }
  .rp-work-figmeta {
    position: absolute; left: 14px; right: 14px; bottom: 12px;
    display: flex; justify-content: space-between; gap: 16px;
    color: var(--paper);
    font: 500 11px/1.3 var(--font-mono);
    letter-spacing: .1em; text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,.55);
    opacity: 0; transition: opacity .3s;
  }
  .rp-work.is-hover .rp-work-figmeta { opacity: 1; }
  .rp-work-scrub { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; gap: 4px; opacity: 0; transition: opacity .3s; }
  .rp-work.is-hover .rp-work-scrub { opacity: 1; }
  .rp-work-scrub span { flex: 1; height: 2px; background: rgba(255,255,255,.45); transition: background .15s; }
  .rp-work-scrub span.on { background: #fff; }
  .rp-work .rp-work-placeholder { position: absolute; inset: 0; }

  .rp-work-info { display: flex; flex-direction: column; align-items: flex-start; gap: clamp(14px, 1.4vw, 22px); }
  .rp-work-topline {
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    font: 500 12px/1 var(--font-mono);
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink-50);
  }
  .rp-work-topline .w-no { color: var(--ink); font-weight: 600; }
  .rp-work-topline .w-sep { color: var(--ink-30); }
  .rp-work-topline .w-date { color: var(--ink); font-variant-numeric: tabular-nums; }
  .rp-work-topline .w-type { color: var(--accent); }
  .rp-work-topline .w-sig {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px; border: 1px solid var(--accent); color: var(--accent);
    letter-spacing: .14em;
  }
  .rp-work-title {
    margin: 0;
    font-family: var(--font-grotesk) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    font-size: clamp(38px, 4.6vw, 86px) !important;
    line-height: .92 !important;
    letter-spacing: -0.025em !important;
    color: var(--ink);
    display: block;
  }
  .rp-work.is-hover .rp-work-title { color: var(--ink); }
  .rp-work-title .rp-work-arr {
    display: inline-block; font-size: .26em; color: var(--accent);
    vertical-align: middle; margin-left: .25em;
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .rp-work.is-hover .rp-work-arr { transform: translate(8px, -8px); }
  .rp-work-alt {
    margin-top: 0;
    font: 400 13px/1.4 var(--font-mono) !important;
    font-style: normal !important;
    letter-spacing: .04em;
    color: var(--ink-50);
    text-transform: uppercase;
  }
  .rp-work-summary { grid-area: auto; max-width: 540px; font-family: var(--font-sans); font-size: 15px; line-height: 1.65; color: var(--ink-70); }
  .rp-work-award { display: inline-flex; align-items: center; gap: 9px; padding: 7px 13px; background: var(--accent); color: #fff; border-radius: 0; }
  .rp-work-award .award-medal { font-size: 11px; opacity: .9; }
  .rp-work-award span:last-child { font: 500 12px/1.35 var(--font-mono); letter-spacing: .02em; }
  .rp-work-foot { display: flex; align-items: center; justify-content: space-between; gap: 24px; width: 100%; border-top: 1px solid var(--ink); padding-top: 18px; margin-top: 4px; }
  .rp-work-site { font: 500 12px/1.4 var(--font-mono); letter-spacing: .08em; text-transform: uppercase; color: var(--ink-70); max-width: 70%; }
  .rp-work-cta { display: inline-flex; align-items: center; gap: 10px; font: 600 12px/1 var(--font-mono); letter-spacing: .16em; text-transform: uppercase; color: var(--ink); white-space: nowrap; }
  .rp-work.is-hover .rp-work-cta { color: var(--accent); }
  .rp-work-cta-arr { transition: transform .3s; }
  .rp-work.is-hover .rp-work-cta-arr { transform: translateX(5px); }

  @media (max-width: 1100px) {
    .rp-work { grid-template-columns: 1fr; gap: 28px; padding: 56px 24px; }
    .rp-work:nth-child(even) .rp-work-figure { order: 0; }
    .rp-work-summary { max-width: none; }
  }

  /* ── Archive ───────────────────────────────────────────── */
  .rp-archive-row:first-child, .rp-archive-row .row-inner { }
  .rp-archive-row a.row-inner:hover, .rp-archive-row button.row-inner:hover { background: var(--ink); color: var(--paper); }
  .year-num { font-family: var(--font-grotesk); font-weight: 800; letter-spacing: -0.02em; }
  .year-mark { color: var(--accent); }
  .r-title { font-family: var(--font-grotesk); font-weight: 600; text-transform: uppercase; letter-spacing: 0; font-style: normal !important; }
  .r-alt { text-transform: uppercase; }

  /* ── About ─────────────────────────────────────────────── */
  .rp-about-lead {
    font-family: var(--font-grotesk) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    font-style: normal !important;
    letter-spacing: -0.02em !important;
    line-height: .98 !important;
  }
  .rp-about-lead .quote-mark { color: var(--accent); }
  .rp-bio-list { border-top: 1px solid var(--ink); }

  /* ── Writing ───────────────────────────────────────────── */
  .rp-writing-inner .w-title {
    font-family: var(--font-grotesk) !important;
    font-weight: 700 !important;
    text-transform: uppercase;
    font-style: normal !important;
    letter-spacing: -0.01em !important;
  }
  .rp-writing-inner:hover .w-title { color: var(--accent); }
  .rp-writing-inner .w-alt { text-transform: uppercase; }

  /* ── Studio ────────────────────────────────────────────── */
  .rp-studio { background: var(--paper); }
  .rp-studio-body { font-family: var(--font-sans) !important; font-style: normal !important; font-weight: 400 !important; }
  .rp-studio-pillars li { border-top: 1px solid var(--ink); }
  .pillar-k { font-family: var(--font-grotesk) !important; font-weight: 800 !important; font-style: normal !important; color: var(--accent); }
  .rp-studio-pillars h4 { font-family: var(--font-grotesk) !important; font-weight: 700 !important; text-transform: uppercase; letter-spacing: -0.01em; }

  /* ── Footer ────────────────────────────────────────────── */
  .rp-footer { background: var(--ink); color: var(--paper); }
  .rp-footer .head-title { color: var(--paper) !important; }
  .rp-links { border-top: 1px solid var(--ink-30); }
  .rp-links .link-label { font-family: var(--font-grotesk) !important; font-weight: 700 !important; text-transform: uppercase; font-style: normal !important; letter-spacing: -0.01em !important; }
  .rp-links a:hover { background: var(--accent); }
  .rp-footer-mail a { font-family: var(--font-grotesk) !important; font-weight: 700 !important; text-transform: none; font-style: normal !important; }
  .motto-lg { font-family: var(--font-grotesk) !important; font-weight: 800 !important; text-transform: uppercase; font-style: normal !important; letter-spacing: -0.015em !important; }

  /* ── Detail overlay ────────────────────────────────────── */
  .rp-detail-title { font-family: var(--font-grotesk) !important; font-weight: 800 !important; text-transform: uppercase; font-style: normal !important; letter-spacing: -0.03em !important; line-height: .92 !important; }
  .rp-detail-headline { font-family: var(--font-sans) !important; font-style: normal !important; font-weight: 500 !important; color: var(--accent) !important; }
  .rp-detail-essay p.lead { font-family: var(--font-grotesk) !important; font-weight: 600 !important; text-transform: none; font-style: normal !important; }
  .rp-detail-next-v { font-family: var(--font-grotesk) !important; font-weight: 800 !important; text-transform: uppercase; font-style: normal !important; }
  .rp-detail-ch-body h3 { font-family: var(--font-grotesk) !important; font-weight: 700 !important; text-transform: uppercase; font-style: normal !important; }
  .rp-detail-ch-no { font-family: var(--font-grotesk) !important; font-weight: 800 !important; font-style: normal !important; color: var(--accent); }
  .rp-press-source { font-family: var(--font-grotesk) !important; font-weight: 700 !important; text-transform: uppercase; }

  /* ── Objects ───────────────────────────────────────────── */
