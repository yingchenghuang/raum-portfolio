  messenger: {
    headline_zh: '每一本書，都是一隻青鳥',
    headline_en: 'Every book, a bluebird',
    essay_zh: [
      '行動力，未來城市的競爭力關鍵在於人才的聚集以及交流，城市的活力取決於人的交集與創意，勇敢的跨越投射出台灣人的形象。不同的人，不同的書 —— 每個人有著自己獨特的興趣、觀點和背景，因此所閱讀的書籍也不同。每本書都像一隻青鳥，展翅高飛，擁有自己的獨特之處。',
      '書籍是人類文明的寶藏，包含著人類智慧的累積與傳承。透過閱讀，我們可以探索各種主題、瞭解不同的觀點，開拓思維，增加知識與理解。書籍可以啟發我們的想像力，擴大我們的視野，讓我們更好地了解自己和世界。',
      '青鳥則象徵著自由、美麗和創造力。書籍就像是給青鳥的翅膀，讓我們能夠自由地飛翔到不同的時代、地方和想像空間。透過閱讀，我們可以和作者對話，與他們的思想和情感互相連結，並在心靈的旅程中獲得啟示和成長。',
      'Re:New 回應未來世代 —— 展翅飛翔的青鳥找尋到生命中幸福的靈光，書頁象徵每一位市民的智慧閃爍斑斕，靈光一閃的知識累積成為無限的能量，集結每一位市民的知識與靈光碎片思緒。從個體到集體思考、同理心，相互理解與扶持、找到共同價值，生氣勃勃地飛向朝陽。在自由的天空，我們一起翱翔天際，展開的視野到全世界。',
    ],
    essay_en: [
      'Mobility — the future city’s competitiveness rests on the gathering and exchange of talent; a city’s vitality depends on the intersection of people and their creativity, the courage to cross over projecting the image of Taiwan. Different people, different books: each of us has our own interests, viewpoints and background, so each reads differently. Every book is like a bluebird, spreading its wings, with a singularity of its own.',
      'Books are the treasure of human civilisation, holding the accumulation and inheritance of human wisdom. Through reading we explore every theme, understand differing views, open the mind, and grow in knowledge and understanding. Books kindle our imagination, widen our horizons, and let us know ourselves and the world more fully.',
      'The bluebird stands for freedom, beauty and creativity. Books are the wings given to the bird, letting us fly freely across eras, places and spaces of imagination. Through reading we converse with authors, connect with their thoughts and feelings, and find revelation and growth on the journey of the heart.',
      'Re:New — Responding to Future Generations: the soaring bluebird finds the light of happiness in life; the pages of books stand for each citizen’s shimmering, many-coloured wisdom. Knowledge sparked in an instant accumulates into boundless energy, gathering every citizen’s knowledge and luminous fragments of thought. From the individual to collective thinking and empathy — understanding and supporting one another, finding shared value — we fly vigorously toward the morning sun. In the free sky we soar together, opening our view to the whole world.',

  railway: {
    headline_zh: '把城市，轉譯成一道無形的光',
    headline_en: 'Translating the city into invisible light',
    essay_zh: [
      '在現代科技高度發達的時代，火車作為一種古老的交通工具，似乎在生活中變得越來越陌生。然而，在某些城鎮中，鐵道與城鎮的生活緊密結合，形成了一個獨特的生活感知場域，對居民的日常生活產生深遠的影響。火車經過的聲音、震動和光線，都成為城鎮中不可或缺的一部分。',
      '在這個生活感知場域中，火車的光線尤其引人注目。火車頭、車廂和軌道上的光線，經常在城鎮的建築物和街道上投下獨特的光影，將城鎮擬態成一個異常的世界。這種微妙的轉變不僅僅是視覺上的變化，更是一種對於日常生活的感知與體驗。',
      '運用火車的光線和城鎮中的建築物、街道元素，來探討城鎮的美學涵養。透過對光線和影子的運用，突顯城鎮中的新舊對話 —— 現代科技與古老建築之間的對比，火車的科技概念與城鎮中的歷史建築相映成趣。',
      '以車站為中心，城鎮的鐵道與 1 公里內的生活圈展現樣態；城鎮與地形地貌的關係，參數化後轉譯為色彩樣態，數值化後的城市樣貌。苗栗縣 16 個車站與其 1 公里半徑內的生活圈，因不同地形而有不同的轉譯 —— 將城市轉譯成無形的光。',
    ],
    essay_en: [
      'In an age of advanced technology, the train — an old means of travel — feels increasingly unfamiliar in daily life. Yet in certain towns, railway and town-life are tightly bound, forming a distinct field of lived perception that profoundly shapes residents’ days. The sound, the tremor and the light of a passing train all become an indispensable part of the town.',
      'Within this field of perception, the train’s light is especially striking. The light from the locomotive, carriages and tracks casts singular shadows across the town’s buildings and streets, miming the town into an other world. This subtle shift is not merely visual — it is a way of perceiving and experiencing everyday life.',
      'Using the light of the train together with the town’s buildings and streets, the work probes a town’s aesthetic cultivation. Through light and shadow it foregrounds the dialogue of old and new — the contrast between modern technology and old architecture, the train’s technological idea set against the town’s historic buildings.',
      'Centred on the station, the railway and the one-kilometre living circle around it reveal their patterns; the relationship of town and terrain is parameterised and translated into colour, the cityscape rendered as numbers. Miaoli County’s 16 stations and their one-kilometre radii each translate differently by terrain — turning the city into invisible light.',

  mountains: {

    essay_zh: [
      '下一個轉角，你會看見什麼風景？在不期而遇之間發現美好。故事的起點，是踏查金瓜石聚落時在「金德發商店」的一段小插曲 —— 主人簡盛隆伯伯熱切相邀，進到屋裡，真覺得這是一座精心策劃的場域；從物件的擺設與引經據典之間，是他對自然定理的敬重與對家鄉的熱愛。我想，這無疑是一座充滿密碼的博物館。',
      '關係美學 —— 人與人、人與自然之間的關係。「美」建構在一個親密而互動的連結網絡中。山城建築錯落於大山之中，聚落交疊出風景；當礦產不再開採，居住於此的人們在土地上建構一個共同的想像。每個人詮釋的風貌與焦點雖然不同，卻彼此尊重、互相交集 —— 這層親密的聯繫，是無價的禮物。',
      '作品在山谷間建構一抹虹彩，是人與人、人與自然之間橋接的對話平台。造型表達的是大自然的眼睛，也是每位觀者的心靈之眼；每個單元都是一扇眺望的窗景。採集聚落的人事物故事，以刺繡與絹印的技法將其形象描繪於黑色網布的框景之中，談述山景的記憶。',
      '心中的窗景，透過藝術介入，由眾人的觀點推移出自己理想的觀景位置。穿透眼前的，是大山與作品之間的回應；陽光投影在地坪上，隨時間位移而變化，交織出此刻特有的風景。藝術的表徵，也將這心裡的窗景，織成山城裡的祕密寶藏。',
    ],
    essay_en: [
      'What landscape will you find round the next corner? Beauty discovered in the unexpected. The story begins with a small episode at the “Jinde-fa Store” while surveying the Jinguashi settlement — its keeper, Uncle Jian Sheng-long, warmly invited me in, and inside I truly felt this was a carefully curated place; through the arrangement of objects and his learned references shone his reverence for nature’s order and his love of home. It was, I thought, a museum full of ciphers.',
      'Relational aesthetics — the relationship between people, and between people and nature. “Beauty” is built within an intimate, interactive web of connection. The mountain town’s buildings are scattered through the great hills, the settlement stacking up its scenery; when the mines closed, those who stayed built a shared imagining upon the land. Each reads its face and focus differently, yet they respect and intersect with one another — and that intimate bond is a priceless gift.',
      'In the valley the work builds a band of rainbow — a platform of dialogue bridging people with one another and with nature. Its form expresses the eye of nature, and the mind’s eye of each viewer; every unit is a window for gazing out. Gathering the settlement’s people, things and stories, their images are rendered through embroidery and silk-screen onto framed views in black mesh, recounting the memory of the mountains.',
      'The window in the heart: through artistic intervention, the ideal viewing position shifts with the many viewpoints of the crowd. What passes before the eye is the answer between the great mountain and the work; sunlight cast on the ground shifts with time, weaving the singular scene of this moment. The work’s sign, too, threads this inner window into a secret treasure within the mountain town.',
    ],

      '以光盒為媒介，結合燈光、剪影與皮影戲，於校園廣場構築一座會呼吸的舞臺。裝置內建高演色燈源與精雕剪紙隔片，投射出森林、海洋、天空三幕動態場景，對應英雄旅程的啟程、試煉、歸返。',
      '參與學生不只是觀眾，更是共同編劇、導演與演員 — 透過設計角色剪影、書寫對白、操縱光軌，在互動回饋中代入自身生命經驗，思索出走的勇氣、困境中信念的淬煉，以及終能懷抱禮物返回群體的價值。',

      '這座裝置將公共空間轉化為靈感孵化場：當夜幕降臨，光點聚合，形成象徵勇氣的流星雨，照亮心途與願景。',

    essay_en: [
      'Using the light box as medium — combining lighting, silhouette and shadow play — the work builds a breathing stage on the school plaza. High-CRI light sources and finely-cut paper dividers project three moving scenes: forest, ocean, sky — answering the hero’s journey of departure, trial and return.',
      'Participating students are not merely audience but co-writers, directors and actors. By designing character silhouettes, writing dialogue and steering beams of light, they fold their own lives into the story — courage to leave, faith tempered in hardship, and the value of returning to the community bearing a gift.',
      'Where light and shadow cross, physical bodies and virtual outlines fall into parallax, like a pop-up picture book turning its pages — igniting cross-disciplinary imagination: the optics of science, the narrative of language, the form of art, all lit at once. The circulation is arranged as three entrances — viewing, making, sharing — interwoven.',
      'The installation turns public space into an incubator of inspiration: as night falls, points of light gather into a meteor shower of courage, lighting the path of the heart.',

  freedom: {
    headline_zh: '我的自由，也許不是你的自由',
    headline_en: 'My freedom may not be yours',

    award_en: 'N-Ergie Audience Prize · €5,000 · 17% of votes among 12 finalists',
    essay_zh: [
      '《自由的界限》是 2015 年德國紐倫堡「藍夜藝術節（Die Blaue Nacht）」的公共空間裝置，設置於舊市政廳（Altes Rathaus）的內部庭院。作品以 150 道工程圍欄與 300 盞警示燈，將整座中庭封圍成一處需要被「協商」才能通過的空間。',
      '自由，是領受了某些限制才換來的。它雖建立在選擇之上，卻必須立基於法律、道德與戒律。自由不只是個體對自身生活的權利，它同時牽動著對他人的度量。',
      '庭院中佈滿可移動的路障：遊客必須自己找到通往出口的路。由於封鎖是可挪移的，當一個人為自己清出一條路，往往同時封住了另一個人的去向。每個人都必須為他者的權利設想 — 工程圍欄，正代表了個人自由的邊界。',
      '2015 年 5 月 11 日，本作獲頒藍夜藝術競賽 N-Ergie 觀眾票選大獎（獎金 €5,000）。在 12 件入圍作品中，以 17% 的得票率勝出。',
    ],
    essay_en: [
      '“Die Grenzen der Freiheit” (The Limits of Freedom) was a public-space installation for Nuremberg’s 2015 Blaue Nacht, staged in the inner courtyard of the Altes Rathaus. One hundred and fifty construction barriers and three hundred warning lights sealed the courtyard into a space that had to be negotiated before it could be crossed.',
      'A person feels free only when they are also constrained in certain respects. Freedom rests on the possibility of choice — yet it must be grounded in law, morality, and precept. Freedom is not only an individual’s right over their own life; it also measures the rights of others.',
      'The courtyard was filled with movable blockades: visitors had to find their own way to the exit. Because the barriers could be shifted, the moment one person cleared a path for themselves, another’s way was often blocked. Each had to consider the rights of the other — the construction fence stands for the boundary of individual freedom.',
      'On 11 May 2015 the work received the N-Ergie Audience Prize of the Blaue Nacht art competition (€5,000), winning with 17% of the vote among twelve finalists.',

  subbus: {
    headline_zh: '公車，作為行動中的文化交叉點',
    headline_en: 'The bus as a moving crossroads of cultures',
    essay_zh: [
      'SUBBUS 是 2014 年於德國策展課程中展開的公共空間實驗 — 一次從身體經驗出發的策展行動。每位參與者都得提出自己對於「公車」的詮釋與可能性；我從台灣擁擠公車的生活記憶切入，對照德國公共運輸中「嚴禁飲食」的文化規訓，提出「公車作為行動中的文化交叉點」的空間思考。',
      'SUBBUS 不只是行動載體，更是一個可被多重轉譯的策展平台。在沒有明確共識的前提下，我們以集體創作的方式，完成從購車、改裝、命題到公共參與的每一個階段。這台巴士承載的不只是人與物，還包含行動的知識、辯論的空間與策展實驗。',
      '經過討論與實作，這輛巴士被改造為可彈性轉換的空間：白天是研究室、會議室或藝術講座場域；夜晚則可能是露營空間、行動展間，甚至一種臨時的「城市俱樂部」。我們思考「空間如何開放」、以及「在什麼條件下產生公共性」，並在各地駐點與市民建立直接對話。',
      'SUBBUS 是一段未完的實驗，一場無法預設的策展旅程。它證明藝術可以存在於沒有白牆的空間，策展可以發生在移動中的對話與辯證裡 — 這不只是一輛巴士，更是一個不斷生成的空間敘事體。',
    ],
    essay_en: [
      'SUBBUS began in 2014 within a German curatorial course — a public-space experiment that started from bodily experience. Each participant had to propose their own reading of, and possibility for, the bus. I entered through memories of Taiwan’s crowded buses, set against the German transit taboo of “no eating or drinking,” and arrived at a spatial idea: the bus as a moving crossroads of cultures.',
      'SUBBUS was not merely a vehicle but a curatorial platform open to many translations. With no fixed consensus, we worked collectively through every stage — buying the bus, converting it, framing the questions, inviting the public. What it carried was not only people and things, but knowledge in motion, a space for debate, and curatorial experiment.',

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────

        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
  <script type="text/babel" data-inline="src/cursor.jsx">
// Custom cursor + magnetic hover helpers
// Exports to window: <CustomCursor>, useMagnetic(ref)
const { useEffect, useRef, useState } = React;

function CustomCursor({ label, intensity }) {
  // intensity: 'static' | 'subtle' | 'bold'
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  const labelRef = useRef(null);
  const state = useRef({
    x: 0, y: 0,           // target
    rx: 0, ry: 0,         // ring (lagging)
    dx: 0, dy: 0,         // dot
    hovered: false,
    label: '',
    visible: false,
  });

  useEffect(() => {
    if (intensity === 'static') return;
    const s = state.current;
    let raf;

    const onMove = (e) => {
      s.x = e.clientX;
      s.y = e.clientY;
      if (!s.visible) {
        s.visible = true;
        if (dotRef.current) dotRef.current.style.opacity = '1';
        if (ringRef.current) ringRef.current.style.opacity = '1';
      }
    };
    const onLeave = () => {
      s.visible = false;
      if (dotRef.current) dotRef.current.style.opacity = '0';
      if (ringRef.current) ringRef.current.style.opacity = '0';
    };
    const onEnter = (e) => {
      const t = e.target.closest('[data-cursor]');
      if (t) {
        s.hovered = true;
        s.label = t.getAttribute('data-cursor') || '';
        if (ringRef.current) ringRef.current.setAttribute('data-state', 'hover');
        if (labelRef.current) labelRef.current.textContent = s.label;
      }
    };
    const onOut = (e) => {
      const t = e.target.closest && e.target.closest('[data-cursor]');
      if (t) {
        s.hovered = false;
        s.label = '';
        if (ringRef.current) ringRef.current.setAttribute('data-state', 'idle');
        if (labelRef.current) labelRef.current.textContent = '';
      }
    };

    const ease = intensity === 'bold' ? 0.18 : 0.28;
    const dotEase = intensity === 'bold' ? 0.7 : 0.9;
    const tick = () => {
      s.rx += (s.x - s.rx) * ease;
      s.ry += (s.y - s.ry) * ease;
      s.dx += (s.x - s.dx) * dotEase;
      s.dy += (s.y - s.dy) * dotEase;
      if (dotRef.current) {
        dotRef.current.style.transform = `translate3d(${s.dx}px, ${s.dy}px, 0) translate(-50%, -50%)`;
      }
      if (ringRef.current) {
        ringRef.current.style.transform = `translate3d(${s.rx}px, ${s.ry}px, 0) translate(-50%, -50%)`;
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseleave', onLeave);
    window.addEventListener('mouseover', onEnter);
    window.addEventListener('mouseout', onOut);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseleave', onLeave);
      window.removeEventListener('mouseover', onEnter);
      window.removeEventListener('mouseout', onOut);
    };
  }, [intensity]);

  if (intensity === 'static') return null;

  return (
    <React.Fragment>
      <div
        ref={ringRef}
        className="cursor-ring"
        data-state="idle"
        style={{ opacity: 0 }}
      >
        <span ref={labelRef} className="cursor-label" />
      </div>
      <div ref={dotRef} className="cursor-dot" style={{ opacity: 0 }} />
    </React.Fragment>
  );
}

// Magnetic effect: subtle pull toward cursor for the wrapped element.
function useMagnetic(enabled, strength = 0.22) {
  const ref = useRef(null);
  useEffect(() => {
    if (!enabled) return;
    const el = ref.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = (e.clientX - cx) * strength;
      const dy = (e.clientY - cy) * strength;
      el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
    };
    const onLeave = () => {
      el.style.transform = 'translate3d(0,0,0)';
    };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
    };
  }, [enabled, strength]);
  return ref;
}

// Parallax: returns ref + (x,y) shifts on mousemove, normalized -1..1
function useParallax(enabled) {
  const [xy, setXy] = useState({ x: 0, y: 0 });
  useEffect(() => {
    if (!enabled) {
      setXy({ x: 0, y: 0 });
      return;
    }
    const onMove = (e) => {
      const x = (e.clientX / window.innerWidth) * 2 - 1;
      const y = (e.clientY / window.innerHeight) * 2 - 1;
      setXy({ x, y });
    };
    window.addEventListener('mousemove', onMove);
    return () => window.removeEventListener('mousemove', onMove);
  }, [enabled]);
  return xy;
}

// Scroll progress 0..1 for the document
function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setP(max <= 0 ? 0 : window.scrollY / max);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return p;
}

Object.assign(window, { CustomCursor, useMagnetic, useParallax, useScrollProgress });

</script>

function MarqueeStrip({ lang, motion }) {
  const c = window.COPY[lang];
  const items = lang === 'zh'
    ? ['田野', '城市研究', '地景', '公共藝術', '泥染', '流域', '旬味', '蒸餾', '我們來自同一把泥土', '開放空間']
    : lang === 'de'
      ? ['Feld', 'Stadtforschung', 'Landschaft', 'Kunst im öffentlichen Raum', 'Boden', 'Flussgebiet', 'Jahreszeit', 'Destillation', 'Wir kommen aus derselben Erde', 'Offener Raum']
      : ['Field', 'Urban Research', 'Landscape', 'Public Art', 'Soil', 'Watershed', 'Season', 'Distillation', 'We come from the same earth', 'Open Space'];
  const dur = motion === 'bold' ? 35 : motion === 'subtle' ? 60 : 90;
  return (
    <div className="rp-marquee" data-anim={motion}>
      <div className="rp-marquee-track" style={{ animationDuration: motion === 'static' ? '0s' : `${dur}s` }}>
        {[0, 1, 2].map((k) => (
          <span className="rp-marquee-group" key={k}>
            {items.map((t, i) => (
              <span className="rp-marquee-item" key={i}>
                <span className="mq-glyph">⌖</span>
                {t}
              </span>
            ))}
          </span>
        ))}
      </div>
    </div>
  );
}

// ───────────────────────────────── Works ──────────────────────────────────

function WorkRow({ p, lang, motion }) {
  const c = window.COPY[lang];
  const [hover, setHover] = useState(false);
  const [imgIdx, setImgIdx] = useState(0);
  const rowRef = useRef(null);

  // Hover-to-cycle through images while moving across the row
  useEffect(() => {
    if (!hover || p.images.length === 0) return;
    const el = rowRef.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      const idx = Math.min(p.images.length - 1, Math.floor(t * p.images.length));
      setImgIdx(idx);
    };
    el.addEventListener('mousemove', onMove);
    return () => el.removeEventListener('mousemove', onMove);
  }, [hover, p.images.length]);

  const title = window.tr(lang, p, 'title');
  const altTitle = lang === 'en' ? p.title_zh : p.title_en;
  const site = window.tr(lang, p, 'site');
  const summary = window.tr(lang, p, 'summary');
  const blurb = window.tr(lang, p, 'blurb');
  const typeLabel = (c.types && c.types[p.type]) || p.type;

  const openDetail = () => {
    window.dispatchEvent(new CustomEvent('rp:open-detail', { detail: { id: p.id } }));
  };

  return (
    <article
      className={`rp-work ${hover ? 'is-hover' : ''}`}
      ref={rowRef}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onClick={openDetail}
      style={{ '--project-accent': p.accent }}
      data-cursor={c.works_view}
      role="button"
      tabIndex={0}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(); } }}
    >
      <div className="rp-work-figure">
        {p.images.length > 0 ? (
          <React.Fragment>
            {p.images.map((src, i) => (
              <img
                key={i}
                src={src}
                alt=""
                className="rp-work-img"
                style={{
                  opacity: (hover ? i === imgIdx : i === 0) ? 1 : 0,
                  transform: `translate3d(var(--image-x, 0px), var(--image-y, 0px), 0) scale(${hover && i === imgIdx ? 1.08 : 1.035})`,
                }}
                loading="lazy"
              />
            ))}
            <div className="rp-work-figmeta">
              <span>{String(imgIdx + 1).padStart(2, '0')} / {String(p.images.length).padStart(2, '0')}</span>
              <span>{blurb}</span>
            </div>
            <div className="rp-work-scrub" aria-hidden="true">
              {p.images.map((_, i) => (
                <span key={i} className={i === imgIdx ? 'on' : ''} />
              ))}
            </div>
          </React.Fragment>
        ) : (
          <div className="rp-work-placeholder">
            <div className="ph-grid">
              {[...Array(36)].map((_, i) => <span key={i} />)}
            </div>
            <span className="ph-label">{blurb}</span>
          </div>
        )}
      </div>

      <div className="rp-work-info">
        <div className="rp-work-topline">
          <span className="w-no">№ {p.no}</span>
          <span className="w-sep">/</span>
          <span className="w-date">{p.year}.{p.month}</span>
          <span className="w-sep">/</span>
          <span className="w-type">{typeLabel}</span>
          {p.signature && (
            <span className="w-sig">
              <span className="sig-star">★</span>
              {window.pick(lang, '代表作', 'Signature', 'Hauptwerk')}
            </span>
          )}
        </div>

        <h3 className="rp-work-title">
          <KineticText text={title} />
          <span className="rp-work-arr">↗</span>
        </h3>
        <div className="rp-work-alt">{altTitle}</div>

        {p.award_zh && (
          <div className="rp-work-award">
            <span className="award-medal">◆</span>
            <span>{window.tr(lang, p, 'award')}</span>
          </div>
        )}

        <p className="rp-work-summary">{summary}</p>

        <div className="rp-work-foot">
          <span className="rp-work-site">{site}</span>
          <span className="rp-work-cta">
            {c.works_view}
            <span className="rp-work-cta-arr">→</span>
          </span>
        </div>
      </div>
    </article>
  );
}

  return (

              {g.items.map((it, ii) => {
                const isPending = !it.no;
                const title = window.tr(lang, it, 'title');
                const altTitle = lang === 'en' ? it.title_zh : it.title_en;
                // Routing:
                //  • link "#projectId" with full DETAILS → rich in-page overlay
                //  • external http link → open in new tab
                //  • anything else → lightweight in-page archive detail (always openable)
                const projectId = it.link && it.link.startsWith('#') ? it.link.slice(1) : null;
                const isInternal = projectId && window.PROJECTS.some((p) => p.id === projectId);
                const isExternal = it.link && /^https?:/.test(it.link);
                const Tag = isExternal ? 'a' : 'button';
                const open = () => {
                  if (isInternal) {
                    window.dispatchEvent(new CustomEvent('rp:open-detail', { detail: { id: projectId } }));
                  } else {
                    window.dispatchEvent(new CustomEvent('rp:open-detail', { detail: { entry: { ...it, year: g.year } } }));
                  }
                };
                const tagProps = isExternal
                  ? { href: it.link, target: '_blank', rel: 'noreferrer', 'data-cursor': c.works_view }
                  : { type: 'button', onClick: open, 'data-cursor': c.works_view };
                return (
                  <li key={ii} className={`rp-archive-row ${isPending ? 'is-pending' : ''}`}>
                    <Tag
                      {...tagProps}
                      className="row-inner"
                    >
                      <span className="r-no">{it.no || '—'}</span>

                    </Tag>
                  </li>
                );

}

  <script type="text/babel" data-inline="src/detail-view.jsx">
// ProjectDetail — fullscreen overlay for an individual work.
// Opens from a click on a WorkRow or an Archive row with a matching id.
const { useEffect, useRef, useState } = React;

function ProjectDetail({ projectId, lang, onClose }) {
  const project = window.PROJECTS.find((p) => p.id === projectId);
  // Detail may be absent — render gracefully from PROJECTS data alone.
  const detail = window.DETAILS[projectId] || {};
  const overlayRef = useRef(null);

  // Track active image in the gallery (driven by scroll-snap)
  const [activeImg, setActiveImg] = useState(0);
  // Lightbox: index of the enlarged image, or null when closed
  const [lightbox, setLightbox] = useState(null);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    // Reset scroll
    if (overlayRef.current) overlayRef.current.scrollTop = 0;
    return () => {
      document.body.style.overflow = '';
    };
  }, [projectId]);

  // Keyboard: lightbox takes priority (arrows navigate, Esc closes it);
  // otherwise Esc closes the whole detail overlay.
  useEffect(() => {
    const n = project ? project.images.length : 0;
    const onKey = (e) => {
      if (lightbox !== null) {
        if (e.key === 'Escape') { e.stopPropagation(); setLightbox(null); }
        else if (e.key === 'ArrowRight' && n) setLightbox((i) => (i + 1) % n);
        else if (e.key === 'ArrowLeft' && n) setLightbox((i) => (i - 1 + n) % n);
      } else if (e.key === 'Escape') {
        onClose();
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [lightbox, onClose, project]);

  if (!project) return null;

  const title = window.tr(lang, project, 'title');
  const altTitle = lang === 'en' ? project.title_zh : project.title_en;
  const site = window.tr(lang, project, 'site');
  // Fall back to the project's own blurb / summary when no curated detail exists.
  const headline = window.tr(lang, detail, 'headline') || window.tr(lang, project, 'blurb');
  const essay = (detail['essay_' + lang] || detail.essay_en || detail.essay_zh) || [window.tr(lang, project, 'summary')];
  const materials = window.tr(lang, detail, 'materials');
  const role = window.tr(lang, detail, 'role');
  const sites = detail['sites_' + lang] || detail.sites_en || detail.sites_zh;

  return (
    <div
      className="rp-detail"
      ref={overlayRef}
      role="dialog"
      aria-modal="true"
      aria-label={title}
    >
      {/* Sticky chrome */}
      <header className="rp-detail-bar">
        <div className="rp-detail-bar-l">
          <span className="rp-detail-no">№ {project.no}</span>
          <span className="rp-detail-sep">／</span>
          <span className="rp-detail-mono">{project.year}.{project.month}</span>
          <span className="rp-detail-sep">／</span>
          <span className="rp-detail-mono">{site}</span>
        </div>
        <div className="rp-detail-bar-r">
          <span className="rp-detail-counter">
            {String(activeImg + 1).padStart(2, '0')} / {String(project.images.length).padStart(2, '0')}
          </span>
          <button className="rp-detail-close" onClick={onClose} data-cursor="close">
            <span className="x-arm a" />
            <span className="x-arm b" />
            <span className="rp-detail-close-label">{window.pick(lang, '關閉', 'close', 'schließen')}</span>
          </button>
        </div>
      </header>

      {/* Title block */}
      <section className="rp-detail-hero">
        <div className="rp-detail-hero-tag">
          <span className="rp-detail-mono">{window.pick(lang, '檔案', 'File', 'Akte')} · {project.id}</span>
        </div>
        <h1 className="rp-detail-title">
          {title}
          <em className="rp-detail-alt">{altTitle}</em>
        </h1>
        <p className="rp-detail-headline">{headline}</p>
        {((detail['award_' + lang] || detail.award_en || detail.award_zh)) && (
          <div className="rp-detail-award">
            <span className="rp-detail-award-medal">◆</span>
            <span className="rp-detail-award-text">{(detail['award_' + lang] || detail.award_en || detail.award_zh)}</span>
          </div>
        )}
      </section>

      {/* Hero image */}
      {project.images[0] && (
        <figure className="rp-detail-fig hero">
          <img
            src={project.images[0]}
            alt={title}
            onClick={() => setLightbox(0)}
            data-cursor={window.pick(lang, '放大', 'zoom', 'Zoom')}
          />
          <figcaption>
            <span className="rp-detail-mono">01 / {String(project.images.length).padStart(2, '0')}</span>
            <span>{window.tr(lang, project, 'blurb')}</span>
          </figcaption>
        </figure>
      )}

      {/* Meta + Essay */}
      <section className="rp-detail-body">
        <aside className="rp-detail-meta">
          <dl>
            <div>
              <dt>{window.pick(lang, '類型', 'Type', 'Typ')}</dt>
              <dd>{window.COPY[lang].types[project.type]}</dd>
            </div>
            <div>
              <dt>{window.pick(lang, '年份', 'Year', 'Jahr')}</dt>
              <dd>{project.year} · {project.month}</dd>
            </div>
            <div>
              <dt>{window.pick(lang, '地點', 'Site', 'Ort')}</dt>
              <dd>{site}</dd>
            </div>
            {role && (
              <div>
                <dt>{window.pick(lang, '角色', 'Role', 'Rolle')}</dt>
                <dd>{role}</dd>
              </div>
            )}
            {materials && (
              <div>
                <dt>{window.pick(lang, '材料 / 方法', 'Material', 'Material / Methode')}</dt>
                <dd>{materials}</dd>
              </div>
            )}
          </dl>
          {sites && sites.length > 0 && (
            <div className="rp-detail-sites">
              <span className="rp-detail-sites-k">{window.pick(lang, '田野點位', 'Field sites', 'Feldorte')}</span>
              <ol>
                {sites.map((s, i) => (
                  <li key={i}>
                    <span className="rp-detail-mono">{String(i + 1).padStart(2, '0')}</span>
                    <span>{s}</span>
                  </li>
                ))}
              </ol>
            </div>
          )}
          {project.blogUrl && (
            <a
              className="rp-detail-source"
              href={project.blogUrl}
              target="_blank"
              rel="noreferrer"
              data-cursor="blog ↗"
            >
              <span className="rp-detail-source-k">{window.pick(lang, '原文出處', 'Source', 'Quelle')}</span>

                {window.pick(lang, '在 Blog 閱讀原文', 'Read on the blog', 'Im Blog lesen')}
                <span className="rp-detail-source-arr">↗</span>
              </span>
            </a>
          )}
        </aside>

        <article className="rp-detail-essay">
          {essay.map((p, i) => (
            <p key={i} className={i === 0 ? 'lead' : ''}>{p}</p>
          ))}
        </article>
      </section>

      {/* Chapters (if any) */}
      {detail.chapters && (
        <section className="rp-detail-chapters">
          <div className="rp-detail-chapters-head">
            <span className="rp-detail-mono">／ {window.pick(lang, '篇章', 'Chapters', 'Kapitel')}</span>
            <span className="rp-detail-chapters-count">{String(detail.chapters.length).padStart(2, '0')}</span>
          </div>
          <ol>
            {detail.chapters.map((ch, i) => (
              <li key={i}>
                <span className="rp-detail-ch-no">{String(i + 1).padStart(2, '0')}</span>
                <div className="rp-detail-ch-body">
                  <h3>
                    {window.tr(lang, ch, 'title')}
                    <em>{lang === 'en' ? ch.title_zh : ch.title_en}</em>
                  </h3>
                  <p>{window.tr(lang, ch, 'body')}</p>
                </div>
              </li>
            ))}
          </ol>
        </section>
      )}

      {/* Gallery */}
      {project.images.length > 1 && (
        <section className="rp-detail-gallery">
          <div className="rp-detail-gallery-head">
            <span className="rp-detail-mono">／ {window.pick(lang, '作品集', 'Gallery', 'Galerie')}</span>
            <span className="rp-detail-gallery-count">{String(project.images.length).padStart(2, '0')} {window.pick(lang, '張', 'plates', 'Tafeln')}</span>
          </div>
          <div className="rp-detail-gallery-grid">
            {project.images.map((src, i) => (
              <figure
                key={i}
                className="rp-detail-plate"
                onClick={() => setLightbox(i)}
                data-cursor={window.pick(lang, '放大', 'zoom', 'Zoom')}
              >
                <img
                  src={src}

                  loading="lazy"
                  onLoad={(e) => {
                    // detect orientation for grid span
                    const im = e.currentTarget;
                    if (im.naturalWidth && im.naturalHeight) {
                      const ratio = im.naturalWidth / im.naturalHeight;
                      if (ratio > 1.5) im.parentElement.classList.add('wide');
                      else if (ratio < 0.85) im.parentElement.classList.add('tall');
                    }
                  }}
                />
                <figcaption>
                  <span className="rp-detail-mono">№ {String(i + 1).padStart(2, '0')}</span>
                </figcaption>
              </figure>
            ))}
          </div>
        </section>
      )}

      {/* Film */}
      {project.videos && project.videos.length > 0 && (
        <section className="rp-detail-film">
          <div className="rp-detail-gallery-head">
            <span className="rp-detail-mono">／ {window.pick(lang, '影片', 'Film', 'Film')}</span>
            <span className="rp-detail-gallery-count">{String(project.videos.length).padStart(2, '0')} {window.pick(lang, '段', 'clips', 'Clips')}</span>
          </div>
          <div className="rp-detail-film-grid">
            {project.videos.map((vid, i) => (
              <div className="rp-detail-film-item" key={i}>
                <div className="rp-detail-film-frame">
                  <iframe
                    src={`https://www.youtube.com/embed/${vid}?rel=0&playsinline=1&modestbranding=1`}
                    title={`${title} — film ${i + 1}`}
                    frameBorder="0"

          return (

// ── Detail overlay ────────────────────────────────────────────────────────
function ObjectDetail({ object, lang, onClose }) {
  const overlayRef = useObjRef(null);
  const [lightbox, setLightbox] = useObjState(null);

  useObjEffect(() => {
    document.body.style.overflow = 'hidden';
    if (overlayRef.current) overlayRef.current.scrollTop = 0;
    return () => { document.body.style.overflow = ''; };
  }, [object]);

  useObjEffect(() => {
    const n = object ? object.images.length : 0;
    const onKey = (e) => {
      if (lightbox !== null) {
        if (e.key === 'Escape') { e.stopPropagation(); setLightbox(null); }
        else if (e.key === 'ArrowRight' && n) setLightbox((i) => (i + 1) % n);
        else if (e.key === 'ArrowLeft' && n) setLightbox((i) => (i - 1 + n) % n);
      } else if (e.key === 'Escape') { onClose(); }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [lightbox, onClose, object]);

  if (!object) return null;

  const o = object;

  const essay = o[`essay_${lang}`] || o.essay_en;

  const idx = window.OBJECTS.findIndex((x) => x.id === o.id);

  return (
    <div
      className="rp-detail rp-obj-detail"
      ref={overlayRef}
      role="dialog"
      aria-modal="true"
      aria-label={name}
      style={{ '--accent': o.accent }}
    >

        <div className="rp-detail-bar-l">
          <span className="rp-detail-no">{o.no}</span>
          <span className="rp-detail-sep">／</span>
          <span className="rp-detail-mono">{dateStr}</span>
          <span className="rp-detail-sep">／</span>
          <span className="rp-detail-mono">{place}</span>
        </div>
        <div className="rp-detail-bar-r">
          <span className="rp-detail-counter">{window.pick(lang, '物誌 · 物件檔案', 'Objects · file', 'Objekte · Akte')}</span>
          <button className="rp-detail-close" onClick={onClose} data-cursor="close">
            <span className="x-arm a" />
            <span className="x-arm b" />
            <span className="rp-detail-close-label">{window.pick(lang, '關閉', 'close', 'schließen')}</span>
          </button>
        </div>
      </header>

      <section className="rp-detail-hero">
        <div className="rp-detail-hero-tag">
          <span className="rp-detail-mono">{c.objects_field} · {dateStr}</span>
        </div>
        <h1 className="rp-detail-title">
          {name}
          <em className="rp-detail-alt">{alt}</em>
        </h1>
        <p className="rp-detail-headline">{pull}</p>
      </section>

      {o.images[0] && (
        <figure className="rp-detail-fig hero">
          <img
            src={o.images[0]}
            alt={name}
            onClick={() => setLightbox(0)}
            data-cursor={lang === 'zh' ? '放大' : 'zoom'}
          />
          <figcaption>
            <span className="rp-detail-mono">01 / {String(o.images.length).padStart(2, '0')}</span>
            <span>{blurb}</span>
          </figcaption>
        </figure>
      )}

      <section className="rp-detail-body">
        <aside className="rp-detail-meta">
          <div className="rp-obj-taxcard">
            <span className="rp-obj-taxcard-k">{window.pick(lang, '物件分類 · Taxonomy', 'Taxonomy · 物件分類', 'Taxonomie · 物件分類')}</span>
            <dl>
              {o.tax.map((t, i) => (
                <div key={i}>
                  <dt>{window.tr(lang, t, 'k')}</dt>
                  <dd>{window.tr(lang, t, 'v')}</dd>
                </div>

          <div className="rp-obj-tags-block">
            <span className="rp-detail-sites-k">{window.pick(lang, '標籤', 'Labels', 'Etiketten')}</span>
            <ul className="rp-obj-tags wide">
              {tags.map((t) => <li key={t}>{t}</li>)}
            </ul>
          </div>

          {gloss && <p className="rp-obj-gloss">{gloss}</p>}

          <a
            className="rp-detail-source"
            href={o.blogUrl}
            target="_blank"
            rel="noreferrer"
            data-cursor="blog ↗"
          >
            <span className="rp-detail-source-k">{window.pick(lang, '原文出處', 'Source', 'Quelle')}</span>

                    const im = e.currentTarget;
                    if (im.naturalWidth && im.naturalHeight) {
                      const ratio = im.naturalWidth / im.naturalHeight;
                      if (ratio > 1.5) im.parentElement.classList.add('wide');
                      else if (ratio < 0.85) im.parentElement.classList.add('tall');
                    }
                  }}
                />
                <figcaption>
                  <span className="rp-detail-mono">№ {String(i + 1).padStart(2, '0')}</span>
                </figcaption>
              </figure>
            ))}
          </div>
        </section>
      )}

      <section className="rp-detail-foot">
        <button
          className="rp-detail-next"
          data-cursor={lang === 'zh' ? '下一件' : 'next'}
          onClick={() => {
            if (overlayRef.current) overlayRef.current.scrollTop = 0;
            window.dispatchEvent(new CustomEvent('rp:open-detail', { detail: { object: next } }));
          }}
        >
          <span className="rp-detail-next-k">{window.pick(lang, '下一件物件', 'Next object', 'Nächstes Objekt')}</span>
          <span className="rp-detail-next-v">
            <em className="rp-detail-mono">{next.no}</em>
            {nextName}
          </span>
          <span className="rp-detail-next-arr">→</span>
        </button>
      </section>

      {lightbox !== null && o.images[lightbox] && (
        <div
          className="rp-lightbox"
          role="dialog"
          aria-modal="true"
          aria-label={lang === 'zh' ? '放大檢視' : 'Enlarged view'}
          onClick={() => setLightbox(null)}
        >
          <button
            className="rp-lightbox-close"
            onClick={(e) => { e.stopPropagation(); setLightbox(null); }}
            data-cursor={lang === 'zh' ? '關閉' : 'close'}
            aria-label={lang === 'zh' ? '關閉' : 'close'}
          >✕</button>
          {o.images.length > 1 && (
            <button
              className="rp-lightbox-nav prev"
              onClick={(e) => { e.stopPropagation(); setLightbox((i) => (i - 1 + o.images.length) % o.images.length); }}
              data-cursor={lang === 'zh' ? '上一張' : 'prev'}
              aria-label={lang === 'zh' ? '上一張' : 'previous'}
            >‹</button>
          )}
          <figure className="rp-lightbox-fig" onClick={(e) => e.stopPropagation()}>
            <img src={o.images[lightbox]} alt={`${name} — ${lightbox + 1}`} />
            <figcaption className="rp-lightbox-cap">
              <span className="lb-count">{String(lightbox + 1).padStart(2, '0')} / {String(o.images.length).padStart(2, '0')}</span>
              <span className="lb-blurb">{blurb}</span>
            </figcaption>
          </figure>
          {o.images.length > 1 && (
            <button
              className="rp-lightbox-nav next"
              onClick={(e) => { e.stopPropagation(); setLightbox((i) => (i + 1) % o.images.length); }}
              data-cursor={lang === 'zh' ? '下一張' : 'next'}
              aria-label={lang === 'zh' ? '下一張' : 'next'}
            >›</button>
          )}
        </div>
      )}
    </div>
  );
}

Object.assign(window, { ObjectsSection, ObjectDetail });

</script>
  <script type="text/babel" data-inline="src/main.jsx">
// Main App — wires header, sections, cursor, and project details together.
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "type": "mix",
  "motion": "bold",
  "palette": ["#F7F6F5", "#111111", "#003DFF"],
  "showGrid": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = useState(() => {
    const requested = new URLSearchParams(window.location.search).get('lang');
    const saved = window.localStorage.getItem('raum-language');
    return window.LANGS.includes(requested) ? requested : window.LANGS.includes(saved) ? saved : 'zh';
  });
  const [detail, setDetail] = useState(null); // { id } (rich) or { entry } (minimal)
  const scrollP = window.useScrollProgress();

  // Listen for open-detail events from work rows / archive
  useEffect(() => {
    const onOpen = (e) => setDetail(e.detail);
    window.addEventListener('rp:open-detail', onOpen);
    return () => window.removeEventListener('rp:open-detail', onOpen);
  }, []);

  useEffect(() => {
    const onKey = (event) => {
      const target = event.target;
      if (target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(target.tagName)) return;
      if (event.key.toLowerCase() === 'g') setTweak('showGrid', !t.showGrid);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [setTweak, t.showGrid]);

  // Apply palette + type to <html>
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--paper', t.palette[0]);
    root.style.setProperty('--ink', t.palette[1]);
    root.style.setProperty('--accent', t.palette[2]);
    root.setAttribute('data-type', t.type);
    root.setAttribute('data-motion', t.motion);
    root.setAttribute('data-grid', t.showGrid ? 'on' : 'off');
  }, [t]);

  useEffect(() => {
    const htmlLang = lang === 'zh' ? 'zh-Hant' : lang;
    document.documentElement.lang = htmlLang;
    document.title = window.pick(
      lang,
      'RAUM+ 動態編輯作品集 / Eason Huang',
      'RAUM+ Kinetic Editorial Portfolio / Eason Huang',
      'RAUM+ Kinetisches Editorial-Portfolio / Eason Huang'
    );
    window.localStorage.setItem('raum-language', lang);
    const url = new URL(window.location.href);
    url.searchParams.set('lang', lang);
    window.history.replaceState({}, '', url);
  }, [lang]);

  return (
    <React.Fragment>
      <div className="rp-intro-loader" aria-hidden="true">
        <div className="rp-loader-meta">
          <span>RAUM+ / PORTFOLIO</span>
          <span>TAICHUNG — TAIWAN</span>
        </div>
        <div className="rp-loader-mark">RAUM<span>+</span></div>
        <div className="rp-loader-progress"><span /></div>
      </div>

      <window.CustomCursor intensity={t.motion} />

      {/* Scroll progress strip */}
      <div className="rp-progress" style={{ transform: `scaleX(${scrollP})` }} />

      {/* Optional grid overlay */}
      {t.showGrid && (
        <div className="rp-grid-overlay" aria-hidden="true">
          {[...Array(12)].map((_, i) => <span key={i} />)}
        </div>
      )}

      <window.Header
        lang={lang}
        onLang={setLang}
        motion={t.motion}
        grid={t.showGrid}
        onGrid={() => setTweak('showGrid', !t.showGrid)}
      />
      <main>
        <window.Hero lang={lang} motion={t.motion} />
        <window.MarqueeStrip lang={lang} motion={t.motion} />
        <window.WorksSection lang={lang} motion={t.motion} />
        <window.ArchiveSection lang={lang} motion={t.motion} />
        <window.AboutSection lang={lang} motion={t.motion} />
        <window.WritingSection lang={lang} motion={t.motion} />
        <window.ObjectsSection lang={lang} />
        <window.StudioSection lang={lang} motion={t.motion} />
        <window.FooterSection lang={lang} motion={t.motion} />
      </main>

      {detail && detail.id && (
        <window.ProjectDetail
          projectId={detail.id}
          lang={lang}
          onClose={() => setDetail(null)}
        />
      )}

      {detail && detail.entry && (
        <window.ArchiveDetail
          entry={detail.entry}
          lang={lang}
          onClose={() => setDetail(null)}
        />
      )}

      {detail && detail.writing && (
        <window.WritingDetail
          writing={detail.writing}
          lang={lang}
          onClose={() => setDetail(null)}
        />
      )}

      {detail && detail.object && (
        <window.ObjectDetail
          object={detail.object}
          lang={lang}
          onClose={() => setDetail(null)}
        />
      )}

    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
  <script data-inline="motion-effects.js">
(function () {
  'use strict';

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

  function start(attempt) {
    if (!document.querySelector('.rp-hero')) {
      if (attempt < 120) window.setTimeout(function () { start(attempt + 1); }, 50);
      return;
    }

    var root = document.documentElement;
    var header = document.querySelector('.rp-header');
    var heroCover = document.querySelector('.rp-hero-cover');
    var workFigures = document.querySelectorAll('.rp-work-figure');
    var workTitles = document.querySelectorAll('.rp-work-title');
    var aboutLead = document.querySelector('.rp-about-lead');
    var revealItems = document.querySelectorAll([
      '.rp-section-head',
      '.rp-work',
      '.rp-archive-year',
      '.rp-writing-row',
      '.rp-about-grid',
      '.rp-obj-card',
      '.rp-studio-pillars li',
      '.rp-footer-body'
    ].join(','));

    root.classList.add('motion-enhanced');

    if (reduceMotion.matches || root.getAttribute('data-motion') === 'static' || !('IntersectionObserver' in window)) {
      revealItems.forEach(function (item) { item.classList.add('is-revealed'); });
      root.classList.add('motion-ready');
      return;
    }

    revealItems.forEach(function (item, index) {
      item.classList.add('motion-reveal');
      item.style.setProperty('--motion-order', String(index % 4));
    });

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('is-revealed');
        observer.unobserve(entry.target);
      });
    }, { rootMargin: '0px 0px -9% 0px', threshold: 0.08 });

    revealItems.forEach(function (item) { observer.observe(item); });

    var lastY = window.scrollY;
    var ticking = false;
    var directionDistance = 0;

    function updateScroll() {
      var y = window.scrollY;
      var delta = y - lastY;
      directionDistance = delta === 0 || Math.sign(delta) === Math.sign(directionDistance)
        ? directionDistance + delta
        : delta;

      root.style.setProperty('--page-scroll', y.toFixed(1));

      if (heroCover) {
        var coverRect = heroCover.getBoundingClientRect();
        if (coverRect.bottom > 0 && coverRect.top < window.innerHeight) {
          var parallax = Math.max(-32, Math.min(32, -coverRect.top * 0.055));
          heroCover.style.setProperty('--parallax-y', parallax.toFixed(2) + 'px');
        }
      }

      document.querySelectorAll('.rp-section-head.is-revealed .head-title').forEach(function (title) {
        var rect = title.getBoundingClientRect();
        if (rect.bottom > 0 && rect.top < window.innerHeight) {
          var drift = Math.max(-18, Math.min(18, (window.innerHeight * 0.5 - rect.top) * 0.018));
          title.style.setProperty('--title-drift', drift.toFixed(2) + 'px');
        }
      });

      workFigures.forEach(function (figure, index) {
        var rect = figure.getBoundingClientRect();
        if (rect.bottom <= 0 || rect.top >= window.innerHeight) return;
        var distance = window.innerHeight * 0.5 - (rect.top + rect.height * 0.5);
        var direction = index % 2 === 0 ? 1 : -1;
        var drift = Math.max(-22, Math.min(22, distance * 0.026 * direction));
        figure.style.setProperty('--media-drift-x', drift.toFixed(2) + 'px');
      });

      workTitles.forEach(function (title, index) {
        var rect = title.getBoundingClientRect();
        if (rect.bottom <= 0 || rect.top >= window.innerHeight) return;
        var direction = index % 2 === 0 ? -1 : 1;
        var drift = Math.max(-13, Math.min(13, (window.innerHeight * 0.52 - rect.top) * 0.014 * direction));
        title.style.setProperty('--work-title-drift', drift.toFixed(2) + 'px');
      });

      if (aboutLead) {
        var aboutRect = aboutLead.getBoundingClientRect();
        if (aboutRect.bottom > 0 && aboutRect.top < window.innerHeight) {
          var aboutDrift = Math.max(-18, Math.min(18, (window.innerHeight * 0.52 - aboutRect.top) * 0.018));
          aboutLead.style.setProperty('--about-drift', aboutDrift.toFixed(2) + 'px');
        }
      }

      if (header && y > 150) {
        if (directionDistance > 70) {
          header.classList.add('is-hidden');
          directionDistance = 0;
        } else if (directionDistance < -35) {
          header.classList.remove('is-hidden');
          directionDistance = 0;
        }
      } else if (header) {
        header.classList.remove('is-hidden');
      }

      lastY = y;
      ticking = false;
    }

    window.addEventListener('scroll', function () {
      if (!ticking) {
        window.requestAnimationFrame(updateScroll);
        ticking = true;
      }
    }, { passive: true });

    document.querySelectorAll('.rp-work').forEach(function (work) {
      var figure = work.querySelector('.rp-work-figure');
      if (!figure) return;

      work.addEventListener('pointermove', function (event) {
        if (event.pointerType === 'touch') return;
        var rect = figure.getBoundingClientRect();
        var x = (event.clientX - rect.left) / rect.width - 0.5;
        var y = (event.clientY - rect.top) / rect.height - 0.5;
        figure.style.setProperty('--tilt-x', (-y * 2.1).toFixed(2) + 'deg');
        figure.style.setProperty('--tilt-y', (x * 2.1).toFixed(2) + 'deg');
        figure.style.setProperty('--image-x', (x * -18).toFixed(2) + 'px');
        figure.style.setProperty('--image-y', (y * -14).toFixed(2) + 'px');
      });

      work.addEventListener('pointerleave', function () {
        figure.style.setProperty('--tilt-x', '0deg');
        figure.style.setProperty('--tilt-y', '0deg');
        figure.style.setProperty('--image-x', '0px');
        figure.style.setProperty('--image-y', '0px');
      });
    });

    updateScroll();
    window.setTimeout(function () { root.classList.add('motion-ready'); }, 80);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { start(0); }, { once: true });
  } else {
    start(0);
  }
}());
