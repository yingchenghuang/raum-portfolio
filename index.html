  font-size: clamp(18px, 1.65vw, 26px) !important;
  font-weight: 500 !important;
  line-height: 1.18;
  letter-spacing: -.025em;
}

.rp-hero-cover {
  grid-column: 5 / -1;
  position: relative;
  margin: 0;
  aspect-ratio: 1.55 / 1;
  overflow: hidden;
  background: #d7d7d3;
}

.rp-hero-cover img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  filter: saturate(.84) contrast(1.03);
  transition: transform .8s cubic-bezier(.2, .7, .2, 1), filter .4s;
}

.rp-hero-cover:hover img {
  transform: scale(1.025);
  filter: saturate(1) contrast(1.03);
}

.rp-hero-cover figcaption {
  position: absolute;
  inset: auto 0 0;
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 10px 12px;
  background: rgba(17, 17, 17, .9);
  color: #fff;
  font: 500 9px/1.25 var(--font-body);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.rp-hero-cta {
  margin-top: auto;
  padding-top: 30px;
  display: grid;
  gap: 12px;
}

.rp-cta-btn {
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 15px 16px;
  border: 1px solid var(--ink);
  border-radius: 0;
  background: var(--ink);
  color: #fff;
  font: 600 10px/1 var(--font-body);
  letter-spacing: .14em;
  text-transform: uppercase;
}

.rp-cta-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.rp-cta-ghost {
  display: grid;
  grid-template-columns: auto 1fr auto;
  padding: 11px 0;
  border: 0;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  border-radius: 0;
  font: 500 9px/1.25 var(--font-body);
}

.rp-hero-bio {
  margin-top: 10px;
  font: 500 10px/1.4 var(--font-body);
}

.rp-scroll-hint {
  margin-top: 24px;
  font: 500 8px/1 var(--font-body);
  letter-spacing: .18em;
}

/* Running strip */
.rp-marquee {
  border: 0;
  border-bottom: 1px solid var(--ink);
  background: var(--ink);
  color: #fff;
  padding: 10px 0;
}

.rp-marquee-item {
  font: 500 9px/1 var(--font-body);
  letter-spacing: .15em;
  text-transform: uppercase;
}

.mq-glyph {
  color: var(--accent);
}

/* Shared section headers */
.rp-works,
.rp-archive,
.rp-about,
.rp-writing,
.rp-objects,
.rp-studio,
.rp-footer {
  padding-left: 0;
  padding-right: 0;
}

.rp-section-head {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: clamp(10px, 1.35vw, 22px);
  align-items: end;
  padding: clamp(82px, 9vw, 145px) var(--gutter) 28px;
  border-top: 0;
  border-bottom: 1px solid var(--ink);
}

.rp-section-head .head-l {
  grid-column: 1 / span 9;
}

.rp-section-head .head-r {
  grid-column: 10 / -1;
  justify-self: stretch;
  text-align: left;
}

.head-tag {
  display: block;
  margin-bottom: 16px;
  color: var(--accent);
  font: 600 9px/1 var(--font-body);
  letter-spacing: .16em;
}

html body .head-title {
  margin: 0;
  font-family: var(--font-display) !important;
  font-size: clamp(52px, 8vw, 126px) !important;
  font-weight: 900 !important;
  line-height: .8 !important;
  letter-spacing: -.065em !important;
  text-transform: uppercase !important;
}

.head-count,
.head-sub {
  font: 500 10px/1.5 var(--font-body);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* Featured works */
.rp-works-list {
  display: flex;
  flex-direction: column;
}

.rp-work,
.rp-work:nth-child(even) {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: clamp(10px, 1.35vw, 22px);
  padding: clamp(54px, 6vw, 98px) var(--gutter);
  border-top: 0;
  border-bottom: 1px solid var(--ink);
  background: var(--paper);
}

.rp-work::before {
  display: none;
}

.rp-work:hover,
.rp-work.is-hover {
  background: #ecebe6;
}

.rp-work-figure {
  grid-column: 1 / span 7;
  order: 0 !important;
  min-height: 0;
  aspect-ratio: 1.42 / 1;
  background: #d9d8d3;
}

.rp-work:nth-child(even) .rp-work-figure {
  grid-column: 6 / -1;
}

.rp-work-img {
  filter: saturate(.72) contrast(1.04);
}

.rp-work:hover .rp-work-img {
  filter: saturate(1) contrast(1.02);
}

.rp-work-info {
  grid-column: 8 / -1;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  align-self: stretch;
  gap: 0;
}

.rp-work:nth-child(even) .rp-work-info {
  grid-column: 1 / span 5;
  grid-row: 1;
}

.rp-work-topline {
  display: flex;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--ink);
  font: 600 9px/1 var(--font-body);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.rp-work-topline .w-type,
.rp-work-topline .w-sig {
  color: var(--accent);
}

html body .rp-work-title {
  margin: clamp(28px, 4vw, 58px) 0 0;
  font-family: var(--font-display) !important;
  font-size: clamp(42px, 5.2vw, 84px) !important;
  font-weight: 800 !important;
  font-style: normal !important;
  line-height: .88 !important;
  letter-spacing: -.06em !important;
  text-transform: none !important;
}

.rp-work-title .rp-work-arr {
  color: var(--accent);
  font-size: .26em;
}

.rp-work-alt {
  margin-top: 13px;
  font: 500 10px/1.3 var(--font-body);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.rp-work-award {
  align-self: flex-start;
  margin-top: 20px;
  padding: 7px 10px;
  border-radius: 0;
  background: var(--accent);
  color: #fff;
}

.rp-work-summary {
  max-width: 34em;
  margin: clamp(24px, 3vw, 44px) 0 0;
  font-size: 14px;
  line-height: 1.65;
}

.rp-work-foot {
  margin-top: auto;
  padding-top: 13px;
  border-top: 1px solid var(--ink);
}

.rp-work-site,
.rp-work-cta {
  font: 600 9px/1.3 var(--font-body);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.rp-work-cta,
.rp-work.is-hover .rp-work-cta {
  color: var(--accent);
}

/* Archive and writing tables */
.rp-archive {
  background: #deddd8;
}

.rp-archive-row,
.rp-writing-row {
  border-top: 0;
  border-bottom: 1px solid var(--ink);
}

.rp-archive-row .row-inner,
.rp-writing-inner {
  padding-left: var(--gutter);
  padding-right: var(--gutter);
  min-height: 78px;
}

.rp-archive-row:hover,
.rp-writing-inner:hover {
  background: var(--accent);
  color: #fff;
}

.rp-archive-row:hover .r-arr,
.rp-writing-inner:hover .w-title,
.rp-writing-inner:hover .w-date,
.rp-writing-inner:hover .w-arr {
  color: #fff;
}

.r-title,
.w-title {
  font-family: var(--font-display) !important;
  font-weight: 700 !important;
}

/* About */
.rp-about-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: clamp(10px, 1.35vw, 22px);
  padding: clamp(58px, 7vw, 110px) var(--gutter);
  border-bottom: 1px solid var(--ink);
}

html body .rp-about-lead {
  grid-column: 1 / span 8;
  margin: 0;
  font-family: var(--font-display) !important;
  font-size: clamp(48px, 7.2vw, 116px) !important;
  font-weight: 900 !important;
  font-style: normal !important;
  line-height: .86 !important;
  letter-spacing: -.065em !important;
  text-transform: uppercase !important;
}

.rp-about-lead .quote-mark {
  color: var(--accent);
}

.rp-about-body {
  grid-column: 9 / -1;
  align-self: end;
  font-size: 14px;
  line-height: 1.7;
}

.rp-bio-list {
  border-top: 1px solid var(--ink);
}

/* Objects and studio */
.rp-objects {
  padding-bottom: clamp(60px, 8vw, 120px);
  background: var(--ink);
  color: #fff;
}

.rp-objects .rp-section-head {
  border-color: #fff;
}

.rp-objects .head-title,
.rp-objects .rp-objects-lead,
.rp-objects .rp-obj-name {
  color: #fff !important;
}

.rp-objects-intro,
.rp-objects-grid {
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}

.rp-objects-eyebrow,
.rp-objects-src,
.rp-objects-src-arr,
.rp-obj-place {
  color: var(--accent);
}

.rp-obj-card {
  border-radius: 0;
  border-color: rgba(255, 255, 255, .36);
  background: transparent;
}

.rp-obj-card:hover {
  border-color: var(--accent);
  box-shadow: none;
}

.rp-obj-alt,
.rp-obj-pull,
.rp-obj-tax-row dt,
.rp-obj-tax-row dd,
.rp-obj-cta {
  color: rgba(255, 255, 255, .74);
}

.rp-studio {
  background: var(--accent);
  color: var(--ink);
}

.rp-studio .rp-section-head,
.rp-studio-pillars li {
  border-color: var(--ink);
}

.rp-studio .head-tag,
.pillar-k {
  color: var(--ink);
}

.rp-studio-grid {
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}

/* Footer */
.rp-footer {
  background: var(--ink);
  color: #fff;
}

.rp-footer .rp-section-head {
  border-color: #fff;
}

.rp-footer .head-title {
  color: #fff !important;
}

.rp-footer-body,
.rp-footer-bottom {
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}

.rp-links a {
  border-radius: 0;
}

.rp-links a:hover {
  background: var(--accent);
  color: #fff;
}

/* Project detail */
.rp-detail {
  background: var(--paper);
}

.rp-detail-close,
.rp-lightbox-close,
.rp-lightbox-nav {
  border-radius: 0;
}

.rp-detail-headline,
.rp-detail-ch-no,
.rp-press-arr,
.rp-detail-next-arr {
  color: var(--accent) !important;
}

.rp-detail-fig.hero img,
.rp-detail-plate,
.rp-work-preview,
.rp-obj-card,
.rp-obj-figure {
  border-radius: 0 !important;
}

@media (max-width: 1120px) {
  .rp-header-row {
    grid-template-columns: auto 1fr auto;
  }

  .rp-nav {
    display: none;
  }

  .rp-grid-toggle {
    justify-self: end;
  }

  .rp-lang-toggle {
    grid-column: 3;
  }

  .rp-hero-left {
    grid-column: 1 / span 2;
  }

  .rp-hero-right {
    grid-column: 3 / -1;
  }

  html body .rp-tagline {
    font-size: clamp(58px, 9vw, 100px) !important;
  }

  html[lang="zh-Hant"] body .rp-tagline {
    font-size: clamp(56px, 7.2vw, 82px) !important;
    line-height: 1.04 !important;
  }

  .rp-hero-copy {
    grid-column: 1 / span 5;
  }

  .rp-hero-cover {
    grid-column: 6 / -1;
  }

  .rp-work,
  .rp-work:nth-child(even) {
    grid-template-columns: repeat(12, minmax(0, 1fr));
  }

  .rp-work-figure,
  .rp-work:nth-child(even) .rp-work-figure {
    grid-column: 1 / span 7;
  }

  .rp-work-info,
  .rp-work:nth-child(even) .rp-work-info {
    grid-column: 8 / -1;
    grid-row: auto;
  }
}

@media (max-width: 760px) {
  :root {
    --gutter: 20px;
  }

  .rp-header-row {
    min-height: 58px;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
  }

  .rp-grid-toggle {
    justify-self: end;
    width: 34px;
    padding: 0;
    justify-content: center;
  }

  .rp-grid-toggle span:not(.grid-toggle-dot) {
    display: none;
  }

  .rp-lang-toggle {
    grid-column: auto;
  }

  .rp-grid-overlay {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .rp-grid-overlay span:nth-child(n+5) {
    display: none;
  }

  .rp-hero {
    min-height: auto;
    padding-top: 94px;
  }

  .rp-hero-grid {
    display: block;
  }

  .rp-hero-left {
    display: grid;
    grid-template-columns: 72px 1fr;
    align-items: start;
    gap: 28px;
    margin-bottom: 34px;
  }

  .rp-logo {
    width: 72px;
  }

  .rp-hero-right {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .rp-hero-meta {
    grid-column: 1 / -1;
    grid-template-columns: 1fr auto;
  }

  .rp-hero-meta .meta-c {
    display: none;
  }

  html body .rp-tagline {
    grid-column: 1 / -1;
    font-size: clamp(51px, 16vw, 84px) !important;
    line-height: .84 !important;
  }

  html[lang="zh-Hant"] body .rp-tagline {
    max-width: 7em;
    margin-top: 34px;
    margin-bottom: 32px;
    font-size: clamp(46px, 12.5vw, 64px) !important;
    line-height: 1.08 !important;
    letter-spacing: -.045em !important;
  }

  .tagline-line {
    white-space: normal;
  }

  .rp-hero-cover {
    grid-column: 1 / -1;
    grid-row: 3;
    aspect-ratio: 4 / 3;
  }

  .rp-hero-copy {
    grid-column: 1 / -1;
    grid-row: 4;
    margin-top: 22px;
  }

  .rp-intro {
    font-size: 19px !important;
  }

  .rp-hero-cta {
    margin-top: 36px;
  }

  .rp-section-head {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    padding-top: 72px;
  }

  .rp-section-head .head-l {
    grid-column: 1 / -1;
  }

  .rp-section-head .head-r {
    grid-column: 1 / -1;
    margin-top: 24px;
  }

  html body .head-title {
    font-size: clamp(48px, 16vw, 78px) !important;
  }

  .rp-work,
  .rp-work:nth-child(even) {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    padding-top: 36px;
    padding-bottom: 44px;
  }

  .rp-work-figure,
  .rp-work:nth-child(even) .rp-work-figure {
    grid-column: 1 / -1;
    grid-row: auto;
    aspect-ratio: 4 / 3;
  }

  .rp-work-info,
  .rp-work:nth-child(even) .rp-work-info {
    grid-column: 1 / -1;
    grid-row: auto;
    padding-top: 26px;
  }

  html body .rp-work-title {
    font-size: clamp(42px, 13vw, 68px) !important;
  }

  .rp-work-foot {
    margin-top: 38px;
  }

  .rp-about-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  html body .rp-about-lead,
  .rp-about-body {
    grid-column: 1 / -1;
  }

  html body .rp-about-lead {
    font-size: clamp(48px, 15vw, 76px) !important;
  }

  .rp-about-body {
    margin-top: 44px;
  }

  .rp-archive-row .row-inner,
  .rp-writing-inner {
    padding-left: var(--gutter);
    padding-right: var(--gutter);
  }

  .rp-objects-grid,
  .rp-objects-intro,
  .rp-studio-grid,
  .rp-footer-body,
  .rp-footer-bottom {
    padding-left: var(--gutter);
    padding-right: var(--gutter);
  }
}

/* Motion system */
.rp-intro-loader {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(20px, 3.75vw, 58px);
  overflow: hidden;
  background: var(--ink);
  color: #fff;
  pointer-events: none;
  animation: rp-loader-exit .72s cubic-bezier(.76, 0, .24, 1) 1.18s forwards;
}

.rp-loader-meta {
  display: flex;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, .45);
  font: 500 9px/1 var(--font-body);
  letter-spacing: .16em;
}

.rp-loader-mark {
  align-self: center;
  font-family: var(--font-display);
  font-size: clamp(70px, 16vw, 250px);
  font-weight: 900;
  line-height: .8;
  letter-spacing: -.08em;
  transform-origin: left bottom;
  animation: rp-loader-mark .85s cubic-bezier(.16, 1, .3, 1) both;
}

.rp-loader-mark span {
  color: var(--accent);
}

.rp-loader-progress {
  height: 3px;
  overflow: hidden;
  background: rgba(255, 255, 255, .18);
}

.rp-loader-progress span {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  animation: rp-loader-progress 1.05s cubic-bezier(.65, 0, .35, 1) .08s forwards;
}

@keyframes rp-loader-mark {
  from { opacity: 0; transform: translateY(65%) skewY(7deg); }
  to { opacity: 1; transform: translateY(0) skewY(0); }
}

@keyframes rp-loader-progress {
  to { transform: scaleX(1); }
}

@keyframes rp-loader-exit {
  0% { clip-path: inset(0 0 0 0); visibility: visible; }
  100% { clip-path: inset(0 0 100% 0); visibility: hidden; }
}

.rp-header {
  transition: transform .58s cubic-bezier(.16, 1, .3, 1), background-color .3s;
}

.rp-header.is-hidden {
  transform: translateY(calc(-100% - 4px));
}

.tagline-line {
  overflow: hidden;
  padding-bottom: .08em;
}

.tag-char {
  display: inline-block;
  transform: translateY(118%) rotate(4deg);
  transform-origin: left bottom;
  animation: rp-tag-char-in .82s cubic-bezier(.16, 1, .3, 1) forwards;
  animation-delay: calc(1.03s + var(--i) * 46ms);
}

.tagline-line:nth-child(2) .tag-char {
  animation-delay: calc(1.20s + var(--i) * 46ms);
}

.tagline-aster {
  display: inline-block;
  opacity: 0;
  transform: scale(0) rotate(-25deg);
  animation: rp-aster-in .62s cubic-bezier(.34, 1.56, .64, 1) 1.76s forwards;
}

@keyframes rp-tag-char-in {
  to { transform: translateY(0) rotate(0); }
}

@keyframes rp-aster-in {
  to { opacity: 1; transform: scale(1) rotate(0); }
}

.rp-hero-meta,
.rp-hero-copy,
.rp-hero-left {
  opacity: 0;
  transform: translateY(28px);
  animation: rp-hero-content-in .85s cubic-bezier(.16, 1, .3, 1) forwards;
}

.rp-hero-left { animation-delay: 1.18s; }
.rp-hero-meta { animation-delay: 1.26s; }
.rp-hero-copy { animation-delay: 1.62s; }

@keyframes rp-hero-content-in {
  to { opacity: 1; transform: translateY(0); }
}

.rp-hero-cover {
  --parallax-y: 0px;
  clip-path: inset(0 100% 0 0);
  animation: rp-cover-reveal 1.12s cubic-bezier(.76, 0, .24, 1) 1.32s forwards;
}

.rp-hero-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 2;
  background: var(--accent);
  transform: translateX(-101%);
  animation: rp-cover-sweep 1.12s cubic-bezier(.76, 0, .24, 1) 1.32s both;
  pointer-events: none;
}

.rp-hero-cover img {
  transform: translate3d(0, var(--parallax-y), 0) scale(1.09);
  transition: transform .28s linear, filter .4s;
}

.rp-hero-cover:hover img {
  transform: translate3d(0, var(--parallax-y), 0) scale(1.13);
}

@keyframes rp-cover-reveal {
  to { clip-path: inset(0 0 0 0); }
}

@keyframes rp-cover-sweep {
  0% { transform: translateX(-101%); }
  48% { transform: translateX(0); }
  100% { transform: translateX(101%); }
}

.motion-enhanced .motion-reveal {
  opacity: 0;
  transform: translateY(clamp(34px, 6vw, 82px));
  transition:
    opacity .78s cubic-bezier(.16, 1, .3, 1),
    transform .95s cubic-bezier(.16, 1, .3, 1);
  transition-delay: calc(var(--motion-order, 0) * 45ms);
}

.motion-enhanced .motion-reveal.is-revealed {
  opacity: 1;
  transform: translateY(0);
}

.motion-enhanced .rp-work.motion-reveal .rp-work-figure,
.motion-enhanced .rp-obj-card.motion-reveal .rp-obj-figure {
  clip-path: inset(0 0 100% 0);
  transition:
    clip-path 1.05s cubic-bezier(.76, 0, .24, 1) .08s,
    transform .45s cubic-bezier(.16, 1, .3, 1);
}

.motion-enhanced .rp-work.motion-reveal.is-revealed .rp-work-figure,
.motion-enhanced .rp-obj-card.motion-reveal.is-revealed .rp-obj-figure {
  clip-path: inset(0 0 0 0);
}

.rp-work-figure {
  --tilt-x: 0deg;
  --tilt-y: 0deg;
  transform: perspective(1200px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
  transform-origin: center;
  will-change: transform;
}

.head-title {
  --title-drift: 0px;
  transform: translate3d(var(--title-drift), 0, 0);
  transition: transform .18s linear;
}

.rp-work-info > *,
.rp-about-body > *,
.rp-footer-body > * {
  transition: transform .7s cubic-bezier(.16, 1, .3, 1), opacity .55s;
}

.rp-work:hover .rp-work-info > * {
  transform: translateX(8px);
}

html[data-motion="static"] .rp-intro-loader {
  display: none;
}

html[data-motion="static"] .tag-char,
html[data-motion="static"] .tagline-aster,
html[data-motion="static"] .rp-hero-meta,
html[data-motion="static"] .rp-hero-copy,
html[data-motion="static"] .rp-hero-left,
html[data-motion="static"] .rp-hero-cover {
  opacity: 1;
  clip-path: none;
  transform: none;
}

@media (prefers-reduced-motion: reduce) {
  .rp-intro-loader {
    display: none;
  }

  .tag-char,
  .tagline-aster,
  .rp-hero-meta,
  .rp-hero-copy,
  .rp-hero-left,
  .rp-hero-cover,
  .motion-enhanced .motion-reveal,
  .motion-enhanced .rp-work.motion-reveal .rp-work-figure,
  .motion-enhanced .rp-obj-card.motion-reveal .rp-obj-figure {
    opacity: 1;
    clip-path: none;
    transform: none;
    animation: none;
    transition: none;
  }

  .rp-hero-cover img {
    transform: none;
    transition: none;
  }
}

/* TBP-inspired kinetic editorial edition */
:root {
  --paper: #f7f6f5;
  --ink: #111111;
  --accent: #003dff;
  --washi: #e6e4df;
  --line: rgba(17, 17, 17, .92);
  --line-soft: rgba(17, 17, 17, .16);
}

html,
body {
  background: var(--paper);
}

.rp-progress {
  height: 5px;
  background: var(--accent);
}

.rp-grid-overlay span {
  border-color: rgba(0, 61, 255, .22);
  background: rgba(0, 61, 255, .035);
}

.rp-header {
  border-bottom: 0;
  background: color-mix(in oklab, var(--paper) 90%, transparent);
  backdrop-filter: blur(18px);
}

.rp-header-row {
  min-height: 76px;
}

.rp-header-mark {
  color: var(--accent);
}

.mark-square {
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--accent);
  animation: rp-mark-breathe 2.8s ease-in-out infinite;
}

.mark-text {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 800;
}

.rp-nav a {
  border-bottom-width: 2px;
  font-size: 9px;
}

.rp-nav a:hover {
  color: var(--accent);
}

.rp-grid-toggle {
  border-color: var(--accent);
  background: var(--accent);
}

.rp-lang-toggle .lang-opt.on {
  color: var(--accent);
}

@keyframes rp-mark-breathe {
  0%, 100% { transform: scale(1); border-radius: 50%; }
  50% { transform: scale(.62); border-radius: 22% 58% 35% 62%; }
}

.rp-hero {
  min-height: auto;
  padding-top: 112px;
  padding-bottom: clamp(60px, 7vw, 112px);
}

.rp-hero-grid {
  display: block;
}

.rp-hero-left {
  display: grid;
  grid-template-columns: minmax(90px, 1fr) minmax(460px, 2.25fr);
  align-items: end;
  gap: clamp(30px, 5vw, 90px);
  margin-bottom: 28px;
}

.rp-logo {
  width: 106px;
}

.rp-logo img {
  filter: grayscale(1) contrast(1.8);
  mix-blend-mode: multiply;
}

.rp-coord-block {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  max-width: 780px;
  margin-left: auto;
  padding-top: 9px;
}

.rp-coord-row {
  border-bottom: 0;
  border-left: 1px solid var(--line-soft);
  padding: 6px 12px;
}

.rp-hero-right {
  position: relative;
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
}

.rp-hero-meta {
  grid-column: 1 / -1;
  padding-bottom: 15px;
}

html body .rp-tagline {
  grid-column: 1 / -1;
  margin: clamp(32px, 4.5vw, 72px) 0 clamp(34px, 4vw, 62px);
  color: var(--accent);
  font-family: var(--font-display) !important;
  font-size: clamp(84px, 10.7vw, 172px) !important;
  font-weight: 400 !important;
  line-height: .82 !important;
  letter-spacing: -.072em !important;
  text-transform: none !important;
}

html[lang="zh-Hant"] body .rp-tagline {
  max-width: 9.5em;
  margin-top: clamp(44px, 5vw, 78px);
  margin-bottom: clamp(48px, 5vw, 76px);
  font-family: 'Noto Serif TC', var(--font-display) !important;
  font-size: clamp(68px, 8.25vw, 126px) !important;
  font-weight: 500 !important;
  line-height: 1.04 !important;
  letter-spacing: -.045em !important;
}

.tagline-line {
  width: max-content;
  max-width: 100%;
}

.tagline-line:nth-child(2) {
  margin-left: clamp(18px, 9vw, 150px);
}

.tagline-aster {
  color: var(--ink);
}

.rp-tagline .tag-char {
  transition: color .35s ease, transform .5s cubic-bezier(.16, 1, .3, 1);
}

.rp-tagline:hover .tag-char:nth-child(odd) {
  transform: translateY(-.045em) rotate(-1deg);
  color: var(--ink);
}

.rp-tagline:hover .tag-char:nth-child(even) {
  transform: translateY(.025em) rotate(1deg);
}

.rp-hero-flobber {
  position: absolute;
  z-index: 5;
  top: clamp(180px, 25vw, 390px);
  right: clamp(0px, 2vw, 34px);
  width: clamp(94px, 10vw, 156px);
  aspect-ratio: 1;
  display: grid;
  place-content: center;
  gap: 5px;
  padding: 16px;
  background: var(--ink);
  color: var(--paper);
  text-align: center;
  clip-path: polygon(50% 0%, 74% 12%, 100% 38%, 90% 70%, 62% 100%, 27% 92%, 0% 65%, 10% 30%);
  animation: rp-flobber-float 5s ease-in-out infinite, rp-flobber-morph 8s ease-in-out infinite alternate;
}

.rp-hero-flobber span {
  font: 800 clamp(16px, 1.8vw, 26px)/.9 var(--font-body);
  letter-spacing: -.05em;
}

.rp-hero-flobber small {
  font: 600 7px/1.1 var(--font-body);
  letter-spacing: .12em;
}

@keyframes rp-flobber-float {
  0%, 100% { transform: translate3d(0, 0, 0) rotate(-5deg); }
  50% { transform: translate3d(-12px, -18px, 0) rotate(7deg); }
}

@keyframes rp-flobber-morph {
  from { border-radius: 42% 58% 54% 46% / 52% 38% 62% 48%; }
  to { border-radius: 58% 42% 35% 65% / 42% 60% 40% 58%; }
}

.rp-hero-copy {
  grid-column: 1 / span 5;
  padding-right: clamp(20px, 3vw, 52px);
}

.rp-sub-tagline {
  color: var(--accent);
}

.rp-intro {
  max-width: 22em;
  font-size: clamp(21px, 2vw, 31px) !important;
  font-weight: 500 !important;
  line-height: 1.13;
}

.rp-cta-btn {
  border-color: var(--accent);
  background: var(--accent);
}

.rp-cta-btn:hover {
  border-color: var(--ink);
  background: var(--ink);
}

.rp-hero-cover {
  grid-column: 6 / -1;
  aspect-ratio: 16 / 10;
  background: var(--accent);
}

.rp-hero-cover img {
  filter: saturate(.72) contrast(1.05);
}

.rp-hero-cover:hover img {
  filter: saturate(1.08) contrast(1.03);
}

.rp-hero-cover figcaption,
.rp-work-figmeta {
  background: var(--accent);
  color: #fff;
}

.rp-marquee {
  border-color: var(--accent);
  background: var(--accent);
  padding: 14px 0 13px;
}

.rp-marquee-item {
  font-size: 11px;
  letter-spacing: .12em;
}

.mq-glyph {
  color: var(--paper);
}

.rp-section-head {
  padding-top: clamp(94px, 11vw, 178px);
  padding-bottom: clamp(24px, 3vw, 46px);
}

html body .head-title {
  color: var(--accent);
  font-family: var(--font-display) !important;
  font-size: clamp(66px, 9.8vw, 154px) !important;
  font-weight: 400 !important;
  line-height: .82 !important;
  letter-spacing: -.065em !important;
  text-transform: none !important;
}

html[lang="zh-Hant"] body .head-title {
  font-family: 'Noto Serif TC', var(--font-display) !important;
  font-size: clamp(60px, 8vw, 122px) !important;
  font-weight: 500 !important;
  line-height: 1 !important;
  letter-spacing: -.045em !important;
}

.rp-kinetic-text {
  display: inline-flex;
  flex-wrap: wrap;
  overflow: hidden;
  padding: .04em .08em .12em 0;
}

.rp-kinetic-char {
  display: inline-block;
  transform-origin: center bottom;
  transition:
    transform .6s cubic-bezier(.16, 1, .3, 1),
    color .35s ease,
    opacity .35s ease;
  transition-delay: calc(var(--char-index) * 12ms);
}

.motion-enhanced .rp-section-head.motion-reveal:not(.is-revealed) .rp-kinetic-char {
  opacity: 0;
  transform: translateY(115%) rotate(var(--char-tilt));
}

.motion-enhanced .rp-section-head.motion-reveal.is-revealed .rp-kinetic-char {
  opacity: 1;
  transform: translateY(0) rotate(0);
}

.rp-work {
  position: relative;
  overflow: hidden;
  transition: color .45s ease, background-color .45s ease;
}

.rp-work::after {
  content: '';
  position: absolute;
  inset: 0 0 auto;
  height: 8px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .7s cubic-bezier(.16, 1, .3, 1);
}

.rp-work:nth-child(even)::after {
  transform-origin: right;
}

.rp-work:hover::after,
.rp-work.is-hover::after {
  transform: scaleX(1);
}

.rp-work:hover,
.rp-work.is-hover {
  background: #eeece7;
}

.rp-work-figure {
  --media-drift-x: 0px;
  --image-x: 0px;
  --image-y: 0px;
  overflow: hidden;
  transform: translate3d(var(--media-drift-x), 0, 0) perspective(1200px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
  box-shadow: 0 0 0 1px rgba(17, 17, 17, .08);
}

.rp-work-figure::before {
  content: 'RAUM+ / VIEW';
  position: absolute;
  z-index: 4;
  top: 18px;
  left: 18px;
  padding: 9px 11px 8px;
  background: var(--accent);
  color: #fff;
  font: 600 8px/1 var(--font-body);
  letter-spacing: .14em;
  transform: translateY(-160%) rotate(-4deg);
  transition: transform .55s cubic-bezier(.16, 1, .3, 1);
  pointer-events: none;
}

.rp-work:hover .rp-work-figure::before {
  transform: translateY(0) rotate(-4deg);
}

.rp-work-img {
  filter: saturate(.76) contrast(1.04);
  transition: opacity .38s ease, transform .55s cubic-bezier(.16, 1, .3, 1), filter .45s ease !important;
  will-change: transform;
}

.rp-work:hover .rp-work-img {
  filter: saturate(1.12) contrast(1.02);
}

.motion-enhanced .rp-work.motion-reveal .rp-work-figure {
  clip-path: inset(0 100% 0 0);
}

.motion-enhanced .rp-work:nth-child(even).motion-reveal .rp-work-figure {
  clip-path: inset(0 0 0 100%);
}

.motion-enhanced .rp-work.motion-reveal.is-revealed .rp-work-figure,
.motion-enhanced .rp-work:nth-child(even).motion-reveal.is-revealed .rp-work-figure {
  clip-path: inset(0 0 0 0);
}

html body .rp-work-title {
  font-family: var(--font-display) !important;
  font-size: clamp(46px, 5.5vw, 88px) !important;
  font-weight: 400 !important;
  line-height: .9 !important;

html[lang="zh-Hant"] body .rp-work-title {

        "It begins with the greeting “Hallo! Servus!” An ordinary salutation is enough to open an observation: how is a city seen, touched and understood? Travellers often remember street vendors first. A brief conversation can exchange a great deal of local knowledge. The tiny scene formed by vendor, passerby and space becomes the sharpest incision into urban vitality.",

      "essay_de": [
        "Das SUBBUS Europäische Aktionsprojekt ist ein Experiment im öffentlichen Raum und in der Performancekunst, das einen Bus als mobiles Feld nutzt. Es begann 2014 in einem kuratorischen Kurs an einer deutschen Kunstakademie, wo die Beteiligten fragten, wie ein Bus vom Verkehrsmittel zum Ausstellungsraum, Diskussionsort, temporären Wohnraum und öffentlichen Interface der Stadt werden kann.",
        "Ausgangspunkt war meine körperliche Erfahrung überfüllter Busse in Taiwan, im Kontrast zur alltäglichen Disziplin des Essverbots im deutschen öffentlichen Verkehr. Daraus entstand die These vom Bus als Ort kultureller Reibung und körperlicher Aushandlung. Ein Bus ist nicht nur ein Fahrzeug, sondern ein verdichtetes soziales Modell: Menschen stehen nebeneinander, bewegen sich, warten, folgen Regeln und zeigen unmerklich Klasse, Kultur, Etikette und körperliche Grenzen.",
        "In diesem Projekt verstehe ich den Bus als eine neu arrangierbare Handlungsbühne. Er trägt Fahrgäste, aber auch Stadterinnerung, kulturelle Gewohnheiten, öffentliche Ordnung und persönliche Empfindungen. Durch Performance, Essen, Zusammenkunft und räumliche Veränderung versuche ich, den Bus zu einem mobilen Raum zu machen, der Dialog erzeugen kann.",
        "Das SUBBUS Projekt von 2014 forderte jede beteiligte Person auf, eine eigene Deutung des Busses und seiner Möglichkeiten zu entwickeln. Ich ging von der Erfahrung aus, sich in taiwanischen Stadtbussen zu drängen, und fragte, wie Körper im öffentlichen Verkehr zusammengedrückt, diszipliniert und zu kurzen Formen der Nähe mit Fremden gezwungen werden. Gegenüber der Enge, Bewegung und Mischung taiwanischer Busse zeigt der deutsche öffentliche Verkehr eine andere Ordnung.",
        "Ich führte Essen in den Busraum ein, damit Nahrung zum Medium werden konnte, um kulturelle Normen zu öffnen. Wenn Menschen im Bus essen, Geschmäcker austauschen, Frühstück oder Süßes teilen, beginnt der disziplinierte Verkehrsraum sich zu lockern und verwandelt sich in ein temporäres soziales Feld.",
        "Während der Jahresausstellung kuratierte und realisierte ich die Aktion Bus Sandwich. Die Arbeit entstand aus dem Lebensgefühl einer Zwischengeneration: Wie die Füllung eines Sandwichs werden wir von oben durch bestehende Systeme, Traditionen und Erwartungen gedrückt und von unten durch neue Generationen, neue Technologien und neue Lebensweisen geschoben.",
        "SUBBUS ist eine kuratorische Plattform mehrfacher Übersetzungen. Der Bus trägt Menschen und Dinge, aber auch Wissen in Bewegung, Debatten, kollektive Entscheidungen und räumliche Experimente. Er kann Ausstellungsort, Forschungsraum, Sitzungsraum, Vortragsraum, temporärer Club, Campingraum oder Stadtbeobachtungsstation sein. Diese Instabilität ist der Kernwert von SUBBUS.",
        "Tagsüber kann SUBBUS als Ort für Forschung, Treffen, Präsentation und Diskussion dienen; nachts kann er sich in einen temporären Wohn-, Versammlungs- und Aufenthaltsraum verwandeln. Der Bus ist nicht mehr nur ein Werkzeug, das durch die Stadt fährt, sondern ein Handlungsfeld, das anhalten, eingreifen und Dialog eröffnen kann. Öffentlichkeit ist keine feste Eigenschaft; sie entsteht durch Nutzung, Aushandlung und Interaktion.",
        "Während des Projekts reiste SUBBUS durch Deutschland und mehrere europäische Städte und verband sich mit Museen, Kunstvereinen, Gemeinschaftsräumen und verschiedenen öffentlichen Feldern. Jeder Ort besitzt seine eigene Geschichte, Institutionen, Verkehrsordnung und soziale Atmosphäre. Wenn SUBBUS an einem Ort hält, setzt er sich zugleich den lokalen Bedingungen aus: Wer nähert sich, wer tritt ein, wer beginnt zu sprechen, wer hält Abstand?",

      "note_zh": "從德國鄉間的無人農產亭談起：信任、良知與制度之間，真正被測量的是一個人如何面對自己。",

      "essay_zh": [
        "人與土地之間有一種信任。你播種，它就生長；你照料，它就回報。土地從不過問你是誰。這種信任久了，會從人與土地之間，溢到人與人之間。",

      "essay_en": [
        "There is a kind of trust between people and land. You sow, and it grows; you tend, and it answers. The land never asks who you are. Over time, this trust can spill over from the relation between people and soil into the relation between people themselves.",
        "At the roadside one sometimes sees a small unattended farm stand. Fresh fruit and vegetables are placed on shelves, prices marked, with a coin box beside them. Most first-time passersby pause for a second: why is no one watching? That moment of hesitation is where everything begins.",
        "In rural Germany, this kind of self-service sale is common. Produce harvested that day is set out on simple racks; each item is labelled, and a wooden box or metal tin receives the money. There is no clerk, no surveillance, no one to remind you what you owe. People call it an honesty market. To understand why it works, one has to look back toward civic education and the ways a society sustains a high degree of self-governance.",
        "The most revealing moment is change. When no one is there and the box cannot make exact change, when you hold only a larger bill, when the pumpkins differ in size and the price is partly a matter of preference: will you pay more, or less? What do you believe is reasonable? In that instant no one is trading with you. You are speaking with yourself, and perhaps also with the spirits of the land. In the pumpkin fields around Nuremberg before Halloween, a pumpkin is finally worth what the person standing before it decides it is worth.",
        "Enlarge the question and it becomes the question of whether one buys a ticket on public transport. In many cities there are no ticket gates; a machine stands in the carriage or on the platform, and whether you buy is up to you. So do people really never evade fares? Of course they do. Germany has plenty of fare dodgers, Schwarzfahrer, and Berlin once displayed a slogan saying that one in six passengers was riding without a ticket.",
        "Does that mean the foundation of trust has collapsed? Not so quickly. From the perspective of economic cost, the system is not romantic at all. The absence of gates has less to do with trust than with accounting. Installing and maintaining gates at every station costs more than the losses from fare evasion; a plain-clothes inspection team and a sixty-euro fine can cover much of the gap. What we call trust is, in the ledger, an optimized cost structure. Student passes are printed on student IDs, seniors buy discounted annual tickets, many Germans own cars or bicycles; those who can and want to evade are a smaller group than the myth suggests. You are allowed not to buy immediately because forcing everyone to buy is too expensive.",
        "Once the romance is dismantled, the deeper question appears. Economic reason can explain why a system permits trust, but not why the person standing before the coin box chooses honesty. The system calculates collective cost; the individual faces conscience. The real weight of an honesty market does not lie in proving that human nature is good. It lies elsewhere. Every coin dropped into the box is a small rehearsal of subjectivity.",
        "Law governs behavior; conscience governs intention. A fine draws the lower limit: cross it, and you pay. Offering points toward an upper limit: what you are still willing to give when no one is watching. A mature society first uses everyday education to turn rules into habits, then relies on law to hold the bottom line. The honesty market stands precisely where these two forces meet.",
        "So we return to the land. Trust does not collapse because someone evades a fare, because trust has always been a question addressed to oneself. This is also the first lesson the land teaches. How you treat it may not be exposed immediately; time will answer. The slight difference between paying a little more or a little less at an unattended stand, and the sincerity with which you plant a seed, are in the end the same thing."

      "essay_de": [
        "Zwischen Mensch und Land gibt es eine Art Vertrauen. Man sät, und es wächst; man pflegt, und es antwortet. Das Land fragt nie, wer man ist. Wenn dieses Vertrauen lange genug besteht, kann es aus der Beziehung zwischen Mensch und Boden in die Beziehung zwischen Menschen übergehen.",
        "Am Straßenrand sieht man manchmal einen kleinen, unbeaufsichtigten Hofstand. Frisches Obst und Gemüse liegen auf einfachen Gestellen, die Preise sind angeschrieben, daneben steht eine Kasse. Wer zum ersten Mal vorbeikommt, hält meist kurz inne: Warum passt hier niemand auf? Genau in diesem Moment des Innehaltens beginnt alles.",
        "In ländlichen Gegenden Deutschlands sind solche Formen des Selbstverkaufs alltäglich. Was am selben Tag geerntet wurde, liegt auf einfachen Regalen; jedes Stück hat seinen Preis, eine Holzkiste oder Metallbox sammelt das Geld. Kein Verkäufer, keine Überwachung, niemand erinnert einen daran, wie viel zu zahlen ist. Man nennt das einen Vertrauensstand oder einen Markt der Ehrlichkeit. Um zu verstehen, warum er funktioniert, muss man auf die moralische und bürgerliche Erziehung blicken, durch die eine Gesellschaft ein hohes Maß an Selbstverwaltung trägt.",
        "Am aufschlussreichsten ist der Moment des Wechselgeldes. Wenn niemand da ist und in der Kasse nicht genug Münzen liegen, wenn man nur einen größeren Schein hat, wenn die Kürbisse unterschiedlich groß sind und der Preis auch vom eigenen Ermessen abhängt: Zahlt man mehr oder weniger? Was hält man selbst für angemessen? In diesem Augenblick handelt niemand mit einem. Man spricht mit sich selbst, vielleicht auch mit den Gottheiten dieses Landes. In den Kürbisfeldern um Nürnberg vor Halloween ist ein Kürbis am Ende so viel wert, wie der Mensch, der vor ihm steht, ihm zuspricht.",
        "Vergrößert man diese Frage, wird sie zur Frage, ob man im öffentlichen Verkehr eine Fahrkarte kauft. U-Bahn und Straßenbahn haben oft keine Schranken; ein Automat steht auf dem Bahnsteig oder im Wagen, kaufen muss man selbst. Bedeutet das, dass niemand schwarzfährt? Natürlich nicht. Schwarzfahrer gibt es auch in Deutschland, und in Berlin hing einmal der Satz, jeder sechste Fahrgast fahre ohne Ticket.",
        "Bricht damit die Grundlage des Vertrauens zusammen? Nicht so schnell. Aus ökonomischer Sicht ist die Logik dieses Systems kaum romantisch. Das Fehlen von Schranken hat weniger mit Vertrauen zu tun als mit einer Rechnung. An jedem Bahnhof Schranken zu bauen und dauerhaft zu warten, kostet mehr als der Verlust durch Schwarzfahren; eine Kontrolleinheit ohne Uniform und ein Bußgeld von sechzig Euro gleichen vieles aus. Was Vertrauen heißt, ist im Kassenbuch eine optimale Kostenlösung. Semestertickets stehen auf Studierendenausweisen, ältere Menschen haben vergünstigte Jahreskarten, viele besitzen Auto oder Fahrrad; wer tatsächlich schwarzfahren kann und will, bleibt eine begrenzte Gruppe. Man darf scheinbar frei entscheiden, weil die vollständige Kontrolle zu teuer wäre.",
        "Ist die Romantik entzaubert, taucht erst die tiefere Frage auf. Ökonomische Vernunft erklärt, warum ein System Vertrauen zulässt; sie erklärt nicht, warum der Mensch vor der Kasse ehrlich bleibt. Das System berechnet die Kosten der Gruppe, der Einzelne begegnet seinem Gewissen. Das eigentliche Gewicht des Ehrlichkeitsmarktes liegt nicht darin, die Güte des Menschen zu beweisen. Es liegt an anderer Stelle. Jede Münze, die in die Kasse fällt, ist eine kleine Übung der Subjektivität.",
        "Das Recht regelt das Verhalten, das Gewissen die Absicht. Die Strafe zieht eine untere Grenze: Wer sie überschreitet, zahlt. Die freiwillige Gabe zeigt nach oben: auf das, was man noch zu geben bereit ist, wenn niemand hinsieht. Eine reife Gesellschaft macht Regeln zunächst durch Alltagserziehung zur Gewohnheit und sichert die untere Grenze anschließend durch das Recht. Der Ehrlichkeitsmarkt steht genau an dieser Schnittstelle.",
        "So kehren wir zum Land zurück. Vertrauen zerbricht nicht, weil jemand schwarzfährt, denn Vertrauen fragt immer zuerst nach einem selbst. Das ist auch die erste Lektion des Landes. Wie man es behandelt, verrät es nicht sofort; die Zeit wird antworten. Der kleine Unterschied zwischen etwas mehr oder etwas weniger Geld an einem unbeaufsichtigten Stand und der Aufrichtigkeit, mit der man einen Samen in die Erde legt, ist letztlich ein und dieselbe Sache."

      "note_de": "Stadterneuerung, Immobilien, Ackerland und Grabbeigaben im Keller: Verliert eine Stadt ihre Seele, bleiben Begierde, Fragmente und unterirdische Erinnerung zurück.",
      "essay_zh": [
        "都市更新與房地產開發像一個沒有終點的循環。城市不斷被建造，卻越來越不像有人真正生活其中。理想城市並不存在。它也許只能被想像在天空，而它在現實中的殘骸，則像陪葬品一樣被安放在地窖裡。",
        "《大富翁》是一種資本市場的虛擬模型。現實中的城市也像這場遊戲，由土地、投資、佔有、獵捕與被獵捕組成。因此，我在作品中象徵性地買下一座城市，用來回應社會地位、財產制度與階級不平等。",
        "旅行者是城市觀察者。他帶著對歐洲文化的浪漫想像穿越不同城市，並在各種時代、建築樣式與歷史層疊中，形成一座拼貼城市。這座城市像一本生活字典，記錄人的移動、記憶與慾望。家是安身之處，也可能成為一種被困住的狀態。",
        "對我而言，買房是一種遙遠的幻想。在這段旅程中，我試圖透過互動遊戲建立自己的記憶。這個遊戲以城市為棋盤，以房屋為棋子，讓觀者在看似輕鬆的參與中，感受到居住、資本與失落之間的拉扯。",
        "我收集都市更新過程中被拆除的建築廢棄物，將不同區域的建材搗碎，轉化為創作材料。在盧森堡的美術館經驗中，我重新思考歷史建築再利用的可能性，也對照台灣在古蹟修復與空間再生上的困難。我在舊城牆上進行一場修補表演，讓站在壕溝上的觀者共同面對古蹟保存、再利用與觀看位置的問題。",
        "在 Friedrichshafen 湖區，人們想像並建構自己的度假村，如同外國房地產投資者，在一塊被想像為理想的度假地上興建房屋。然而這些房子呈現出無人照管、逐漸風化與毀壞的狀態，暗示所有居住夢想都建立在一個並不穩固的基礎上。",
        "在都市更新之下，農業用地逐漸被建築佔領。房地產炒作使年輕人購屋成為遙不可及的夢。城市表面持續擴張，內部卻失去生活的重量，最終形成一座沒有靈魂的城市。",
        "不清楚的建築樣式，顯示城市失去自身的文化辨識度。地窖的開啟如同一座考古現場的發掘。東方風水神秘學中，方位、色彩與物件被重新安置；陶罐中保存著小麥種子，像是對土地記憶的封存。也許理想的房子最後像一件陪葬品，安靜長眠。人終究什麼都帶不走，只留下城市的殘片、欲望的模型，以及被壓在地下的靈魂。"
      ],
      "essay_en": [
        "Urban renewal and real-estate development form an endless loop. The city keeps being built, yet it increasingly feels as though no one truly lives inside it. The ideal city does not exist. Perhaps it can only be imagined in the sky, while its material remains are placed in a cellar like burial objects.",
        "Monopoly is a virtual model of the capital market. The real city resembles this game as well: a system of land, investment, possession, hunting and being hunted. In the work, I therefore symbolically purchase a city in response to social status, property systems and class inequality.",
        "The traveler becomes an observer of cities. Carrying a romantic imagination of European culture, he passes through different cities and gathers eras, architectural styles and historical layers into a collage-city. This city becomes a dictionary of living, recording movement, memory and desire. Home is a place of shelter, but it can also become a condition of confinement.",
        "For me, buying a house remains a distant fantasy. On this journey I attempt to build my own memory through an interactive game. The city becomes the board and houses become the pieces, allowing viewers, through an apparently light form of participation, to feel the tension among dwelling, capital and loss.",
        "I collect construction waste from buildings demolished during urban renewal, crush materials from different districts and transform them into artistic matter. In Luxembourg, the experience of the museum led me to reconsider the possibility of reusing historic architecture, while also reflecting on the difficulties of restoration and spatial regeneration in Taiwan. I carried out a repair performance on an old city wall, so that viewers standing along the moat confronted questions of preservation, reuse and the position from which history is seen.",
        "In the lake region of Friedrichshafen, people imagine and construct their own holiday resorts, like foreign real-estate investors building houses on an idealized vacation site. Yet these houses appear unattended, weathered and damaged, suggesting that every dream of dwelling rests on an unstable foundation.",
        "Under urban renewal, agricultural land is gradually occupied by buildings. Real-estate speculation makes home ownership an unreachable dream for young people. The city expands on the surface, while inside it loses the weight of life, eventually becoming a city without a soul.",
        "Ambiguous architectural styles reveal the loss of cultural self-recognition. The opening of a cellar appears like the excavation of an archaeological site. Within it, eastern Feng Shui mysticism, directions, colors and objects are rearranged; wheat seeds preserved in ceramic jars become a sealing of land memory. Perhaps the ideal house finally resembles a burial object, quietly asleep. In the end, one can take nothing away, leaving only fragments of the city, models of desire and a soul pressed underground."
      ],
      "essay_de": [
        "Stadterneuerung und Immobilienentwicklung bilden einen endlosen Kreislauf. Es wird immer weiter gebaut, doch die Stadt wirkt zunehmend unbewohnt. Die ideale Stadt existiert nicht. Vielleicht liegt sie nur noch im Himmel, während ihre materiellen Überreste als Grabbeigaben in einem Keller ruhen.",
        "Monopoly ist ein virtuelles Modell des Kapitalmarktes. Tatsächlich ähneln unsere Städte diesem Spiel: einem System aus Besitz, Spekulation, Jagd und Beute. Deshalb kaufe ich in dieser Arbeit symbolisch eine Stadt, als kritische Untersuchung von sozialem Status, Eigentum und sozialer Ungleichheit.",
        "Der Reisende wird zum Stadtbeobachter. Er trägt eine romantische Vorstellung der europäischen Kultur in sich. Die Collage-Stadt führt durch verschiedene Zeiten, Architekturen und historische Schichten; sie wird zu einem Wörterbuch des Lebens. Zuhause bedeutet Geborgenheit, kann aber auch Einschließung sein.",
        "Für mich bleibt der Kauf eines Hauses eine entfernte Fantasie. Auf dieser Reise baue ich mir ein Gedächtnis auf, durch ein interaktives Spiel, in dem Beobachtung, Erinnerung und Kritik miteinander verbunden werden.",
        "Aus abgerissenen Gebäuden der Stadterneuerung sammle ich Baumaterialien aus verschiedenen Stadtteilen. Ich zerkleinere sie und verwandle sie in künstlerisches Material. In Luxemburg reflektierte ich darüber, warum die Wiederverwendung historischer Architektur in Taiwan so schwer realisierbar scheint. Auf der alten Stadtmauer führte ich eine Reparatur-Performance durch. Die Zuschauerinnen und Zuschauer standen am Graben und wurden Teil einer Betrachtung über Restaurierung, Erhaltung und Wiederverwendung historischer Orte.",
        "In Friedrichshafen entwerfen Menschen ihre eigenen Ferienresorts. Sie agieren wie ausländische Immobilieninvestoren, die auf einem idealisierten Urlaubsort ihr eigenes Haus errichten. Doch die Häuser wirken verlassen, verwittert und beschädigt. Alles steht auf einem unsicheren Fundament.",
        "Landwirtschaftliche Flächen werden im Prozess der Stadterneuerung zunehmend von Gebäuden besetzt. Immobilienspekulation macht den Erwerb eines Hauses für junge Menschen zu einem unerreichbaren Traum. Am Ende entsteht eine Stadt ohne Seele.",
        "Uneindeutige Baustile zeigen den Verlust kultureller Selbstvergewisserung. Ein geöffneter Keller erscheint wie eine archäologische Fundstelle. In ihm begegnen sich östliche Feng-Shui-Vorstellungen, Farbordnungen verschiedener Himmelsrichtungen und Gefäße mit Weizensamen. Vielleicht gleicht das ideale Haus am Ende einer Grabbeigabe: Es wird sorgsam aufbewahrt, bleibt jedoch im Dunkeln zurück. Auch wir können am Ende nichts mitnehmen."
      ],
      "href": "https://genius912.blogspot.com/2026/06/archaologie-einer-seelenlosen-stadt.html"
    },

      "title_zh": "公共空間的美感經驗",
      "title_en": "The Aesthetic Experience of Public Space",
      "title_de": "Die ästhetische Erfahrung im öffentlichen Raum",
      "note_zh": "公共藝術不是一件被放進空間的作品，而是一種生活場域、共享經驗與環境創造力的持續經營。",
      "note_en": "Public art is not simply an object placed in space, but an ongoing cultivation of lived environment, shared experience and environmental imagination.",
      "note_de": "Kunst im öffentlichen Raum ist nicht bloß ein Objekt im Raum, sondern die dauerhafte Pflege von Lebenswelt, geteilter Erfahrung und schöpferischem Umfeld.",
      "essay_zh": [
        "公共藝術的起點，是對區域環境的整體理解。它要在社會、經濟、文化、歷史、空間與時間這些層面之間來回思考，並將它們整合成一個完整的視野。它面對的是人文地景，是居民的共同記憶與生命經驗，是人們對場域與地方所累積的情感。",
        "正因如此，公共藝術不只是一件放置於空間中的藝術品。它牽涉公共的社會性，牽涉公共服務，也牽涉一段引導公眾參與的過程。它關心生活場域，關心空間的本質，關心公眾日常的視覺經驗。從一件作品到一種公眾意識，從設置點的價值到整體環境的未來發展，藝術進入空間的本質，始終是主體與客體之間的互動，以及地方文化厚度的累積。",
        "對居民而言，美麗也許就藏在繁雜街景裡的一次偶然遇見。隨手用手機拍下，又匆匆離去。是誰造就了這樣的場景，又是如何吸引了民眾的目光？",
        "市容之美，從來不只是公部門在公共空間的造景美化。它來自人與環境之間長期累積的默契，一種彼此共享的美感連結。都市的美感經驗，絕非少數公共藝術作品就能達成。",
        "每個人都有自己的生活領域。在日常移動的經驗裡，有多少事物讓我們覺得愉悅而美麗？還是我們總是低頭看著手機螢幕，在虛幻的世界裡遨遊，反倒覺得踏實些？",
        "美感經驗，關乎一片不可忽視的心靈視野。當環境的粗糙被縱容或默許，居民的回應不會只是無奈的申訴。視覺需要鍛鍊。一盆造景，可能是用心的點綴，也可能只是空間的佔據。我們究竟在美化環境，還是在美化心靈？這個世界，沒有所謂理所當然的美麗。",
        "一件美麗的事物，從來不是憑空而來。即便只是一盆造景，背後也需要多少心思與時間的付出，才能換來眼前的樣貌。公共藝術對空間的干預，正是這份付出的延伸。藝術創作者所打開的，是一個社會的向度，一種詩意的營造。它透過符碼進行溝通，也藉此傳播議題。",
        "若對社會脈絡的理解只停留在浮面的樣板樣式，文化觀光與社區景點便容易流於形式，公仔文化也成為另一種型態的裝飾品。藝術如何真正介入空間，取決於它對生活觀點與文化價值的理解有多深。",
        "情感所建構的環境，無法用單一的設施或裝置完成。它需要的是一個可以被經營、能夠持續的環境，一種環境創造力的思維。這才是公共藝術文化行銷真正的起點。"
      ],
      "essay_en": [
        "The starting point of public art is a holistic understanding of the regional environment. It must move among social, economic, cultural, historical, spatial and temporal layers, integrating them into a wider field of vision. What it faces is a human landscape: the shared memory and lived experience of residents, and the feelings accumulated toward a site and place.",
        "For this reason, public art is more than an artwork placed in space. It concerns the social nature of the public, the provision of public service, and a process that guides people toward participation. It cares for the lived environment, for the essence of space, and for the everyday visual experience of the public. From a single work to public consciousness, from the value of the site to the future development of the whole environment, the essence of art entering space remains the interaction between subject and object, and the accumulation of a place’s cultural depth.",
        "For residents, beauty may be hidden in an accidental encounter within a busy streetscape: a quick photo on a phone, then a hurried departure. Who created such a scene, and how did it draw the public gaze?",
        "The beauty of the cityscape has never been merely the beautification of public space by public agencies. It comes from a long-formed tacit understanding between people and environment, a shared aesthetic connection. The aesthetic experience of the city can never be achieved by a small number of public artworks alone.",
        "Everyone has their own sphere of daily life. In the experience of moving through our everyday routes, how many things do we find pleasing and beautiful? Or do we always lower our eyes to the phone screen, roaming through a virtual world that somehow feels more secure?",
        "Aesthetic experience concerns an inner horizon that cannot be ignored. When the roughness of an environment is tolerated or silently permitted, the response of residents will not be merely helpless complaint. Vision must be trained. A potted arrangement may be a careful accent, or it may simply occupy space. Are we beautifying the environment, or beautifying the mind? In this world, there is no such thing as beauty that can be taken for granted.",
        "A beautiful thing never comes from nowhere. Even a modest plant arrangement requires thought and time before it becomes what we see. The intervention of public art in space is an extension of that devotion. What artists open is a social dimension, a poetic construction. Through signs they communicate, and through that communication they carry issues forward.",
        "If the understanding of social context remains only at the level of surface templates, cultural tourism and community attractions easily become formal gestures, while mascot culture turns into another mode of decoration. Whether art can truly intervene in space depends on how deeply it understands ways of living and cultural value.",
        "An environment built through feeling cannot be completed by a single facility or installation. It requires an environment that can be cultivated and sustained, a way of thinking rooted in environmental creativity. This is the true starting point of cultural marketing for public art."

      "essay_de": [
        "Der Ausgangspunkt der Kunst im öffentlichen Raum liegt im ganzheitlichen Verständnis des regionalen Umfelds. Sie muss zwischen den Ebenen des Sozialen, Ökonomischen, Kulturellen, Historischen, Räumlichen und Zeitlichen hin und her denken und sie zu einer umfassenden Sichtweise zusammenführen. Ihr Gegenüber ist die Kulturlandschaft, das gemeinsame Gedächtnis und die Lebenserfahrung der Bewohner, jene Gefühle, die sich gegenüber Schauplätzen und Orten angesammelt haben.",
        "Eben deshalb ist Kunst im öffentlichen Raum mehr als ein im Raum platziertes Kunstwerk. Sie berührt das soziale Wesen des Öffentlichen, sie berührt den Dienst an der Öffentlichkeit, und sie berührt einen Prozess, der die Öffentlichkeit zur Teilhabe führt. Es geht ihr um die Lebenswelt, um das Wesen des Raumes, um die alltägliche visuelle Erfahrung der Öffentlichkeit. Vom einzelnen Werk zum öffentlichen Bewusstsein, vom Wert des Standorts zur zukünftigen Entwicklung des gesamten Umfelds: Wenn Kunst in den Raum eintritt, bleibt ihr Wesen stets das Wechselspiel zwischen Subjekt und Objekt sowie das Anwachsen der kulturellen Dichte eines Ortes.",
        "Für die Bewohner verbirgt sich das Schöne vielleicht in einer zufälligen Begegnung inmitten des dichten Straßenbildes. Rasch mit dem Handy festgehalten, und schon eilt man weiter. Wer hat diese Szene geschaffen, und wie hat sie den Blick der Menschen auf sich gezogen?",
        "Die Schönheit des Stadtbildes war noch nie bloß die gestalterische Verschönerung des öffentlichen Raums durch die Behörden. Sie entsteht aus dem über lange Zeit gewachsenen, stillschweigenden Einverständnis zwischen Mensch und Umgebung, aus einer gemeinsam geteilten ästhetischen Verbindung. Die ästhetische Erfahrung der Stadt lässt sich niemals durch einige wenige Werke der Kunst im öffentlichen Raum erreichen.",
        "Jeder Mensch hat seinen eigenen Lebensbereich. Wie viele Dinge in der Erfahrung der täglichen Wege empfinden wir als angenehm und schön? Oder senken wir den Blick doch immerzu auf den Bildschirm des Handys und treiben durch eine Scheinwelt, in der wir uns paradoxerweise geborgener fühlen?",
        "Die ästhetische Erfahrung betrifft einen inneren Horizont, der sich nicht übersehen lässt. Wo die Rohheit der Umgebung geduldet oder stillschweigend hingenommen wird, erschöpft sich die Antwort der Bewohner nicht in einer hilflosen Beschwerde. Das Sehen will geschult sein. Ein Pflanzenarrangement kann ein mit Bedacht gesetzter Akzent sein oder bloß eine Besetzung des Raumes. Verschönern wir die Umgebung oder verschönern wir das Gemüt? Es gibt auf dieser Welt keine Schönheit, die sich von selbst versteht.",
        "Etwas Schönes entsteht niemals aus dem Nichts. Selbst ein bloßes Pflanzenarrangement verlangt nach viel Gedanken und Zeit, ehe es die Gestalt annimmt, die vor uns liegt. Der Eingriff der Kunst in den öffentlichen Raum ist die Verlängerung eben dieser Hingabe. Was die Kunstschaffenden eröffnen, ist eine gesellschaftliche Dimension, eine poetische Gestaltung. Sie verständigt sich über Zeichen und trägt damit ihre Anliegen weiter.",
        "Bleibt das Verständnis des gesellschaftlichen Zusammenhangs an der Oberfläche schablonenhafter Muster, so geraten Kulturtourismus und Quartiersattraktionen leicht zur bloßen Form, und die Maskottchenkultur wird zu einer weiteren Spielart des Dekorativen. Wie weit die Kunst wirklich in den Raum eingreift, hängt davon ab, wie tief ihr Verständnis von Lebensperspektive und kulturellem Wert reicht.",
        "Ein Umfeld, das aus Gefühlen gebaut ist, lässt sich nicht durch eine einzelne Einrichtung oder Installation herstellen. Es verlangt nach einem Umfeld, das sich pflegen lässt und Bestand hat, nach einer Denkweise schöpferischer Gestaltung des Umfelds. Genau hier liegt der wahre Ausgangspunkt des kulturellen Marketings der Kunst im öffentlichen Raum."

      "一、午夜的內庭",
      "舊市政廳（Altes Rathaus）的內庭，那一晚被工程圍欄填滿。",
      "這些圍欄沒有封路，也沒有禁止進入，它們把整座庭院翻轉成一條沒有固定答案的通道。鍍鋅的鐵網一節接著一節，三百盞橘紅色的警示燈在地面與欄架上明滅。觀眾從入口走進來，要自己找到出口。圍欄是活動的，可以推、可以挪，於是真正有趣的事情開始發生。一個人替自己推開一條路，同一個動作，往往就擋住了旁邊另一個人的去向。有人皺眉，有人退讓，有人乾脆停下來，等對面的陌生人先過。",
      "這是一場參與。觀眾走進作品裡面，成為它的一部分，沒有停在外面欣賞。自由的界線這個抽象的命題，在那個內庭裡被翻譯成一件很具體的事，就是你想往前走的時候，得先看一眼別人。",
      "我把這件作品叫做《自由的界線》（Die Grenzen der Freiheit）。它的材料，全部來自城市平時用來規範人、引導人、阻擋人的那套基礎設施。",
      "二、藍夜：一座城市短暫的例外狀態",
      "要理解這件作品，得先理解它被放進去的那個夜晚。",
      "紐倫堡藍夜從 2000 年開始，每年五月的第一個星期六舉行，從晚上七點一路到隔天清晨五點。一整個夜晚，這座城市進入一種短暫的例外狀態。平時各有開放時間、各有門禁規矩的公共空間，市政廳、圖書館、城堡、博物館、甚至停車場，在這一夜被串連起來，向所有人敞開。三百多個表演團體與樂團散布在城裡的各個角落同時展演。今年湧進了十三萬五千人。",
      "這是一座城市對自己的一次重新設定。日常的紐倫堡是有秩序的，什麼時間哪裡可以進、哪裡不可以進，都寫得清清楚楚。藍夜把這套秩序暫時鬆開，讓人可以在午夜走進原本進不去的地方。例外因此成了藍夜真正的主題，而所有的例外，都建立在平時那套不被注意的規範之上。",
      "藝術裝置的展示時間其實更短。它們在晚上七點亮起，凌晨一點以前就要收掉，之後城市才把夜晚交給音樂與人群，繼續走到天亮。一場看似徹夜的狂歡，內部其實有非常精密的時間刻度。這個刻度，後面我會再回來談，因為它直接決定了一件公共藝術作品能不能成立。",
      "「自由」放在這個脈絡裡，就不只是一個漂亮的哲學詞。它是在問，當一座城市願意暫時放鬆它對空間的控制，市民會怎麼使用這份多出來的自由。他們會更體貼，還是更各自為政。藍夜把這個問題丟給整座城市，而我想用一件作品，把這個問題濃縮進一個庭院。",
      "三、一件用秩序的工具寫成的作品",
      "我選的材料，是工程圍欄與警示燈。",
      "這個選擇是整件作品的核心。工程圍欄（Absperrschranke）是城市裡最沉默、也最常見的東西。它出現在施工現場、出現在改道的路口、出現在所有「這裡暫時不能走」的地方。它的功能就是劃界，告訴你的身體可以到哪裡為止。警示燈也是同一套語言，橘紅色的閃光意味著注意、繞道、止步。這些物件平時隱形，因為我們太習慣服從它們。",
      "把這套劃界的工具從街頭搬進舊市政廳的內庭，事情就翻轉了。",
      "第一層翻轉，是場所。舊市政廳是市政權力的所在地，是這座城市制定規則、執行秩序的象徵中心。我在權力的庭院裡，用權力自己的封鎖工具，蓋了一座讓人迷路的迷宮。控制的符號被搬到控制的源頭，彼此對照。",
      "第二層翻轉，是功能。在街頭，圍欄是固定的，它替你決定路線，你只能服從。在我的作品裡，圍欄是可以移動的。決定權被交還給觀眾，每個人都能替自己開路。可是這份被交還的自由立刻撞上一個現實，你的每一次移動都在改寫別人的處境。自由一旦變得可以移動，責任就跟著浮現。",
      "這就是這件作品想說的話。它讓觀眾親身演練一個古老的命題，自由要領受某些限制，才能真正換得。我的自由，也許並不等於你的自由。自由屬於個人，卻不以自我為中心，它同時牽涉到對他者的衡量。這些句子寫在牆上是抽象的，走進那座圍欄的迷宮，它們就變成你腳下每一步要面對的選擇。衝突，或者禮讓（Konflikt oder Höflichkeit），這兩個德文字是我給作品下的註腳，也是觀眾在內庭裡真正要做的決定。",
      "四、身體成為媒介：一場公共空間的協商",
      "從城市研究（Stadtforschung）的角度看，這件作品最值得記錄的，是它如何把公共空間的政治轉成可以用身體感受的東西。",
      "公共空間從來不是中立的。它是各種規則、權力與利益層層疊上去的結果，只是這些層次平時藏得很好，好到我們以為街道、廣場、庭院本來就「自然」是那個樣子。圍欄、警示燈、開放時間、門禁，都是這套隱形治理的一部分。我們每天穿過它，卻很少停下來想，是誰決定了這條路只能這樣走。",
      "《自由的界線》做的事，是把這套隱形治理推到台前，逼觀眾用身體去碰它。",
      "當你在那座迷宮裡替自己推開一道圍欄，你就在一瞬間扮演了那個平時隱形的決策者。你劃出了一條界線。你也立刻嘗到劃界的代價，因為對面的人正被你擋住。在街頭，劃界的是市政府、是工程單位、是某個你看不見的權力。在內庭裡，劃界的是你，是每一個普通的觀眾。作品把治理的權力下放到每一具身體上，再讓這些身體在同一個空間裡彼此碰撞、協商、妥協。",
      "這是一種很安靜的政治教育。它沒有口號，沒有控訴。它只是讓你在找出口的過程裡，無可迴避地意識到，你的自由是有邊界的，而那道邊界往往就是另一個人。人的自由是有限的，這份有限源自生命本身的有限，也源自人的行動彼此交纏、相互牽動的處境。對自由的渴望，常常要等到我們親身撞上具體的束縛，才會真正被喚醒。先經歷了限制，人才會明確地想要跨越它。那座內庭，就是一個讓人撞上限制的地方。",
      "五、從歐洲的開放，到重新升起的圍籬",
      "這件作品的時間點，讓「界線」這個主題有了更尖銳的政治回聲。",
      "歐洲共同體成立以來，國與國之間的邊界逐漸模糊，公約國的公民得以自由移動。那是一整個世代習以為常的自由，跨過一條線，從一個國家走進另一個國家，幾乎不需要停下腳步。我用可以推開的圍欄演練這份自由的時候，腦中想的就是這個歐洲。",
      "然而就在作品展出後不久，2016 年，難民議題浮上檯面，被拆掉的邊界管制又一一重新升起。那些一度模糊的線，重新變得清晰、堅硬。我作品裡那些可以移動的圍欄，在現實世界裡有了不肯移動的版本。於是這件作品問出一個它在 2015 年還只是隱約感覺到、卻很快就被現實證實的問題。在自身利益的權衡之下，保護自我，是否始終是人們的第一順位。當外面的世界開始重新築牆，內庭裡那場關於讓路與阻擋的小小演練，就不再只是哲學遊戲。它預演了一整個歐洲接下來要面對的難題，自由的開放與邊界的回返，從來都是同一枚硬幣的兩面。一座城市願意在藍夜裡敞開自己，和一個大陸開始重新封閉自己，這兩件事發生在同一段時間，本身就是一種沉重的對照。",
      "六、把一件作品放進廣場，需要動用整座城市",
      "報導到這裡，得轉一個角度，去看那些觀眾在午夜的內庭裡看不見的東西。一件公共藝術作品要能站在城市的廣場上，背後是一整套制度、預算與協調的機器在運轉。這也是城市研究真正關心的層面，一座城市究竟如何生產一場臨時的公共藝術事件。",
      "藍夜的民眾藝術獎（Blaue Nacht Publikumspreis）是一場公開徵件的競圖案，每年大約在十月到十二月之間舉行。一百六十到一百八十件提案投進來，評審團從中選出十二件，作為當年公共空間的藝術展示。設置的地點由市政府每年挑選，不一定固定，可能是市政廳、圖書館、停車場、城堡內部、博物館，也可能由藝術家自己尋找與發掘提案。",
      "被選上的十二件作品，每件能拿到三千歐元的補助。這筆錢同時也是天花板，連同書面報告書在內，整件作品的總預算不能超過三千歐元。**三千歐元的上限，本身就是一個值得玩味的城市治理設計。**它逼著每一位藝術家在極有限的資源裡，去回應一個公共尺度的命題。我那座由一百五十座圍欄構成的迷宮，之所以選擇現成的工程物件，這個預算結構也是原因之一。城市用一個樸素的數字，篩選出懂得借力、懂得就地取材的作品。",
      "制度的另一面是支援。市政府內部有一個專門的辦公室負責這個項目，計劃領導（Projektleitung）是 Christel Passmann 女士。",
      "得獎的藝術家拿到的，不只是資金。政府會幫忙尋找技術資源的團隊作為協助。以我的情況，光是材料廠商的洽談、場地的施工，到與公部門之間的協調，都有專屬的協案專員從旁幫忙。一件作品要在權力的庭院裡落地，需要的不只是創意，還需要一整條看不見的行政與技術的鏈條。",
      "最後是時間。前面提過藍夜精密的時間刻度，這個刻度在布展階段最為嚴酷。整個布展時間，大致只有星期五到星期六晚上七點以前。除非基地條件特殊、可以封閉施工，否則一切都得配合每個公共空間平時的開放時間。你不能因為要裝一件作品，就把一座還在對外開放的市政廳關起來。城市的日常秩序，永遠優先於藝術的臨時介入。一百五十座圍欄、三百盞燈，要在這樣一個被切得很碎的窗口裡，全部到位、調試完成。這件談論限制的作品，從生產的第一刻起，就被城市真實的限制牢牢框住。這一段，是我想特別留給其他創作者的紀錄。我們太容易只談作品的概念，卻很少誠實地寫下，把一個概念放進公共空間，要動用多少不屬於藝術本身的力量。",
      "七、民眾票選的迴圈",
      "藍夜的夜晚，最後會把判斷權交給人群。",
      "當晚的活動，由參觀的民眾在這十二件藝術作品中，選出自己最喜歡的一件。最高票的作品，由紐倫堡電力公司（N-Ergie）提供五千歐元的獎金。十幾萬人走過這座城市的各個空間，用自己的腳與自己的票，決定哪一件作品最打動他們。",
      "那一年，《自由的界線》拿到了這個民眾藝術獎。",
      "在十二件競逐的作品裡，這件由一百五十座圍欄與三百盞警示燈構成的裝置，以百分之十七的得票勝出。這件作品來自一位當時正在紐倫堡求學的台灣藝術家。N-Ergie 在 2015 年五月把這座五千歐元的獎頒給了《自由的界線》。",
      "這個結果本身，藏著一個漂亮的迴圈。一件談論市民如何在公共空間裡彼此協商的作品，最後由市民用最民主的方式，投票把它選了出來。觀眾在內庭裡親身演練了讓路與阻擋，走出來之後，又用選票替這場演練做了集體的回應。作品的主題與作品的命運，在這裡接成了一個圓。公共藝術最理想的狀態，就是讓公眾不只是觀看者，而是作品意義的共同完成者。那一夜的票數，是十三萬五千人替「自由的界線」這個命題，留下的一份集體簽名。",
      "八、界線之內的自由",
      "收掉圍欄之後，舊市政廳的內庭恢復成它平時的樣子。那座迷宮只存在了一個晚上，從七點到凌晨一點，短得幾乎像沒發生過。",
      "可是它留下了一個我至今仍在思考的提醒。我們習慣把自由想成沒有邊界的狀態，想成可以無限往前。那一夜的內庭給出的答案剛好相反。自由是在界線之內才成立的東西。沒有那些圍欄，就沒有需要協商的通道，也就沒有讓路這個動作裡的溫度。界線不是自由的反面，界線是自由得以被經驗的條件。",
      "對一座城市來說，這個道理同樣成立。紐倫堡藍夜之所以動人，是因為它在一整年嚴密的秩序之上，挪出一個夜晚的例外。例外的珍貴，正來自平日的規範。一座城市願意在一個晚上，把封鎖的工具交還給市民，讓他們親手去推、去挪、去面對彼此，這份信任，比任何關於自由的口號都更接近自由本身。",
      "我用城市的圍欄，蓋了一座城市的作品，再由城市的市民，把它選了出來。從頭到尾，這件作品都在城市的界線之內生成、展示、完成。它談的是界線，它也活在界線裡。對我而言，這正是公共藝術最誠實的位置，站在權力與市民之間，站在限制與自由之間，用一件可以移動的圍欄，讓所有走過的人，重新感覺到那條平時看不見的線。"
    ],

      "「自由」放在這個脈絡裡，就不只是一個漂亮的哲學詞。它是在問，當一座城市願意暫時放鬆它對空間的控制，市民會怎麼使用這份多出來的自由。他們會更體貼，還是更各自為政。藍夜把這個問題丟給整座城市，而我想用一件作品，把這個問題濃縮進一個庭院。",
      "三、一件用秩序的工具寫成的作品",
      "我選的材料，是工程圍欄與警示燈。",
      "這個選擇是整件作品的核心。工程圍欄（Absperrschranke）是城市裡最沉默、也最常見的東西。它出現在施工現場、出現在改道的路口、出現在所有「這裡暫時不能走」的地方。它的功能就是劃界，告訴你的身體可以到哪裡為止。警示燈也是同一套語言，橘紅色的閃光意味著注意、繞道、止步。這些物件平時隱形，因為我們太習慣服從它們。",
      "把這套劃界的工具從街頭搬進舊市政廳的內庭，事情就翻轉了。",
      "第一層翻轉，是場所。舊市政廳是市政權力的所在地，是這座城市制定規則、執行秩序的象徵中心。我在權力的庭院裡，用權力自己的封鎖工具，蓋了一座讓人迷路的迷宮。控制的符號被搬到控制的源頭，彼此對照。",
      "第二層翻轉，是功能。在街頭，圍欄是固定的，它替你決定路線，你只能服從。在我的作品裡，圍欄是可以移動的。決定權被交還給觀眾，每個人都能替自己開路。可是這份被交還的自由立刻撞上一個現實，你的每一次移動都在改寫別人的處境。自由一旦變得可以移動，責任就跟著浮現。",
      "這就是這件作品想說的話。它讓觀眾親身演練一個古老的命題，自由要領受某些限制，才能真正換得。我的自由，也許並不等於你的自由。自由屬於個人，卻不以自我為中心，它同時牽涉到對他者的衡量。這些句子寫在牆上是抽象的，走進那座圍欄的迷宮，它們就變成你腳下每一步要面對的選擇。衝突，或者禮讓（Konflikt oder Höflichkeit），這兩個德文字是我給作品下的註腳，也是觀眾在內庭裡真正要做的決定。",
      "四、身體成為媒介：一場公共空間的協商",
      "從城市研究（Stadtforschung）的角度看，這件作品最值得記錄的，是它如何把公共空間的政治轉成可以用身體感受的東西。",
      "公共空間從來不是中立的。它是各種規則、權力與利益層層疊上去的結果，只是這些層次平時藏得很好，好到我們以為街道、廣場、庭院本來就「自然」是那個樣子。圍欄、警示燈、開放時間、門禁，都是這套隱形治理的一部分。我們每天穿過它，卻很少停下來想，是誰決定了這條路只能這樣走。",
      "《自由的界線》做的事，是把這套隱形治理推到台前，逼觀眾用身體去碰它。",
      "當你在那座迷宮裡替自己推開一道圍欄，你就在一瞬間扮演了那個平時隱形的決策者。你劃出了一條界線。你也立刻嘗到劃界的代價，因為對面的人正被你擋住。在街頭，劃界的是市政府、是工程單位、是某個你看不見的權力。在內庭裡，劃界的是你，是每一個普通的觀眾。作品把治理的權力下放到每一具身體上，再讓這些身體在同一個空間裡彼此碰撞、協商、妥協。",
      "這是一種很安靜的政治教育。它沒有口號，沒有控訴。它只是讓你在找出口的過程裡，無可迴避地意識到，你的自由是有邊界的，而那道邊界往往就是另一個人。人的自由是有限的，這份有限源自生命本身的有限，也源自人的行動彼此交纏、相互牽動的處境。對自由的渴望，常常要等到我們親身撞上具體的束縛，才會真正被喚醒。先經歷了限制，人才會明確地想要跨越它。那座內庭，就是一個讓人撞上限制的地方。",
      "五、從歐洲的開放，到重新升起的圍籬",
      "這件作品的時間點，讓「界線」這個主題有了更尖銳的政治回聲。",
      "歐洲共同體成立以來，國與國之間的邊界逐漸模糊，公約國的公民得以自由移動。那是一整個世代習以為常的自由，跨過一條線，從一個國家走進另一個國家，幾乎不需要停下腳步。我用可以推開的圍欄演練這份自由的時候，腦中想的就是這個歐洲。",
      "然而就在作品展出後不久，2016 年，難民議題浮上檯面，被拆掉的邊界管制又一一重新升起。那些一度模糊的線，重新變得清晰、堅硬。我作品裡那些可以移動的圍欄，在現實世界裡有了不肯移動的版本。於是這件作品問出一個它在 2015 年還只是隱約感覺到、卻很快就被現實證實的問題。在自身利益的權衡之下，保護自我，是否始終是人們的第一順位。當外面的世界開始重新築牆，內庭裡那場關於讓路與阻擋的小小演練，就不再只是哲學遊戲。它預演了一整個歐洲接下來要面對的難題，自由的開放與邊界的回返，從來都是同一枚硬幣的兩面。一座城市願意在藍夜裡敞開自己，和一個大陸開始重新封閉自己，這兩件事發生在同一段時間，本身就是一種沉重的對照。",
      "六、把一件作品放進廣場，需要動用整座城市",
      "報導到這裡，得轉一個角度，去看那些觀眾在午夜的內庭裡看不見的東西。一件公共藝術作品要能站在城市的廣場上，背後是一整套制度、預算與協調的機器在運轉。這也是城市研究真正關心的層面，一座城市究竟如何生產一場臨時的公共藝術事件。",
      "藍夜的民眾藝術獎（Blaue Nacht Publikumspreis）是一場公開徵件的競圖案，每年大約在十月到十二月之間舉行。一百六十到一百八十件提案投進來，評審團從中選出十二件，作為當年公共空間的藝術展示。設置的地點由市政府每年挑選，不一定固定，可能是市政廳、圖書館、停車場、城堡內部、博物館，也可能由藝術家自己尋找與發掘提案。",
      "被選上的十二件作品，每件能拿到三千歐元的補助。這筆錢同時也是天花板，連同書面報告書在內，整件作品的總預算不能超過三千歐元。**三千歐元的上限，本身就是一個值得玩味的城市治理設計。**它逼著每一位藝術家在極有限的資源裡，去回應一個公共尺度的命題。我那座由一百五十座圍欄構成的迷宮，之所以選擇現成的工程物件，這個預算結構也是原因之一。城市用一個樸素的數字，篩選出懂得借力、懂得就地取材的作品。",
      "制度的另一面是支援。市政府內部有一個專門的辦公室負責這個項目，計劃領導（Projektleitung）是 Christel Passmann 女士。",
      "得獎的藝術家拿到的，不只是資金。政府會幫忙尋找技術資源的團隊作為協助。以我的情況，光是材料廠商的洽談、場地的施工，到與公部門之間的協調，都有專屬的協案專員從旁幫忙。一件作品要在權力的庭院裡落地，需要的不只是創意，還需要一整條看不見的行政與技術的鏈條。",
      "最後是時間。前面提過藍夜精密的時間刻度，這個刻度在布展階段最為嚴酷。整個布展時間，大致只有星期五到星期六晚上七點以前。除非基地條件特殊、可以封閉施工，否則一切都得配合每個公共空間平時的開放時間。你不能因為要裝一件作品，就把一座還在對外開放的市政廳關起來。城市的日常秩序，永遠優先於藝術的臨時介入。一百五十座圍欄、三百盞燈，要在這樣一個被切得很碎的窗口裡，全部到位、調試完成。這件談論限制的作品，從生產的第一刻起，就被城市真實的限制牢牢框住。這一段，是我想特別留給其他創作者的紀錄。我們太容易只談作品的概念，卻很少誠實地寫下，把一個概念放進公共空間，要動用多少不屬於藝術本身的力量。",
      "七、民眾票選的迴圈",
      "藍夜的夜晚，最後會把判斷權交給人群。",
      "當晚的活動，由參觀的民眾在這十二件藝術作品中，選出自己最喜歡的一件。最高票的作品，由紐倫堡電力公司（N-Ergie）提供五千歐元的獎金。十幾萬人走過這座城市的各個空間，用自己的腳與自己的票，決定哪一件作品最打動他們。",
      "那一年，《自由的界線》拿到了這個民眾藝術獎。",
      "在十二件競逐的作品裡，這件由一百五十座圍欄與三百盞警示燈構成的裝置，以百分之十七的得票勝出。這件作品來自一位當時正在紐倫堡求學的台灣藝術家。N-Ergie 在 2015 年五月把這座五千歐元的獎頒給了《自由的界線》。",
      "這個結果本身，藏著一個漂亮的迴圈。一件談論市民如何在公共空間裡彼此協商的作品，最後由市民用最民主的方式，投票把它選了出來。觀眾在內庭裡親身演練了讓路與阻擋，走出來之後，又用選票替這場演練做了集體的回應。作品的主題與作品的命運，在這裡接成了一個圓。公共藝術最理想的狀態，就是讓公眾不只是觀看者，而是作品意義的共同完成者。那一夜的票數，是十三萬五千人替「自由的界線」這個命題，留下的一份集體簽名。",
      "八、界線之內的自由",
      "收掉圍欄之後，舊市政廳的內庭恢復成它平時的樣子。那座迷宮只存在了一個晚上，從七點到凌晨一點，短得幾乎像沒發生過。",
      "可是它留下了一個我至今仍在思考的提醒。我們習慣把自由想成沒有邊界的狀態，想成可以無限往前。那一夜的內庭給出的答案剛好相反。自由是在界線之內才成立的東西。沒有那些圍欄，就沒有需要協商的通道，也就沒有讓路這個動作裡的溫度。界線不是自由的反面，界線是自由得以被經驗的條件。",
      "對一座城市來說，這個道理同樣成立。紐倫堡藍夜之所以動人，是因為它在一整年嚴密的秩序之上，挪出一個夜晚的例外。例外的珍貴，正來自平日的規範。一座城市願意在一個晚上，把封鎖的工具交還給市民，讓他們親手去推、去挪、去面對彼此，這份信任，比任何關於自由的口號都更接近自由本身。",
      "我用城市的圍欄，蓋了一座城市的作品，再由城市的市民，把它選了出來。從頭到尾，這件作品都在城市的界線之內生成、展示、完成。它談的是界線，它也活在界線裡。對我而言，這正是公共藝術最誠實的位置，站在權力與市民之間，站在限制與自由之間，用一件可以移動的圍欄，讓所有走過的人，重新感覺到那條平時看不見的線。"
    ],

      "開始決定空間書寫時心裡並沒有太清晰的輪廓去描述關切於哪些空間議題，或是對於這些議題並沒有太強烈感受或是提出一個清晰觀點。2014年是一個書寫計畫起點，我想在過去紊亂的思緒裡找到線索。回台灣後陸續整理這些時日的經歷驗證，重新回望這塊土地發生的一切故事。",

      "Hallo! Servus!",
      "以物易物．街道的人情與城市秩序",
      "1. 計畫以一聲問候，開啟城市觀察",
      "從一句問候「Hallo! Servus!」開始。一句最日常的招呼，就能發動一場觀察：城市如何被看見、被觸碰、被理解。旅人最先記住的，往往是街頭攤販。一段短暫的對話，就能交換大量在地資訊。由街販、行人、空間構成的微小場景，是切入都市活力最好的一刀。",
      "命題：在不同的制度與文化裡，街頭買賣如何形塑都市的節奏與社會關係？以物易物，能否重置我們對價值與信任的想像？",

      "約翰尼斯堡的街販多是來自其他非洲國家的移工，長時間守在人行道與廣場上謀生。他們以勞動換取最基本的生計，展現了都市邊緣群體的經濟韌性。",
      "德國的街販受營業時間與空間管理規範約束，多半固定、合規，機動性低，秩序分明。週末店鋪打烊，反而為街販留出了服務的縫隙。",
      "三地構成一道光譜：從台灣的高機動、弱合法性，到德國的高秩序、低機動；約翰尼斯堡站在光譜之外，標示出移動群體的生存策略。這些差異映照的，是制度、經濟與公共空間文化交疊出的層理。",

      "策展立場：流動攤販從來不是單一的問題。它是城市治理、稅制公平、公共衛生、交通安全與生存權之間的一場多方拉扯。它的存在，是都市真實需求的回音。",

      "數位延伸。 網路上出現各種交換平台，說明非貨幣價值正在新的社會基礎設施裡被重新召喚。",
      "策展詮釋：我們不美化以物易物，也不否定貨幣。我們做的，是把「交換」還原成社會關係的生成與談判。在這裡，價值可以被說出來、被分享，也被共同定義。",

      "卡爾維諾提醒我們，攤上的物件常常為了別的東西而發光：優雅、權力、博學、奢侈。它的價值不在自身，而在它所象徵的一切。這正是本計畫想讓觀眾親身體會的價值轉譯。",
      "9. 展覽呈現與檔案建置",

      "檔案：互動筆記，包含交換清單、故事片段與觀眾語錄；影像紀錄，涵蓋行動路徑、停留點與對話片段；制度對照，整理台灣、約翰尼斯堡與德國的街販規則摘要。",

      "信任為底。 貨幣是高效率的交易工具，卻不是唯一選項。當金融信任動搖，例如金融危機時，以物易物就成為一種可以被重新思考的生活方式。",
      "數位延伸。 網路上出現各種交換平台，說明非貨幣價值正在新的社會基礎設施裡被重新召喚。",
      "策展詮釋：我們不美化以物易物，也不否定貨幣。我們做的，是把「交換」還原成社會關係的生成與談判。在這裡，價值可以被說出來、被分享，也被共同定義。",
      "5. 行動方法論｜公共空間裡的接觸、對話、交換、回饋",
      "我用一個可移動的攤位作為行動載具，走進街道與人流，依序完成五個動作。",
      "接觸。 用一句日常問候開場，放低對話的門檻。",
      "對話。 攤上擺著來自台灣的日用品、食品、書籍與文化小物，讓每一件東西都開口說話。",
      "交換。 以物易物，不標價，邀請對方拿出願意交換的物件，或一個承諾。",
      "待客。 以台灣的「奉茶」作為待客之道，化開陌生。",
      "回饋。 收集回答與觀察筆記，核心的提問是：「你知道台灣在哪裡嗎？」「你怎麼看待交換經濟？」",
      "觀眾的身分隨之翻轉：從被觀看的人，變成參與者、共同作者，以及價值共同體的一員。",
      "6. 載具與視覺語言｜改造嬰兒車、步行節奏與客家花布",
      "為何是嬰兒車？ 在歐洲城市，推著嬰兒車散步是再尋常不過的畫面。它形象親和、步調緩慢、容易停下來，讓行動者在主動與被動之間取得一層自然的掩護，也製造出可以駐足的時刻。它的視覺辨識度很高。",
      "為何不是腳踏車？ 自行車正好相反。它代表更快的穿越、更強的目的性，不利於對話發生，也留不住人。",
      "材質與文化。 車身覆上客家花布，讓傳統圖騰包裹一件西方的工業製品。東方意象與西方日常器物並置，當下就形成跨文化的視覺衝突，也成為吸引人靠近的點。它同時兼顧機動與運輸，呼應流動攤販的本質。",
      "7. 為何在德國進行？｜秩序中的縫隙，慢行中的相遇",
      "德國城市有完整的公共空間系統，以及以步行為主的節奏，提供了慢速交流的現場條件。週末店鋪休息的制度，又留出了服務的空缺。臨時街售在這裡屬於法律灰區，因此本計畫把自己定位為一場行動測試。它不為營利，只為了藝術性地試探制度、日常與人情三者之間的關係。",
      "8. 城市與公共空間的再閱讀｜從攤販看見制度與歸屬",
      "攤販是我們認識一座城市的第一印象來源。它讓開放空間不再抽象，變成居民可以自由活動、停留與交流的地方。",
      "固定攤販靠時間與地點建立認同；移動攤販在法律與空間的縫隙中求生，收入更不穩定。",
      "無論在發展中或已開發國家，公共空間都是社會過程的產物。規範、階級與文化想像，全都透過「能不能擺攤」「可以停在哪裡」這些細節，被具體地定了下來。",
      "卡爾維諾提醒我們，攤上的物件常常為了別的東西而發光：優雅、權力、博學、奢侈。它的價值不在自身，而在它所象徵的一切。這正是本計畫想讓觀眾親身體會的價值轉譯。",
      "9. 展覽呈現與檔案建置",
      "現場：改造後的嬰兒車裝置、待客的茶水、可供交換的台灣物件，以及一面交易與對話的記錄牆。",
      "檔案：互動筆記，包含交換清單、故事片段與觀眾語錄；影像紀錄，涵蓋行動路徑、停留點與對話片段；制度對照，整理台灣、約翰尼斯堡與德國的街販規則摘要。",
      "10. 預期影響與評估指標",
      "文化理解：觀眾對台灣文化的辨識度與興趣是否提升，以問卷與回饋卡量化。",
      "信任實驗：不標價的交換成功率、談判時長、重複互動的比例。",
      "公共性討論：觀眾對街販與公共空間管理的看法是否改變，是否提出針對地方制度的建設性意見。",
      "美學收穫：用嬰兒車、花布與街道的設計語言，喚起人們對「秩序之中的人情」的感知。",
      "11. 結論｜把價格關掉，讓關係發聲",
      "以物易物不是要回到過去。它把價值的錨，從價格移向關係。在問候、遞茶與交換的慢速時刻裡，城市露出了它的心跳。它不只有規則，還有人情；不只有效率，還有等待。這就是我們想和觀眾一起經歷的事：在秩序之中，重新發明信任。"

    "essay_zh": [
      "巴士做為藝術媒介",
      "SUBBUS 歐洲行動策展計畫藝術需要什麼規則。不需要。我們能打破它嗎。能。最初我構思一輛充滿可能性的巴士。飲食與衝突，潔淨與混亂。一種新的生活方式在巴士裡誕生。為了這次行動，我邀請朋友到巴士裡辦一場早餐派對。",
      "展覽時間:2014–2015 計畫地點:德國及歐洲多座城市巡迴行動 類型:　行為藝術、空間轉譯、跨文化策展實踐一、策展起點：重新定義公車的文化空間2014年的德國策展課程裡，SUBBUS 計畫從身體經驗展開。每位參與者提出自己對公車的詮釋與可能性。我從台灣擁擠公車的生活記憶切入，對照德國公共運輸嚴禁飲食的文化規訓，把公車視為一個移動中的文化交叉點。年展期間我策劃了一件行為藝術，《公車三明治計畫》。靈感來自我們這個中間世代。我們像三明治的夾層，承受上層傳統與下層變革的雙重擠壓，在縫隙裡尋找新的語彙與身體策略。",
      "二、展覽媒介：一輛行動巴士SUBBUS 是一個可被多重轉譯的策展平台。這台巴士承載人與物，也承載行動的知識、辯論的空間與策展實驗。在沒有明確共識的前提下，我們用集體創作完成購車、改裝、命題到公共參與的每個階段。空間在過程中持續生成，也在各地與觀眾、城市、市民展開對話。",
      "三、空間再定義：公共與私密的轉換經過討論與實作，這輛巴士成為可彈性轉換的空間。白天它是研究室、會議室或藝術講座場域，夜晚成為露營空間、行動展間，甚至一座臨時的城市俱樂部。我們追問空間如何開放，公共性又在什麼條件下產生，並在各地駐點與市民建立直接對話。",
      "四、藝術行動的目標：建立交流平台計畫期間，我們巡迴歐洲多座城市，與在地博物館、藝術協會合作，也進入社群空間與社會邊緣區域。SUBBUS 成為藝術與公共空間對話的平台，用跨文化視角重新檢視移動性、身體性與空間之間的交涉。",
      "五、設計挑戰與實踐思維改裝計畫受到經費與時間的雙重限制。我們必須在完全清空空間與導入專業設計之間取得平衡。這是一場價值與功能的協商，也是一道技術難題。最終我們找到一個兼具機能與精神的方案，讓這座移動的展場真正回應群體使用的多樣與藝術行動的彈性。",
      "六、沒有標準答案的旅程SUBBUS 是一段未完的實驗，一場無法預設的策展旅程。它證明藝術能存在於沒有白牆的空間，策展能發生在移動的對話與辯證裡。這台巴士是一個不斷生成的空間敘事體。",
      "SUBBUS｜Kuratorisches Projekt, Europäische Aktion Welche Regeln braucht die Kunst? Keine. Können wir sie auch brechen? Ja. Am Anfang überlege ich mir den Bus der Möglichkeiten. Essen und Konflikt, Sauberkeit und Verwirrung. Im Bus entsteht ein neuer Lebensstil. Für die Aktion lade ich Freunde zu einer Frühstücksparty in den Bus ein.Ausstellungszeit　2014–2015 Künstler　Ying Cheng Huang Ort　Wanderaktion durch mehrere Städte in Deutschland und Europa Form　Performancekunst, Raumübersetzung, transkulturelle kuratorische Praxis1. Ausgangspunkt: Den Bus als kulturellen Raum neu denkenIm Rahmen eines kuratorischen Seminars in Deutschland entwickelte sich 2014 das Projekt SUBBUS aus körperlicher Erfahrung. Jede teilnehmende Person stellte ihre eigene Deutung des Busses und dessen Möglichkeiten vor. Ich ging von der Erinnerung an überfüllte Busse in Taiwan aus und stellte sie dem Verbot von Essen und Trinken im deutschen Nahverkehr gegenüber. So verstand ich den Bus als einen kulturellen Kreuzungspunkt in Bewegung.Während der Jahresausstellung kuratierte ich eine Performance, das Bus-Sandwich-Projekt. Die Idee entstammt unserer mittleren Generation. Wir gleichen der Mittelschicht eines Sandwichs, eingeklemmt zwischen der Tradition von oben und dem Wandel von unten, auf der Suche nach einer neuen Sprache und einer körperlichen Strategie in den Zwischenräumen.2. Medium der Ausstellung: ein fahrender BusSUBBUS ist eine kuratorische Plattform, die sich vielfach übersetzen lässt. Dieser Bus trägt Menschen und Dinge, ebenso das Wissen der Aktion, den Raum der Debatte und das kuratorische Experiment.Ohne klaren Konsens vollzogen wir in kollektiver Arbeit jeden Schritt, vom Kauf des Busses über den Umbau und die Themenstellung bis zur öffentlichen Teilhabe. Der Raum entstand fortlaufend im Prozess und trat an verschiedenen Orten in Dialog mit Publikum, Stadt und Bürgern.3. Neudefinition des Raums: Wechsel zwischen öffentlich und privatNach Diskussion und praktischer Arbeit wurde der Bus zu einem flexibel wandelbaren Raum. Tagsüber Forschungsraum, Besprechungsraum oder Ort für Kunstvorträge, nachts Campingraum, fahrender Ausstellungsraum oder ein temporärer Stadtclub.Wir fragten, wie ein Raum sich öffnet und unter welchen Bedingungen Öffentlichkeit entsteht, und bauten an jedem Standort einen direkten Dialog mit den Bürgern auf.4. Ziel der künstlerischen Aktion: eine Plattform des AustauschsWährend des Projekts bereisten wir mehrere europäische Städte, arbeiteten mit lokalen Museen und Kunstvereinen zusammen und gingen ebenso in soziale Räume und gesellschaftliche Randzonen. SUBBUS wurde zu einer Plattform für den Dialog zwischen Kunst und öffentlichem Raum und befragte aus transkultureller Sicht das Verhältnis von Mobilität, Körperlichkeit und Raum neu.5. Gestalterische Herausforderung und praktisches DenkenDer Umbau stand unter der doppelten Begrenzung von Budget und Zeit. Wir mussten ein Gleichgewicht finden zwischen der völligen Leerung des Raums und dem Einsatz professioneller Gestaltung. Das war eine Verhandlung von Wert und Funktion und zugleich eine technische Aufgabe.Am Ende fanden wir eine Lösung, die Funktion und Geist verbindet und diesen fahrenden Ausstellungsort der Vielfalt kollektiver Nutzung und der Beweglichkeit künstlerischer Aktion gerecht werden lässt.6. Eine Reise ohne festgelegte AntwortSUBBUS ist ein unvollendetes Experiment, eine kuratorische Reise ohne Vorgabe. Es zeigt, dass Kunst in einem Raum ohne weiße Wände bestehen kann und dass Kuratieren im fahrenden Dialog und in der Dialektik geschehen kann. Dieser Bus ist ein sich fortwährend bildender Erzählraum."

      "SUBBUS｜Kuratorisches Projekt, Europäische Aktion Welche Regeln braucht die Kunst? Keine. Können wir sie auch brechen? Ja. Am Anfang überlege ich mir den Bus der Möglichkeiten. Essen und Konflikt, Sauberkeit und Verwirrung. Im Bus entsteht ein neuer Lebensstil. Für die Aktion lade ich Freunde zu einer Frühstücksparty in den Bus ein.Ausstellungszeit　2014–2015 Künstler　Ying Cheng Huang Ort　Wanderaktion durch mehrere Städte in Deutschland und Europa Form　Performancekunst, Raumübersetzung, transkulturelle kuratorische Praxis1. Ausgangspunkt: Den Bus als kulturellen Raum neu denkenIm Rahmen eines kuratorischen Seminars in Deutschland entwickelte sich 2014 das Projekt SUBBUS aus körperlicher Erfahrung. Jede teilnehmende Person stellte ihre eigene Deutung des Busses und dessen Möglichkeiten vor. Ich ging von der Erinnerung an überfüllte Busse in Taiwan aus und stellte sie dem Verbot von Essen und Trinken im deutschen Nahverkehr gegenüber. So verstand ich den Bus als einen kulturellen Kreuzungspunkt in Bewegung.Während der Jahresausstellung kuratierte ich eine Performance, das Bus-Sandwich-Projekt. Die Idee entstammt unserer mittleren Generation. Wir gleichen der Mittelschicht eines Sandwichs, eingeklemmt zwischen der Tradition von oben und dem Wandel von unten, auf der Suche nach einer neuen Sprache und einer körperlichen Strategie in den Zwischenräumen.2. Medium der Ausstellung: ein fahrender BusSUBBUS ist eine kuratorische Plattform, die sich vielfach übersetzen lässt. Dieser Bus trägt Menschen und Dinge, ebenso das Wissen der Aktion, den Raum der Debatte und das kuratorische Experiment.Ohne klaren Konsens vollzogen wir in kollektiver Arbeit jeden Schritt, vom Kauf des Busses über den Umbau und die Themenstellung bis zur öffentlichen Teilhabe. Der Raum entstand fortlaufend im Prozess und trat an verschiedenen Orten in Dialog mit Publikum, Stadt und Bürgern.3. Neudefinition des Raums: Wechsel zwischen öffentlich und privatNach Diskussion und praktischer Arbeit wurde der Bus zu einem flexibel wandelbaren Raum. Tagsüber Forschungsraum, Besprechungsraum oder Ort für Kunstvorträge, nachts Campingraum, fahrender Ausstellungsraum oder ein temporärer Stadtclub.Wir fragten, wie ein Raum sich öffnet und unter welchen Bedingungen Öffentlichkeit entsteht, und bauten an jedem Standort einen direkten Dialog mit den Bürgern auf.4. Ziel der künstlerischen Aktion: eine Plattform des AustauschsWährend des Projekts bereisten wir mehrere europäische Städte, arbeiteten mit lokalen Museen und Kunstvereinen zusammen und gingen ebenso in soziale Räume und gesellschaftliche Randzonen. SUBBUS wurde zu einer Plattform für den Dialog zwischen Kunst und öffentlichem Raum und befragte aus transkultureller Sicht das Verhältnis von Mobilität, Körperlichkeit und Raum neu.5. Gestalterische Herausforderung und praktisches DenkenDer Umbau stand unter der doppelten Begrenzung von Budget und Zeit. Wir mussten ein Gleichgewicht finden zwischen der völligen Leerung des Raums und dem Einsatz professioneller Gestaltung. Das war eine Verhandlung von Wert und Funktion und zugleich eine technische Aufgabe.Am Ende fanden wir eine Lösung, die Funktion und Geist verbindet und diesen fahrenden Ausstellungsort der Vielfalt kollektiver Nutzung und der Beweglichkeit künstlerischer Aktion gerecht werden lässt.6. Eine Reise ohne festgelegte AntwortSUBBUS ist ein unvollendetes Experiment, eine kuratorische Reise ohne Vorgabe. Es zeigt, dass Kunst in einem Raum ohne weiße Wände bestehen kann und dass Kuratieren im fahrenden Dialog und in der Dialektik geschehen kann. Dieser Bus ist ein sich fortwährend bildender Erzählraum."
    ],

  symphony: {

    essay_zh: [

    essay_en: [
      'Each child is a graceful note, dancing through this symphony of life and weaving together a richly coloured orchestral scroll. Like a bluebird soaring on open wings in search of the light that brings happiness to the heart, the work leads students on a wondrous artistic journey to bravely explore knowledge.',

    essay_zh: [

  palette477: {
    headline_zh: '從「我」到「我們」，477 種故鄉的色調',
    headline_en: 'From “I” to “We” — 477 tones of home',
    essay_zh: [
      '每一位關心、生長在滋養自己土地上的人，都有一套哲理；不變的是，人們彼此都懷著共同的信念。生活的土地所傳達的訊息，成為我所追求的信仰。從地景的細微觀察、人文的探訪記錄出發，人們連結土地上生活的共同記憶 —— 即便在無數次的遷徙中，物換星移，能帶走的仍是對這片土地的情感寄託。',
      '「477」來自一個數字：教育部統計，外埔國中 109 學年學生男生 221 人、女生 195 人、教職員 61 人，合計 477 人。每一個人都代表生長土地上的一種色調，也是開啟未來的一把鑰匙。鄉村的孩子生長在陽光、青草與開闊的藍天下，雙腳更有機會踏觸土地的溫潤。',
      '創作以田野調查反饋主題。以外埔國中旁的土地公廟（學德宮）為中心，向全區發散，於各土地公廟周邊的莊稼田採集土壤；經清洗、研磨後取得色樣，標示時間與座標，從台地紅土到河谷砂土，建立色票作為創作的基礎色系 —— 讓地理與科學成為一處藝術展示現場。',
      '聚散雖有時，每一個人都是獨立的個體，如同大地星塵，生活在同一片天空下。裝置上的每一個物件代表一位學子，土壤色粉取自外埔的農田，作為每年入學與畢業典禮的禮物。每一個學子如同幼苗，每日行經的路徑上看著故鄉的土壤，也問自己 —— 長大後想成為怎樣的人。',
    ],
    essay_en: [
      'Everyone who cares for the land that nourishes them holds a philosophy of their own; what stays constant is a shared belief among people. The messages this living land conveys have become the faith I pursue. Beginning from close observation of landscape and humanistic fieldwork, people are bound by a common memory of life upon the soil — and across countless migrations, though things change and stars shift, what we carry away is still our affection entrusted to this land.',
      '“477” comes from a number: by the Ministry of Education’s count, in the 109th school year Waipu Junior High had 221 boys, 195 girls and 61 staff — 477 people in all. Each person stands for one tone of the land they grew from, and each is a key that opens the future. Children of the countryside grow under sunlight, green grass and open sky, their feet more likely to touch the warmth of the earth.',
      'The work feeds on field research. Taking the earth-god shrine beside the school (Xuede Temple) as a centre, it radiates across the district, gathering soil from the farmland around each shrine; washed and ground into colour samples, marked with time and coordinates — from the red soil of the terrace to the sandy soil of the valley — a colour archive is built as the work’s base palette, making geography and science into a site of art.',
      'Gathering and parting have their seasons; each person is a separate being, like dust of the earth, living together under one sky. Every object in the installation stands for a student, its soil-pigment drawn from Waipu’s fields — a gift for each year’s entrance and graduation rites. Each student is a seedling who, walking the daily path, looks at the soil of home and asks what kind of person they wish to become.',
    ],
