name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject latest writing articles
        run: node .github/scripts/inject-writings.mjs

      - name: Normalize latest writing articles
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const start = '/* RAUM_LAND_NARRATIVE_PATCH_START */';
          const end = '/* RAUM_LAND_NARRATIVE_PATCH_END */';
          let html = readFileSync('index.html', 'utf8');
          const open = `const WRITINGS = [\n  ${start}\n  [\n`;
          const close = `\n  ],\n  ${end}`;
          if (html.includes(open) && html.includes(close)) {
            html = html.replace(open, `const WRITINGS = [\n  ${start}\n`);
            html = html.replace(close, `,\n  ${end}`);
          }
          writeFileSync('index.html', html, 'utf8');
          NODE

      - name: Inject Hallo Servus latest article
        run: node .github/scripts/inject-hallo-servus.mjs

      - name: Inject article updates 20260621
        run: node .github/scripts/inject-article-updates-20260621.mjs

      - name: Add images to writing section
        run: node .github/scripts/inject-writing-images-20260621.mjs

      - name: Remove Bus Geschmack from writing section
        run: node .github/scripts/remove-writing-bus-geschmack-20260621.mjs

      - name: Keep writing sources original
        run: node .github/scripts/strict-writing-source-20260621.mjs

      - name: Inject writing updates 20260623
        run: node .github/scripts/inject-writing-updates-20260623.mjs

      - name: Add land narrative seven article
        run: node .github/scripts/add-land-narrative-07-20260624.mjs

      - name: Translate SUBBUS writing article
        run: node .github/scripts/translate-subbus-20260624.mjs

      - name: Translate visible writing articles
        run: node .github/scripts/translate-visible-writing-three-20260624.mjs

      - name: Sync latest writing article
        run: node .github/scripts/sync-latest-writing-article-20260625.mjs

      - name: Trim writing image sources
        run: node .github/scripts/trim-writing-images-20260623.mjs

      - name: Update Calameo portfolio link
        run: node .github/scripts/update-calameo-link-20260623.mjs

      - name: Set public space image without overriding thumbnails
        run: node .github/scripts/fix-public-space-image-dsc06519-20260623.mjs

      - name: Force land narrative seven article
        run: node .github/scripts/force-land-narrative-07-20260624.mjs

      - name: Repair land narrative seven syntax
        run: node .github/scripts/repair-land-narrative-07-syntax-20260624.mjs

      - name: Sync QUIVID writing article
        run: node .github/scripts/sync-quivid-writing-20260626.mjs

      - name: Sync Nuremberg forest writing article
        run: node .github/scripts/sync-nuremberg-forest-writing-20260628.mjs

      - name: Sync Doku-Zentrum writing article
        run: node .github/scripts/sync-doku-zentrum-writing-20260628.mjs

      - name: Remove grid toggle
        run: node .github/scripts/remove-grid-toggle-20260626.mjs

      - name: Persist generated index
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          start = '/* RAUM_REMOVE_GRID_TOGGLE_20260626_START */'
          end = '/* RAUM_REMOVE_GRID_TOGGLE_20260626_END */'
          html = re.sub(r'\n?\s*' + re.escape(start) + r'[\s\S]*?' + re.escape(end) + r'\s*', '\n', html)
          html = re.sub(r"\n\s*<button\s+className=\{\s*'rp-grid-toggle '\s*\+\s*\(grid \? 'on' : ''\)\s*\}[\s\S]*?</button>", '', html)
          html = html.replace('{grid && <GridOverlay />}', '{false && <GridOverlay />}')
          css = f'''
            {start}
            .rp-grid-toggle,
            button[aria-label*="grid" i],
            button[aria-label*="版面格線"],
            button[aria-label*="Raster" i] {{
              display: none !important;
            }}
            .rp-grid-overlay {{
              display: none !important;
            }}
            {end}
          '''
          if '</style>' in html:
            html = html.replace('</style>', css + '\n</style>', 1)
          path.write_text(html, encoding='utf-8')
          PY

          if git diff --quiet -- index.html; then
            echo "index.html unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Update generated portfolio index"
            git push
          fi

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4